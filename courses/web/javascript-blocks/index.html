03c/option\u003e\n  \u003coption value=\"leesin\"\u003e盲僧\u003c/option\u003e\n  \u003coption value=\"galio\"\u003e加里奥\u003c/option\u003e\n  \u003coption value=\"xayah\"\u003e霞\u003c/option\u003e\n  \u003coption value=\"thresh\"\u003e锤石\u003c/option\u003e\n\u003c/select\u003e\n```\n\n{:style=\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\"}\n\n```javascript\nlet select = document.querySelector(\"select\");\nlet para = document.querySelector(\"p\");\n\nselect.addEventListener(\"change\", setHero);\n\nfunction setHero() {\n  let choice = select.value;\n\n  if (choice === \"gangplank\") {\n    para.textContent =\n      \"诡计多端、心狠手辣的普朗克是被废黜的强盗之王，他令人恐惧的名号广达远至。他一度是港口城市比尔吉沃特的统治者。虽然现在他的威权已经不再，但人们相信这只会让他变得更加可怖。普朗克若是知道有人要从他手中抢走比尔吉沃特，必然会大肆血洗这座城市。而如今有了火枪、弯刀，还有一桶桶的火药，他决心要夺回自己失去的东西。\";\n  } else if (choice === \"leesin\") {\n    para.textContent =\n      \"李青是艾欧尼亚古老武术的大师，讲原则、重信义的他能将神龙之灵的精粹运用自如，助他面对任何挑战。虽然他多年前便已双目失明，但这位武僧依然献出自己的全部力量，用生命捍卫家园，抵御任何胆敢打破这里神圣均衡的人。所有因他安静冥想的举动而掉以轻心的敌人都将品尝他燃烧的拳头和炽烈的回旋踢。\";\n  } else if (choice === \"galio\") {\n    para.textContent =\n      \"光彩熠熠的德玛西亚城外，石巨像加里奥始终如一地守望着。他被创造出来是为了抵挡来犯的法师，但却经常要一动不动地矗立数十年，只有当强大的魔法力量出现时，他才会激活。而只要加里奥活动起来，他便会充分利用每一刻，品味荡气回肠的战斗和来之不易的守护人民的荣耀。可惜，他的胜利永远都喜忧参半，因为消灭魔法的同时，也消灭了他活跃力量的源泉。每一次胜利都会使他再次进入不知世事的休眠。\";\n  } else if (choice === \"xayah\") {\n    para.textContent =\n      \"身为瓦斯塔亚的志士，霞要掀起一场革命来拯救她的族群。她身法敏捷又慧心独具，凭借锋芒逼人的羽刃，扫除任何异己。霞与她的灵魂伴侣洛并肩作战，共同守护他们日渐衰落的部族，同时韬光养晦，希望终有一天能率领全族重夺昔日荣光。\";\n  } else if (choice === \"thresh\") {\n    para.textContent =\n      \"暴虐又狡猾的锤石是一个来自暗影岛的亡灵，野心勃勃、不知疲倦。他曾经是无数奥秘的看守，在一种超越生死的力量下骨肉瓦解，而现在他则使用自己独创的钻心痛苦缓慢地折磨并击溃其他人，以此作为自己存在下去的手段。被他迫害的人需要承受远超死亡的痛苦，因为锤石会让他们的灵魂也饱尝剧痛，将他们的灵魂囚禁在自己的灯笼中，经受永世的折磨。\";\n  } else {\n    para.textContent = \"\";\n  }\n}\n```\n\n{:style=\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\"}"])</script><script>self.__next_f.push([1,"10:Taec,"])</script><script>self.__next_f.push([1,"### switch 示例\n\n本节开头的例子可以用 `switch` 改造成更合理的结构。\n\n```javascript\nfunction setHero() {\n  let choice = select.value;\n\n  switch (choice) {\n    case \"gangplank\":\n      para.textContent =\n        \"诡计多端、心狠手辣的普朗克是被废黜的强盗之王，他令人恐惧的名号广达远至。他一度是港口城市比尔吉沃特的统治者。虽然现在他的威权已经不再，但人们相信这只会让他变得更加可怖。普朗克若是知道有人要从他手中抢走比尔吉沃特，必然会大肆血洗这座城市。而如今有了火枪、弯刀，还有一桶桶的火药，他决心要夺回自己失去的东西。\";\n      break;\n    case \"leesin\":\n      para.textContent =\n        \"李青是艾欧尼亚古老武术的大师，讲原则、重信义的他能将神龙之灵的精粹运用自如，助他面对任何挑战。虽然他多年前便已双目失明，但这位武僧依然献出自己的全部力量，用生命捍卫家园，抵御任何胆敢打破这里神圣均衡的人。所有因他安静冥想的举动而掉以轻心的敌人都将品尝他燃烧的拳头和炽烈的回旋踢。\";\n      break;\n    case \"galio\":\n      para.textContent =\n        \"光彩熠熠的德玛西亚城外，石巨像加里奥始终如一地守望着。他被创造出来是为了抵挡来犯的法师，但却经常要一动不动地矗立数十年，只有当强大的魔法力量出现时，他才会激活。而只要加里奥活动起来，他便会充分利用每一刻，品味荡气回肠的战斗和来之不易的守护人民的荣耀。可惜，他的胜利永远都喜忧参半，因为消灭魔法的同时，也消灭了他活跃力量的源泉。每一次胜利都会使他再次进入不知世事的休眠。\";\n      break;\n    case \"xayah\":\n      para.textContent =\n        \"身为瓦斯塔亚的志士，霞要掀起一场革命来拯救她的族群。她身法敏捷又慧心独具，凭借锋芒逼人的羽刃，扫除任何异己。霞与她的灵魂伴侣洛并肩作战，共同守护他们日渐衰落的部族，同时韬光养晦，希望终有一天能率领全族重夺昔日荣光。\";\n      break;\n    case \"thresh\":\n      para.textContent =\n        \"暴虐又狡猾的锤石是一个来自暗影岛的亡灵，野心勃勃、不知疲倦。他曾经是无数奥秘的看守，在一种超越生死的力量下骨肉瓦解，而现在他则使用自己独创的钻心痛苦缓慢地折磨并击溃其他人，以此作为自己存在下去的手段。被他迫害的人需要承受远超死亡的痛苦，因为锤石会让他们的灵魂也饱尝剧痛，将他们的灵魂囚禁在自己的灯笼中，经受永世的折磨。\";\n      break;\n    default:\n      para.textContent = \"\";\n  }\n}\n```"])</script><script>self.__next_f.push([1,"11:T4e9,### break 退出循环\n\n在循环过程中，即使没有满足循环的退出条件，我们仍然可以在循环操作的过程中退出循环。比如我们看一个查找个人信息的例子。\n\n```html\n\u003clabel for=\"name\"\u003e请输入姓名: \u003c/label\u003e\n\u003cinput id=\"name\" type=\"text\" /\u003e\n\u003cbutton\u003e查找\u003c/button\u003e\n```\n\n{:style=\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\"}\n\n```javascript\nlet students = ['小白:18岁，呆萌', '小红:17岁，美丽', '小明:18岁，开朗'，'小南:17岁，聪慧']\n\nconst paragraph = document.querySelector('p');\nconst input = document.querySelector('input');\nconst button = document.querySelector('button');\n\nbutton.addEventListener('click', findStudent);\n\nfunction findStudent() {\n  let searchName = input.value;\n\n  let found = false;\n\n  for (let i = 0; i \u003c students.length; i++) {\n    let splitStudentInfo = students.split(':');\n    let currentName = splitStudentInfo[0];\n    let info = splitStudentInfo[1];\n    if (currentName === searchName) {\n      paragraph.textContent = info;\n      found = true;\n      break;\n    }\n  }\n\n  if (!found) {\n    paragraph.textContent = \"查无此人\";\n  }\n}\n```\n\n{:style=\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\"}12:T50b,### continue 跳过循环中部分操作\n\n在循环过程中，还可以使用 `continue` 来跳过本次循环的后续操作，进入下一次循环，常常在筛选过程中使用，比如显示特定性别的同学。\n\n```html\n\u003clabel for=\"gender\"\u003e选择显示的性别: \u003c/label\u003e\n\u003cselect id=\"gender\"\u003e\n  \u003coption value=\"male\"\u003e男\u003c/option\u003e\n  \u003coption value=\"female\"\u003e女\u003c/option\u003e\n\u003c/select\u003e\n```\n\n{:style=\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\"}\n\n```javascript\nlet students = [\n  { name: \"小白\", gender: \"female\", age: 18 },\n  { name: \"小明\", gender: \"male\", age: 17 },\n  { name: \"小红\", gender: \"female\", age: 16 },\n  { name: \"小北\", gender: \"male\", age: 18 }\n];\n\nconst paragraph = document.querySelector(\"p\");\nconst select = doc"])</script><script>self.__next_f.push([1,"ument.querySelector(\"select\");\n\nselect.addEventListener(\"change\", filter);\n\nfunction filter() {\n  let gender = select.value;\n\n  for (let i = 0; i \u003c students.length; i++) {\n    let student = students[i];\n\n    if (student.gender != gender) {\n      continue;\n    }\n\n    let para = document.createElement(\"p\");\n    para.textContent = student.name + \"，今年\" + student.age + \"岁\";\n    document.body.appendChild(para);\n  }\n}\n```\n\n{:style=\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\"}13:T4c3,### while 与 do ... while\n\n除了 `for` 循环以外还有其他常见的循环是 `while` 和 `do ... while`循环。我们将上面的查找个人信息的循环改为 while 循环。\n\n```javascript\nfunction findStudent_while() {\n  let searchName = input.value;\n\n  let found = false;\n\n  let i = 0; // 初始条件\n  while (i \u003c students.length) {\n    //  循环条件\n    let splitStudentInfo = students.split(\":\");\n    let currentName = splitStudentInfo[0];\n    let info = splitStudentInfo[1];\n    if (currentName === searchName) {\n      paragraph.textContent = info;\n      found = true;\n      break;\n    }\n\n    i++; // 最终操作\n  }\n\n  if (!found) {\n    paragraph.textContent = \"查无此人\";\n  }\n}\n\nfunction findStudent_do_while() {\n  let searchName = input.value;\n\n  let found = false;\n\n  let i = 0; // 初始条件\n  do {\n    let splitStudentInfo = students.split(\":\");\n    let currentName = splitStudentInfo[0];\n    let info = splitStudentInfo[1];\n    if (currentName === searchName) {\n      paragraph.textContent = info;\n      found = true;\n      break;\n    }\n\n    i++; // 最终操作\n  } while (i \u003c students.length); //  循环条件\n\n  if (!found) {\n    paragraph.textContent = \"查无此人\";\n  }\n}\n```14:T8c3,"])</script><script>self.__next_f.push([1,"## 函数\n\n函数是一段能够被反复调用的代码块，我们可以利用函数来使得程序结构更加清洗，模块化，减少重复性的代码。\n\n```javascript\nfunction setGameOver() {\n  // disabled 属性设置为 true 使得按钮和输入框都不能使用。\n  guessField.disabled = true;\n  guessSubmit.disabled = true;\n\n  // 新增一个重置按钮，按钮上的内容为 '开始新游戏'\n  resetButton = document.createElement(\"button\");\n  resetButton.textContent = \"开始新游戏\";\n  document.body.appendChild(resetButton);\n\n  // 为重置按钮添加点击事件监听器和相应的事件处理器也就是函数resetGame\n  resetButton.addEventListener(\"click\", resetGame);\n}\n\nfunction checkGuess() {\n  // 获取用户输入的内容，并用Number函数转化为数字，保存在userGuess变量中。\n  let userGuess = Number(guessField.value);\n\n  // 条件代码块，如果guessCount的值是1，那么这个条件为true，执行花括号内部代码。\n  // 否则就不执行花括号中的代码，这样来判断玩家是不是第一次猜数字。\n  if (guessCount === 1) {\n    guesses.textContent = \"上次猜的数：\";\n  }\n  // 将用户猜测的内容后面加上一个空格，并追加到 guesses 的文本内容中。\n  guesses.textContent += userGuess + \" \";\n\n  // 用户猜对了，则输出提示信息，并调用一个结束游戏的函数。\n  if (userGuess === randomNumber) {\n    lastResult.textContent = \"恭喜你！猜对了\";\n    lastResult.style.backgroundColor = \"green\";\n    lowOrHi.textContent = \"\";\n    setGameOver();\n  } else if (guessCount === 10) {\n    // 用户猜了十次还没有对，则提示挂掉。\n    lastResult.textContent = \"!!!GAME OVER!!!\";\n    setGameOver();\n  } else {\n    // 猜错了，但还没有到十次，则提示用户数字高还是低。\n    lastResult.textContent = \"你猜错了！\";\n    lastResult.style.backgroundColor = \"red\";\n    if (userGuess \u003c randomNumber) {\n      lowOrHi.textContent = \"你猜低了！\";\n    } else if (userGuess \u003e randomNumber) {\n      lowOrHi.textContent = \"你猜高了\";\n    }\n  }\n\n  // 清空用户输入内容并且增加一次猜测计数器。\n  guessCount++;\n  guessField.value = \"\";\n  guessField.focus();\n}\n```"])</script><script>self.__next_f.push([1,"4:[\"$\",\"div\",null,{\"className\":\"max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8\",\"children\":[[\"$\",\"nav\",null,{\"className\":\"mb-6 text-sm\",\"children\":[[\"$\",\"$Ld\",null,{\"href\":\"/\",\"className\":\"text-blue-600 hover:text-blue-800\",\"children\":\"首页\"}],[\"$\",\"span\",null,{\"className\":\"mx-2 text-gray-400\",\"children\":\"/\"}],[\"$\",\"$Ld\",null,{\"href\":\"/courses/web\",\"className\":\"text-blue-600 hover:text-blue-800\",\"children\":\"网页设计与制作\"}],[\"$\",\"span\",null,{\"className\":\"mx-2 text-gray-400\",\"children\":\"/\"}],[\"$\",\"span\",null,{\"className\":\"text-gray-600\",\"children\":\"JavaScript 代码块\"}]]}],[\"$\",\"div\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"text-2xl font-bold text-gray-900\",\"children\":\"JavaScript 代码块\"}],[\"$\",\"p\",null,{\"className\":\"text-sm text-gray-500 mt-1\",\"children\":[\"网页设计与制作\",\" - 第 \",9,\" 章\"]}]]}],[\"$\",\"div\",null,{\"className\":\"bg-blue-50 text-blue-800 text-sm px-4 py-2 rounded-lg mb-4\",\"children\":[\"使用 ← → 方向键或空格键切换幻灯片，按 F 键全屏查看\",[\"$\",\"$Ld\",null,{\"href\":\"/slides/web/javascript-blocks\",\"className\":\"ml-4 text-blue-600 hover:text-blue-800 underline\",\"children\":\"全屏查看\"}]]}],[\"$\",\"$Le\",null,{\"slides\":[{\"id\":\"slide-1\",\"content\":\"# JavaScript 结构化代码\"},{\"id\":\"slide-2\",\"content\":\"## 基础指南\\n\\nJavaScript 中有多种结构化的代码块，通过组合使用这些代码块我们能很好的划分和组织程序逻辑，包括：\\n\\n- 分支\\n- 循环\\n- 函数\\n- 事件\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-3\",\"content\":\"## 分支条件\\n\\n通过对特定条件进行判断，JavaScript 中可以控制程序走向不同的分支运行。\\n\\n![分支](/img/cookie-choice-small.png){:style=\\\"width:70%;\\\"}\\n\\n{:style=\\\"text-align: center;\\\"}\",\"children\":[{\"id\":\"slide-4\",\"content\":\"### if ... else\\n\\nJavaScript 中最常见的是使用 `if ... else` 语句来实现分支控制。\\n\\n```javascript\\nif (condition) {\\n  // condition 为 true 或者 false\\n  // 如果 condition 是 true 则执行这里\\n} else {\\n  // 如果 condition 是 false 则执行这里\\n}\\n\\nif (condition) {\\n  // condition 是 true 执行这里，如果 false 则什么都不做\\n}\\n\\nif (condition) {\\n  // 如果 condition 是 true 则执行这里\\n} else if (anotherCondition) {\\n  // 如果 condition 是 false，\\n  // 同时 anotherCondition 是 true 执行这里\\n} else {\\n  // condition 和 anotherCondition 都是 false\\n}\\n```\"},{\"id\":\"slide-5\",\"content\":\"### 真实例子\\n\\n真实的双十一“剁手”。\\n\\n```javascript\\nlet balance = 1.0;\\nif (balance === 100000000.0) {\\n  clearAllStudentCart(); // 如果我实现了一个\\\"小目标\\\"我就清空大家的购物车\\n} else {\\n  cry(); // 痛哭在梦醒时分\\n}\\n```\"},{\"id\":\"slide-6\",\"content\":\"$f\"},{\"id\":\"slide-7\",\"content\":\"### 比较运算符\\n\\n上面两个例子都使用了 `if ... else` 语句，一般在分支条件中，常常使用我们上节课讲到的比较运算符来表示分支条件。详见[JavaScript 基础](../javascript-basic)的比较运算符部分。\"},{\"id\":\"slide-8\",\"content\":\"### 分支嵌套\\n\\n大部分高级编程语言中都支持分支的嵌套，也就是分支里面还有分支，JavaScript 也是如此。\\n\\n```javascript\\nif (choice === \\\"leesin\\\") {\\n  if (player === \\\"Tian\\\") {\\n    para.textContent = \\\"战斗力爆表\\\";\\n  } else {\\n    para.textContent = \\\"玩玩得了\\\";\\n  }\\n}\\n```\"},{\"id\":\"slide-9\",\"content\":\"### 逻辑运算符\\n\\n除了使用一个包含`比较运算符`的`条件表达式`来作为分支条件，还可以使用`逻辑运算符`来组合多个`条件表达式`作为分支条件。\\n\\n| 逻辑运算符   | 作用                                                                                                        |\\n| ------------ | ----------------------------------------------------------------------------------------------------------- |\\n| `\u0026\u0026`         | 逻辑与; 使得并列两个或者更多的表达式成为可能，只有当这些表达式每一个都返回 true 时，整个表达式才会返回 true |\\n| \u0026#124;\u0026#124; | 逻辑或; 当两个或者更多表达式当中的任何一个返回 true 则整个表达式将会返回 true.                              |\\n| `!`          | 逻辑非; 对一个布尔值取反, 非 true 返回 false,非 false 返回 true.                                            |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-10\",\"content\":\"### 逻辑运算符示例\\n\\n```javascript\\nlet boyLoveGirl = true;\\nlet girlLoveBoy = false;\\n\\nif (boyLoveGirl \u0026\u0026 girlLoveBoy) {\\n  console.log(\\\"真爱\\\");\\n} else if (boyLoveGirl || girlLoveBoy) {\\n  console.log(\\\"备胎\\\");\\n} else {\\n  console.log(\\\"路人\\\");\\n}\\n\\nlet girlHasBoyfriend = false;\\n\\nif (!girlHasBoyfriend) {\\n  console.log(\\\"You can you up.\\\");\\n} else {\\n  console.log(\\\"Bless them.\\\");\\n}\\n```\"}]},{\"id\":\"slide-11\",\"content\":\"## switch 语句\\n\\n处理多种情况组合时，`if ... else` 分支可能特别多，写出来特别长；这种情况下，应该使用 `switch` 语句来实现分支。\\n\\n```javascript\\nswitch (expression) {\\n  case choice1:\\n    // code for choice1\\n    break;\\n  case choice2:\\n    // code for choice2\\n    break;\\n\\n  // more choices\\n\\n  default:\\n  // code for default\\n}\\n```\",\"children\":[{\"id\":\"slide-12\",\"content\":\"$10\"}]},{\"id\":\"slide-13\",\"content\":\"## 三元/条件运算符\\n\\n三元/条件运算符是一种简化的分支条件形式，可以很方便的根据条件给变量赋不同值。\\n\\n```javascript\\n(condition) ? code for true : code for false\\n```\",\"children\":[{\"id\":\"slide-14\",\"content\":\"### 三元/条件运算符示例\\n\\n```html\\n\u003clabel for=\\\"gender\\\"\u003e选择你的性别: \u003c/label\u003e\\n\u003cselect id=\\\"gender\\\"\u003e\\n  \u003coption value=\\\"male\\\"\u003e男\u003c/option\u003e\\n  \u003coption value=\\\"female\\\"\u003e女\u003c/option\u003e\\n\u003c/select\u003e\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\\\"}\\n\\n```javascript\\nlet select = document.querySelector(\\\"select\\\");\\nlet para = document.querySelector(\\\"p\\\");\\n\\nselect.addEventListener(\\\"change\\\", setGender);\\n\\nfunction setGender() {\\n  let choice = select.value == \\\"male\\\" ? \\\"男士商品\\\" : \\\"女士商品\\\";\\n\\n  para.textContent = choice;\\n}\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\\\"}\"}]},{\"id\":\"slide-15\",\"content\":\"## 循环\\n\\n循环是日常生活中很常见的状态，在程序中，我们也可以使用循环来实现一些重复的动作。\\n\\n![循环](/img/loop_js-02-farm-cn.png){:style=\\\"width:70%;\\\"}\\n\\n{:style=\\\"text-align: center;\\\"}\",\"children\":[{\"id\":\"slide-16\",\"content\":\"### 循环的形式\\n\\n循环可以包括以下部分的一个或多个：开始条件、结束条件、迭代器，伪代码形式的循环如下：\\n\\n```javascript\\nloop(food = 0; foodNeeded = 10) {\\n  if (food = foodNeeded) {\\n    exit loop;\\n    // 我们有足够的食物了，回家吧。\\n  } else {\\n    food += 2; // 花一个小时多收集两个食物。\\n    // 循环将会继续执行。\\n  }\\n}\\n```\"},{\"id\":\"slide-17\",\"content\":\"### 循环例子-数数\\n\\n我们知道 `console.log(1);` 这一语句可以在浏览器控制台中输出数字1，假设我们需要实现从一数到100，那么，就可以用到循环。\\n\\n```javascript\\nfor (let i = 1; i \u003c= 100; i++) {\\n  console.log(i);\\n}\\n```\"},{\"id\":\"slide-18\",\"content\":\"### for 语句\\n\\n上面的例子用到了第一种 JavaScript 中常见的循环写法——`for` 语句。\\n\\n- 关键词 `for` 后面接一个括号 `()`；\\n- 括号中包含以下三个部分，并用 `;` 分隔：\\n  - `初始条件`，包含循环开始时的一些初始化变量和初始操作；\\n  - `循环条件`，只有满足该条件，循环才会继续执行；\\n  - `最终操作`，每次循环后要执行该操作；\\n- 然后紧跟括号的是 `{}` 包含每次循环要执行的代码。\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-19\",\"content\":\"$11\"},{\"id\":\"slide-20\",\"content\":\"$12\"},{\"id\":\"slide-21\",\"content\":\"$13\"}]},{\"id\":\"slide-22\",\"content\":\"$14\",\"children\":[{\"id\":\"slide-23\",\"content\":\"### 浏览器内置函数\\n\\n浏览器以及 JavaScript 内置了一些函数来帮助提供一些常见的功能，比如我们之前用过的 `console.log()` 可以在浏览器控制台中输入一段文本，以此来观察程序的运行状态，还可以使用 `Math.random()` 来随机生成一个数字。\\n\\n```javascript\\nlet name = \\\"anjing\\\";\\nlet age = 18;\\n\\nconsole.log(\\\"My name is\\\" + name + \\\", \\\" + \\\"I'm \\\" + age + \\\"years old.\\\");\\n```\"},{\"id\":\"slide-24\",\"content\":\"### 函数和方法\\n\\nJavaScript 是一种面向对象的编程语言，每个对象内部的函数叫做这个对象的\\\"方法\\\"，上一页说到的 `console.log()` 实际上是 `console` 对象的 `log()` 方法，而我们第一个猜数字游戏中的 `setGameOver()` 不属于某个对象，是函数。我们将在对象一节中详细介绍。\"},{\"id\":\"slide-25\",\"content\":\"### 函数调用\\n\\n函数可以在其他的函数里面被调用或者直接调用，或者作为某个事件触发后的处理函数调用。\\n\\n```javascript\\nfunction callee() {\\n  alert(\\\"Call me maybe.\\\");\\n}\\n\\nfunction caller() {\\n  callee();\\n}\\n\\ncaller();\\n```\"},{\"id\":\"slide-26\",\"content\":\"### 匿名函数\\n\\n一般情况下，我们需要给每个函数起名，帮助自己或者其他合作程序员理解函数的功能并且调用，但对于部分函数比如事件触发函数来说，频繁的起名字可能特别伤脑筋，这时我们可以使用匿名函数直接省略函数名。\\n\\n```javascript\\nconst btn = document.querySelector(\\\"button\\\");\\n\\nbtn.onclick = function() {\\n  alert(\\\"你好我的朋友。\\\");\\n};\\n\\n// 与上面的代码实现了一样的效果\\nbtn.addEventListner(\\\"click\\\", function() {\\n  alert(\\\"你好我的朋友。\\\");\\n});\\n```\"},{\"id\":\"slide-27\",\"content\":\"### 函数参数\\n\\n函数在不同的地方被调用，可能需要处理不同的数据，我们可以通过参数来将数据传递给函数。\\n\\n```javascript\\nfunction greeting(name, age) {\\n  console.log(\\\"My name is\\\" + name + \\\", \\\" + \\\"I'm \\\" + age + \\\"years old.\\\");\\n}\\n\\nlet students = [\\n  { name: \\\"小明\\\", age: 18 },\\n  { name: \\\"小红\\\", age: 17 }\\n];\\n\\nfor (let i = 0; i \u003c students.length; i++) {\\n  greeting(students[i].name, students[i].age);\\n}\\n```\"},{\"id\":\"slide-28\",\"content\":\"### 函数的返回值\\n\\n函数除了能够接受不同的参数来进行处理，还能够将处理的结果返回给调用者，返回的结果叫做\\\"返回值\\\"。\\n\\n```javascript\\nfunction sum(a, b) {\\n  return a + b;\\n}\\n\\nlet c = sum(1, 2); // a + b 即 1 + 2 的结果会赋值给c\\nconsole.log(c); // 3\\n```\"},{\"id\":\"slide-29\",\"content\":\"### 作用域\\n\\n不论是函数还是变量都有作用域的概念，函数名和变量都只能在它们自己的作用域中起作用，这样才能避免程序混乱。\\n\\n```html\\n\u003cscript src=\\\"first.js\\\"\u003e\u003c/script\u003e\\n\u003cscript src=\\\"second.js\\\"\u003e\u003c/script\u003e\\n\u003cscript\u003e\\n  greeting();\\n\u003c/script\u003e\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;\\\"}\\n\\n```javascript\\n// first.js\\nvar name = \\\"Chris\\\";\\nfunction greeting() {\\n  alert(\\\"Hello \\\" + name + \\\": welcome to our company.\\\");\\n}\\n\\n// second.js\\nvar name = \\\"Zaptec\\\";\\nfunction greeting() {\\n  alert(\\\"Our company is called \\\" + name + \\\".\\\");\\n}\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;\\\"}\"}]},{\"id\":\"slide-30\",\"content\":\"## 事件\\n\\n\\\"事件\\\"是一个专业术语，系统会在特定事情发生的时候发出某种信号，我们收到这种信号就可以对做出相应的反应。这种机制我们叫做\\\"事件\\\"。常见事件举例如下，详细的事件列表请参考[事件参考](https://developer.mozilla.org/zh-CN/docs/Web/Events)。\\n\\n| 事件    | 发生的事情           |\\n| ------- | -------------------- |\\n| click   | 用户点击了某个元素   |\\n| submit  | 用户提交了表单       |\\n| resize  | 用户调整了浏览器大小 |\\n| keydown | 用户按下了某个键     |\\n\\n{:style=\\\"font-size:70%;\\\"}\",\"children\":[{\"id\":\"slide-31\",\"content\":\"### 简单示例\\n\\n回顾我们之前点击按钮的例子。\\n\\n```javascript\\nconst para = document.querySelector(\\\"p\\\");\\n\\npara.addEventListener(\\\"click\\\", updateName);\\n\\nfunction updateName() {\\n  let name = prompt(\\\"输入一个新的名字：\\\");\\n  para.textContent = \\\"玩家1：\\\" + name;\\n}\\n```\"},{\"id\":\"slide-32\",\"content\":\"### 事件的不同处理方式\\n\\n可以用三种不同的机制来对特定事件做出响应。\\n\\n```html\\n\u003cbutton onclick=\\\"doit()\\\"\u003e点我呀\u003c/button\u003e\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;\\\"}\\n\\n```javascript\\nfunction doit() {\\n  alert(\\\"Just do it.\\\");\\n}\\n\\nlet btn = document.querySelector(\\\"button\\\");\\n\\n// 早期常见方式，支持绝大多数浏览器\\nbtn.onclick = doit;\\n\\n// 现代的方式，支持新的浏览器\\nbtn.addEventListener(\\\"click\\\", doit);\\n```\\n\\n{:style=\\\"float:right;width:48%;padding:1%;\\\"}\"},{\"id\":\"slide-33\",\"content\":\"### 事件对象参数-示例\\n\\n\u003cp style=\\\"text-align:left;font-size:0.65em\\\"\u003e事件被出发时，我们可以通过给处理函数传递一个\\\"事件对象\\\"作为其参数，这样可以在处理函数内部知道一些额外的信息，比如是哪个元素触发了这个事件。\\n\\n\u003ciframe frameborder=\\\"0\\\" height=\\\"450\\\" src=\\\"https://mdn.mozillademos.org/zh-CN/docs/Learn/JavaScript/Building_blocks/Events$samples/Hidden_example?revision=1588610\\\" width=\\\"100%\\\"\u003e\u003c/iframe\u003e\"},{\"id\":\"slide-34\",\"content\":\"### 事件对象参数-代码\\n\\n```html\\n\u003c!DOCTYPE html\u003e\\n\u003chtml\u003e\\n  \u003chead\u003e\\n    \u003cmeta charset=\\\"utf-8\\\" /\u003e\\n    \u003ctitle\u003eUseful event target example\u003c/title\u003e\\n    \\n  \u003c/head\u003e\\n  \u003cbody\u003e\\n    \u003cscript\u003e\\n      for (var i = 1; i \u003c= 16; i++) {\\n        var myDiv = document.createElement(\\\"div\\\");\\n        document.body.appendChild(myDiv);\\n      }\\n      function random(number) {\\n        return Math.floor(Math.random() * number);\\n      }\\n      function bgChange() {\\n        var rndCol =\\n          \\\"rgb(\\\" + random(255) + \\\",\\\" + random(255) + \\\",\\\" + random(255) + \\\")\\\";\\n        return rndCol;\\n      }\\n      var divs = document.querySelectorAll(\\\"div\\\");\\n      for (var i = 0; i \u003c divs.length; i++) {\\n        divs[i].onclick = function(e) {\\n          e.target.style.backgroundColor = bgChange();\\n        };\\n      }\\n    \u003c/script\u003e\\n  \u003c/body\u003e\\n\u003c/html\u003e\\n```\"}]},{\"id\":\"slide-35\",\"content\":\"## Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: justify;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":false,\"course\":\"web\",\"chapter\":\"javascript-blocks\"}],[\"$\",\"div\",null,{\"className\":\"flex justify-between items-center mt-6 pt-6 border-t border-gray-200\",\"children\":[[\"$\",\"$Ld\",null,{\"href\":\"/courses/web/javascript-basic\",\"className\":\"flex items-center text-blue-600 hover:text-blue-800\",\"children\":[[\"$\",\"svg\",null,{\"className\":\"w-4 h-4 mr-1\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"viewBox\":\"0 0 24 24\",\"children\":[\"$\",\"path\",null,{\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"strokeWidth\":2,\"d\":\"M15 19l-7-7 7-7\"}]}],\"上一章：\",\"JavaScript 基础\"]}],[\"$\",\"$Ld\",null,{\"href\":\"/courses/web/javascript-API\",\"className\":\"flex items-center text-blue-600 hover:text-blue-800\",\"children\":[\"下一章：\",\"JavaScript DOM API\",[\"$\",\"svg\",null,{\"className\":\"w-4 h-4 ml-1\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"viewBox\":\"0 0 24 24\",\"children\":[\"$\",\"path\",null,{\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"strokeWidth\":2,\"d\":\"M9 5l7 7-7 7\"}]}]]}]]}]]}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
