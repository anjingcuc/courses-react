                                                                                   |\n| `\u003cvideo\u003e` | HTML `\u003cvideo\u003e` 元素 用于在 HTML 或者 XHTML 文档中嵌入媒体播放器，用于支持文档内的视频播放。                                                                                                                                                                          |\n\n{:style=\"font-size:70%;\"}"])</script><script>self.__next_f.push([1,"4:[\"$\",\"div\",null,{\"className\":\"max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8\",\"children\":[[\"$\",\"nav\",null,{\"className\":\"mb-6 text-sm\",\"children\":[[\"$\",\"$Ld\",null,{\"href\":\"/\",\"className\":\"text-blue-600 hover:text-blue-800\",\"children\":\"首页\"}],[\"$\",\"span\",null,{\"className\":\"mx-2 text-gray-400\",\"children\":\"/\"}],[\"$\",\"$Ld\",null,{\"href\":\"/courses/web\",\"className\":\"text-blue-600 hover:text-blue-800\",\"children\":\"网页设计与制作\"}],[\"$\",\"span\",null,{\"className\":\"mx-2 text-gray-400\",\"children\":\"/\"}],[\"$\",\"span\",null,{\"className\":\"text-gray-600\",\"children\":\"HTML 元素\"}]]}],[\"$\",\"div\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"text-2xl font-bold text-gray-900\",\"children\":\"HTML 元素\"}],[\"$\",\"p\",null,{\"className\":\"text-sm text-gray-500 mt-1\",\"children\":[\"网页设计与制作\",\" - 第 \",2,\" 章\"]}]]}],[\"$\",\"div\",null,{\"className\":\"bg-blue-50 text-blue-800 text-sm px-4 py-2 rounded-lg mb-4\",\"children\":[\"使用 ← → 方向键或空格键切换幻灯片，按 F 键全屏查看\",[\"$\",\"$Ld\",null,{\"href\":\"/slides/web/html-elements\",\"className\":\"ml-4 text-blue-600 hover:text-blue-800 underline\",\"children\":\"全屏查看\"}]]}],[\"$\",\"$Le\",null,{\"slides\":[{\"id\":\"slide-1\",\"content\":\"# HTML 元素详解\"},{\"id\":\"slide-2\",\"content\":\"## 根元素\\n\\n| 元素     | 描述                                                                                                          |\\n| -------- | ------------------------------------------------------------------------------------------------------------- |\\n| `\u003chtml\u003e` | HTML `\u003chtml\u003e` 元素 表示一个 HTML 文档的根（顶级元素），所以它也被称为根元素。所有其他元素必须是此元素的后代。 |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-3\",\"content\":\"## 文档元数据\\n\\n| 元素      | 描述                                                                                                                          |\\n| --------- | ----------------------------------------------------------------------------------------------------------------------------- |\\n| `\u003chead\u003e`  | HTML `\u003chead\u003e` 元素 规定文档相关的配置信息（元数据），包括文档的标题，引用的文档样式和脚本等。该元素包含了其他文档元数据元素。 |\\n| `\u003clink\u003e`  | HTML 中 `\u003clink\u003e` 元素规定了外部资源与当前文档的关系。这个元素最常于链接样式表，还能被用来创建站点图标。                       |\\n| `\u003cmeta\u003e`  | HTML `\u003cmeta\u003e` 元素表示字符集、网页所使用语言等信息。                                                                          |\\n| `\u003cstyle\u003e` | HTML 的 `\u003cstyle\u003e` 元素包含文档的样式信息或者文档的部分内容。一般使用 CSS 格式。                                               |\\n| `\u003ctitle\u003e` | HTML `\u003ctitle\u003e` 元素定义文档的标题，显示在浏览器的标题栏或标签页上。                                                           |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-4\",\"content\":\"## 分区根元素\\n\\n| 元素     | 描述                                                                                                   |\\n| -------- | ------------------------------------------------------------------------------------------------------ |\\n| `\u003cbody\u003e` | HTML `\u003cbody\u003e` 元素表示文档的内容。该分区根元素包含了网页的主体结构和内容，元素中可以包含以下各类元素。 |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-5\",\"content\":\"## 内容分区 (1/2)\\n\\n| 元素       | 描述                                                                                                                                         |\\n| ---------- | -------------------------------------------------------------------------------------------------------------------------------------------- |\\n| `\u003cheader\u003e` | HTML `\u003cheader\u003e` 元素用于展示介绍性内容，比如 Logo、搜索框、作者名称，等等。                                                                  |\\n| `\u003cfooter\u003e` | HTML `\u003cfooter\u003e` 元素表示最近一个章节内容或者页脚，通常包含该章节作者、版权数据或者与文档相关的链接等信息。                                   |\\n| `\u003cmain\u003e`   | HTML `\u003cmain\u003e` 元素呈现了文档的 `\u003cbody\u003e` 或应用的主体部分。主体部分由与文档直接相关，或者扩展于文档的中心主题、应用的主要功能部分的内容组成。 |\\n| `\u003cnav\u003e`    | HTML 导航栏 (`\u003cnav\u003e`) 描绘一个含有多个超链接的区域，这个区域包含转到其他页面，或者页面内部其他部分的链接列表.                                |\\n\\n{:style=\\\"font-size:70%;\\\"}\",\"children\":[{\"id\":\"slide-6\",\"content\":\"## 内容分区 (2/2)\\n\\n| 元素        | 描述                                                                                                                                  |\\n| ----------- | ------------------------------------------------------------------------------------------------------------------------------------- |\\n| `\u003ch1\u003e-\u003ch6\u003e` | HTML `\u003ch1\u003e–\u003ch6\u003e` 标题(Heading)元素呈现了六个不同的级别的标题，`\u003ch1\u003e` 级别最高，而 `\u003ch6\u003e` 级别最低。                                   |\\n| `\u003csection\u003e` | HTML `\u003csection\u003e` 元素表示文档中的一个区域（或节），比如，内容中的一个专题组，一般一个`\u003csection\u003e`包含一个标题 `\u003ch1\u003e-\u003ch6\u003e` 作为子节点。 |\\n| `\u003carticle\u003e` | `\u003carticle\u003e`元素表示文档、页面、应用或网站中的独立结构，可能是论坛帖子、杂志或新闻文章、博客、评论等等。                               |\\n\\n{:style=\\\"font-size:70%;\\\"}\"}]},{\"id\":\"slide-7\",\"content\":\"## 文本内容 (1/2)\\n\\n| 元素    | 描述                                                                                                                                                                            |\\n| ------- | ------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\\n| `\u003cdiv\u003e` | HTML `\u003cdiv\u003e` 元素或叫做 HTML 文档分区元素，是一个通用型的流内容容器，它在语义上不代表任何特定类型的内容，它被用来对其它元素进行分组，它应该在没有任何其它语义元素可用时才使用。 |\\n| `\u003cp\u003e`   | HTML `\u003cp\u003e`元素或叫做 HTML 段落元素表示文本的一个段落。该元素通常表现为一整块与相邻文本分离的文本，或以垂直的空白隔离或以首行缩进。另外，`\u003cp\u003e` 是块级元素。                      |\\n\\n{:style=\\\"font-size:70%;\\\"}\",\"children\":[{\"id\":\"slide-8\",\"content\":\"$f\"}]},{\"id\":\"slide-9\",\"content\":\"## 内联文本 (1/3)\\n\\n| 元素     | 描述                                                                                                             |\\n| -------- | ---------------------------------------------------------------------------------------------------------------- |\\n| `\u003ca\u003e`    | HTML `\u003ca\u003e` 元素（或称锚元素）可以创建通向其他网页、文件、同一页面内的位置、电子邮件地址或任何其他 URL 的超链接。 |\\n| `\u003cbr\u003e`   | HTML `\u003cbr\u003e` 元素在文本中生成一个换行（回车）符号。此元素在写诗和地址时很有用，这些地方的换行都非常重要。         |\\n| `\u003ccode\u003e` | HTML `\u003ccode\u003e` 元素呈现一段计算机代码. 默认情况下, 它以浏览器的默认等宽字体显示.                                  |\\n\\n{:style=\\\"font-size:70%;\\\"}\",\"children\":[{\"id\":\"slide-10\",\"content\":\"## 内联文本 (2/3)\\n\\n| 元素  | 描述                                                                                                                                       |\\n| ----- | ------------------------------------------------------------------------------------------------------------------------------------------ |\\n| `\u003ci\u003e` | HTML 元素 `\u003ci\u003e` 用于表现因某些原因需要区分普通文本的一系列文本。例如技术术语、外文短语或是小说中人物的思想活动等，它的内容通常以斜体显示。 |\\n| `\u003cb\u003e` | HTML `\u003cb\u003e` 是提醒注意元素，用于吸引读者的注意到该元素的内容上。大多数浏览器仍然将文字显示为粗体。                                          |\\n| `\u003cs\u003e` | HTML `\u003cs\u003e` 元素使用删除线来渲染文本。使用 `\u003cs\u003e` 元素来表示不再相关，或者不再准确的事情。                                                   |\\n| `\u003cu\u003e` | HTML `\u003cu\u003e` 元素使文本在其内容的基线下的一行呈现下划线。                                                                                    |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-11\",\"content\":\"## 内联文本 (3/3)\\n\\n| 元素       | 描述                                                                                                                                                  |\\n| ---------- | ----------------------------------------------------------------------------------------------------------------------------------------------------- |\\n| `\u003cem\u003e`     | HTML `\u003cem\u003e` 着重元素标记出需要用户着重阅读的内容， `\u003cem\u003e` 元素是可以嵌套的，嵌套层次越深，则其包含的内容被认定为越需要着重阅读。                      |\\n| `\u003cstrong\u003e` | HTML `\u003cstrong\u003e` 元素表示文本十分重要，一般用粗体显示。                                                                                                |\\n| `\u003csmall\u003e`  | HTML 中的元素將使文本的字体变小一号。在 HTML5 中，除了它的样式含义，这个元素被重新定义为表示边注释和附属细则，包括版权和法律文本。                    |\\n| `\u003cspan\u003e`   | HTML `\u003cspan\u003e` 元素是短语内容的通用行内容器，并没有任何特殊语义。`\u003cspan\u003e` 与 `\u003cdiv\u003e` 元素很相似，但 `\u003cdiv\u003e` 是一个 块元素 而 `\u003cspan\u003e` 则是 行内元素 。 |\\n\\n{:style=\\\"font-size:70%;\\\"}\"}]},{\"id\":\"slide-12\",\"content\":\"$10\"},{\"id\":\"slide-13\",\"content\":\"## 内嵌内容\\n\\n| 元素       | 描述                                                                                                                                           |\\n| ---------- | ---------------------------------------------------------------------------------------------------------------------------------------------- |\\n| `\u003ciframe\u003e` | HTML 内联框架元素 `\u003ciframe\u003e` 表示嵌套的浏览上下文，有效地将另一个 HTML 页面嵌入到当前页面中。                                                  |\\n| `\u003csource\u003e` | HTML `\u003csource\u003e` 元素为 `\u003caudio\u003e` 或者 `\u003cvideo\u003e` 元素指定多个媒体资源。这是一个空元素。它通常用于以不同浏览器支持的多种格式提供相同的媒体内容。 |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-14\",\"content\":\"## 表格\\n\\n| 元素      | 描述                                                                          |\\n| --------- | ----------------------------------------------------------------------------- |\\n| `\u003ctable\u003e` | HTML 的 `\u003ctable\u003e` 元素表示表格数据 — 即通过二维数据表表示的信息。             |\\n| `\u003cthead\u003e` | HTML 的`\u003cthead\u003e`元素定义了一组定义表格的列头的行。                            |\\n| `\u003ctbody\u003e` | 这个 HTML 标签类似 HTML 标签中的 `\u003cbody\u003e` 表示表格内容的部分。                |\\n| `\u003ctfoot\u003e` | HTML 元素`\u003ctfoot\u003e` 定义了一组表格中各列的汇总行。                             |\\n| `\u003cth\u003e`    | HTML 的 `\u003cth\u003e` 元素代表一个表格的表头部分属性                                 |\\n| `\u003ctr\u003e`    | HTML `\u003ctr\u003e` 元素定义表格中的行。 元素内包含一系列的 `\u003ctd\u003e` 或者 `\u003cth\u003e` 元素。 |\\n| `\u003ctd\u003e`    | HTML `\u003ctd\u003e` 元素定义了一个单元格。                                            |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-15\",\"content\":\"## 表单 (1/2)\\n\\n| 元素       | 描述                                                                                                                                                  |\\n| ---------- | ----------------------------------------------------------------------------------------------------------------------------------------------------- |\\n| `\u003cbutton\u003e` | HTML `\u003cbutton\u003e` 元素表示一个可点击的按钮，可以用在表单或文档其它需要使用简单标准按钮的地方。                                                          |\\n| `\u003cform\u003e`   | HTML `\u003cform\u003e` 元素 表示了文档中的一个区域，这个区域包含有交互控制元件，用来向 web 服务器提交信息。                                                    |\\n| `\u003cinput\u003e`  | HTML `\u003cinput\u003e` 元素用于为基于 Web 的表单创建交互式控件，以便接受来自用户的数据; 可以使用各种类型的输入数据和控件小部件，具体取决于设备和 user agent。 |\\n\\n{:style=\\\"font-size:70%;\\\"}\",\"children\":[{\"id\":\"slide-16\",\"content\":\"### 表单 (2/2)\\n\\n| 元素         | 描述                                                                                                                          |\\n| ------------ | ----------------------------------------------------------------------------------------------------------------------------- |\\n| `\u003clabel\u003e`    | HTML `\u003clabel\u003e` 元素（标签）表示用户界面中某个元素的说明。                                                                     |\\n| `\u003cselect\u003e`   | HTML `\u003cselect\u003e` 元素表示一个控件，提供一个选项菜单：                                                                          |\\n| `\u003coption\u003e`   | HTML 元素 `\u003coption\u003e` 用于定义在`\u003cselect\u003e` 元素中包含的项。`\u003coption\u003e` 可以在弹出窗口和 html 文档中的其他项目列表中表示菜单项。 |\\n| `\u003ctextarea\u003e` | HTML `\u003ctextarea\u003e` 元素表示一个多行纯文本编辑控件。                                                                            |\\n\\n{:style=\\\"font-size:70%;\\\"}\"}]},{\"id\":\"slide-17\",\"content\":\"## 脚本\\n\\n| 元素       | 描述                                           |\\n| ---------- | ---------------------------------------------- |\\n| `\u003cscript\u003e` | HTML `\u003cscript\u003e` 元素用于嵌入或引用可执行脚本。 |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-18\",\"content\":\"## Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: justify;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":false,\"course\":\"web\",\"chapter\":\"html-elements\"}],[\"$\",\"div\",null,{\"className\":\"flex justify-between items-center mt-6 pt-6 border-t border-gray-200\",\"children\":[[\"$\",\"$Ld\",null,{\"href\":\"/courses/web/introduction\",\"className\":\"flex items-center text-blue-600 hover:text-blue-800\",\"children\":[[\"$\",\"svg\",null,{\"className\":\"w-4 h-4 mr-1\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"viewBox\":\"0 0 24 24\",\"children\":[\"$\",\"path\",null,{\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"strokeWidth\":2,\"d\":\"M15 19l-7-7 7-7\"}]}],\"上一章：\",\"课程概述\"]}],[\"$\",\"$Ld\",null,{\"href\":\"/courses/web/css-first-steps\",\"className\":\"flex items-center text-blue-600 hover:text-blue-800\",\"children\":[\"下一章：\",\"CSS 入门\",[\"$\",\"svg\",null,{\"className\":\"w-4 h-4 ml-1\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"viewBox\":\"0 0 24 24\",\"children\":[\"$\",\"path\",null,{\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"strokeWidth\":2,\"d\":\"M9 5l7 7-7 7\"}]}]]}]]}]]}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
