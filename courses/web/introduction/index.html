}]]}],[\"$\",\"div\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"text-2xl font-bold text-gray-900\",\"children\":\"课程概述\"}],[\"$\",\"p\",null,{\"className\":\"text-sm text-gray-500 mt-1\",\"children\":[\"网页设计与制作\",\" - 第 \",1,\" 章\"]}]]}],[\"$\",\"div\",null,{\"className\":\"bg-blue-50 text-blue-800 text-sm px-4 py-2 rounded-lg mb-4\",\"children\":[\"使用 ← → 方向键或空格键切换幻灯片，按 F 键全屏查看\",[\"$\",\"$Ld\",null,{\"href\":\"/slides/web/introduction\",\"className\":\"ml-4 text-blue-600 hover:text-blue-800 underline\",\"children\":\"全屏查看\"}]]}],[\"$\",\"$Le\",null,{\"slides\":[{\"id\":\"slide-1\",\"content\":\"# 课程概述\"},{\"id\":\"slide-2\",\"content\":\"## 评分标准\\n\\n| 项目     | 内容 |\\n| -------- | ---- |\\n| 出勤表现 | 40%  |\\n| 课后作业 | 60%  |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-3\",\"content\":\"## 为什么学习\u003cbr/\u003e网页设计与制作?\\n\\n应用领域：\\n\\n- 数字广告\\n- 数据新闻\\n- 个人站点\\n- 网页游戏\\n- 现代数字化展示\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-4\",\"content\":\"## 课程目标\\n\\n学完这门课，希望大家能够：\\n\\n1. 掌握 HTML / CSS / JavaScript “三剑客”。\\n2. 学会独立制作专业相关的作品。\\n3. 成为一名业余程序员。\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-5\",\"content\":\"## 课程主要内容\\n\\n三方面内容：\\n\\n1. 开发环境介绍\\n2. HTML / CSS / JavaScript\\n3. 项目实践\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-6\",\"content\":\"## 在线开发环境\\n\\n直接可以在线编写 HTML / CSS / JavaScript 并预览。\\n\\n- [国外 jsfiddle.net](https://jsfiddle.net/)\\n- [国外 codepen.io](https://codepen.io)\\n- [国内 jsrun.pro](http://jsrun.pro/new)\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-7\",\"content\":\"## 本地开发环境\\n\\n| 软件类型 | 软件名称      |\\n| -------- | ------------- |\\n| 编辑器   | VSCode        |\\n| 浏览器   | Edge / Chrome |\\n\\n{:style=\\\"font-size:70%;\\\"}\",\"children\":[{\"id\":\"slide-8\",\"content\":\"### VSCode\\n\\n微软出品的一款编辑器，具备代码高亮，语法检查，自动格式化代码等多种功能，并有成熟的社区提供大量插件来提高编写代码的效率。\"},{\"id\":\"slide-9\",\"content\":\"### Chrome\\n\\n谷歌出品的一款浏览器，自带的开发者工具在前端开发过程中提供丰富的辅助功能。\"}]},{\"id\":\"slide-10\",\"content\":\"## 认识 Web 服务\\n\\n![Web Server](/img/webserver.jpg){:style=\\\"width:90%;border:none;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-11\",\"content\":\"## 初识 HTML\\n\\n一份简历。\\n\\n```html\\n\u003chtml\u003e\\n  \u003chead\u003e\\n    \u003ctitle\u003e简历\u003c/title\u003e\\n  \u003c/head\u003e\\n  \u003cbody\u003e\\n    \u003ch1\u003eanjingcuc\u003c/h1\u003e\\n    \u003ch2\u003e教育经历\u003c/h2\u003e\\n    \u003cp\u003e20XX年毕业于CUC。\u003c/p\u003e\\n    \u003ch2\u003e自我介绍\u003c/h2\u003e\\n    \u003cp\u003e学！习！能！力！强！\u003c/p\u003e\\n  \u003c/body\u003e\\n\u003c/html\u003e\\n```\"},{\"id\":\"slide-12\",\"content\":\"## HTML - \u003cb style='color:red'\u003eH\u003c/b\u003eyper\u003cb style='color:red'\u003eT\u003c/b\u003eext \u003cb style='color:red'\u003eM\u003c/b\u003earkup \u003cb style='color:red'\u003eL\u003c/b\u003eanguage\\n\\n超文本标记语言，是一种用于创建网页的标准标记语言。它定义了页面的基本结构和内容，可以被浏览器渲染成俗称的“网页”。\\n\\nHTML 的标准由 W3C（万维网联盟）维护，目前我们所见的大多数网站都是 HTML 4.01 版，而移动互联网时代口头常说的 H5 实际上是 HTML 标准的 5.0 版本。\",\"children\":[{\"id\":\"slide-13\",\"content\":\"### HTML 元素\\n\\n相关定义如下：\\n\\n- HTML 元素以**开始标签**起始，以**结束标签**中止。\\n- 元素的内容是**开始标签**与**结束标签**之间的内容。\\n- 有一种元素为**空元素**，在**开始标签**中进行关闭。\\n- 大多数 HTML 元素可拥有**属性**，如 style。\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-14\",\"content\":\"### HTML 标签\\n\\nHTML 文件中，为了区分内容和描述 HTML 文档结构的**标记**，定义了很多**标签**，**标签**由尖括号包裹，分为**开始标签**、**结束标签**以及空标签三种。\\n\\n```html\\n\u003ch1\u003e\u003c/h1\u003e\\n\u003cp\u003e\u003c/p\u003e\\n\u003cbr /\u003e\\n```\"},{\"id\":\"slide-15\",\"content\":\"### HTML 设计与构建\\n\\n就像设计新闻稿件或者海报。\\n\\n1. 先在草稿纸上画出自己想要制作的网页的大概布局结构。\\n2. 判断一下各个位置的内容属于 HTML 结构中的什么元素。\\n3. 查找恰当的标签来填写清楚，构建好自己想要的页面。\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-16\",\"content\":\"### 图片与超链接\\n\\n在 HTML 中可以随时添加 `\u003cimg/\u003e` 图片元素来加载一幅图片，也可以添加 `\u003ca\u003e\u003c/a\u003e` 超链接元素来跳转到新的页面。\\n\\n改进你的简历。\"},{\"id\":\"slide-17\",\"content\":\"### 更多的 HTML 元素\\n\\n还有更多种类的 HTML 元素和响应的标签需要扩展学习。\\n\\n更多元素标签，可参考:\\n\\nhttps://www.w3school.com.cn/html/html_jianjie.asp 。\"},{\"id\":\"slide-18\",\"content\":\"### HTML 样式\\n\\n可以通过 HTML 元素的 style 属性改变元素的表现形式，如颜色、字体、位置等等。\"}]},{\"id\":\"slide-19\",\"content\":\"## 实践环节\\n\\n完成以下任务：\\n\\n1. 本地下载好 VSCode 和 Edge / Chrome，准备开发；\\n2. 尝试构建一个单页面的 HTML 简历；\\n3. 尝试结合样式、图片、超链接丰富你的简历。\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-20\",\"content\":\"## Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: justify;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":false,\"course\":\"web\",\"chapter\":\"introduction\"}],[\"$\",\"div\",null,{\"className\":\"flex justify-between items-center mt-6 pt-6 border-t border-gray-200\",\"children\":[[\"$\",\"div\",null,{}],[\"$\",\"$Ld\",null,{\"href\":\"/courses/web/html-elements\",\"className\":\"flex items-center text-blue-600 hover:text-blue-800\",\"children\":[\"下一章：\",\"HTML 元素\",[\"$\",\"svg\",null,{\"className\":\"w-4 h-4 ml-1\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"viewBox\":\"0 0 24 24\",\"children\":[\"$\",\"path\",null,{\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"strokeWidth\":2,\"d\":\"M9 5l7 7-7 7\"}]}]]}]]}]]}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
