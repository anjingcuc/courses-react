/div\u003e\n  \u003cdiv class=\"row\"\u003e\n    \u003cdiv class=\"col span1\"\u003e13\u003c/div\u003e\n    \u003cdiv class=\"col span6\"\u003e14\u003c/div\u003e\n    \u003cdiv class=\"col span3\"\u003e15\u003c/div\u003e\n    \u003cdiv class=\"col span2\"\u003e16\u003c/div\u003e\n  \u003c/div\u003e\n\u003c/div\u003e\n```\n\n{:style=\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\"}\n\n```CSS\n* {\n  box-sizing: border-box;\n}\n\n\nbody {\n  width: 980px;\n  margin: 0 auto;\n}\n\n.wrapper {\n  padding-right: 20px;\n}\n\n.row {\n  clear: both;\n}\n\n.col {\n  float: left;\n  margin-left: 20px;\n  width: 60px;\n  background: rgb(255, 150, 150);\n}\n\n/* Two column widths (120px) plus one gutter width (20px) */\n.col.span2 { width: 140px; }\n/* Three column widths (180px) plus two gutter widths (40px) */\n.col.span3 { width: 220px; }\n/* And so on... */\n.col.span4 { width: 300px; }\n.col.span5 { width: 380px; }\n.col.span6 { width: 460px; }\n.col.span7 { width: 540px; }\n.col.span8 { width: 620px; }\n.col.span9 { width: 700px; }\n.col.span10 { width: 780px; }\n.col.span11 { width: 860px; }\n.col.span12 { width: 940px; }\n```\n\n{:style=\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\"}12:T513,## 定位\n\n```html\n\u003ch1\u003eBasic document flow\u003c/h1\u003e\n\n\u003cp\u003e\n  I am a basic block level element. My adjacent block level elements sit on new\n  lines below me.\n\u003c/p\u003e\n\n\u003cp\u003e\n  By default we span 100% of the width of our parent element, and we are as tall\n  as our child content. Our total width and height is our content + padding +\n  border width/height.\n\u003c/p\u003e\n\n\u003cp\u003e\n  We are separated by our margins. Because of margin collapsing, we are\n  separated by the width of one of our margins, not both.\n\u003c/p\u003e\n\n\u003cp\u003e\n  inline elements \u003cspan\u003elike this one\u003c/span\u003e and \u003cspan\u003ethis one\u003c/span\u003e sit on\n  the same line as one another, and adjacent text nodes, if there is space on\n  the same line. Overflowing inline elements will\n  \u003cspan\u003ewrap onto a new line if possible (like this one containing text)\u003c/span\u003e,\n  or just go on to a new line if not, much like this image will do:\n  \u003cimg src=\"https://mdn.mozillademos.org/files/13360/long.jpg\" /\u003e\n\u003c/p\u003e\n```\n"])</script><script>self.__next_f.push([1,"\n{:style=\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\"}\n\n```CSS\nbody {\n  width: 500px;\n  margin: 0 auto;\n}\n\np {\n  background: aqua;\n  border: 3px solid blue;\n  padding: 10px;\n  margin: 10px;\n}\n\nspan {\n  background: red;\n  border: 1px solid black;\n}\n```\n\n{:style=\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\"}"])</script><script>self.__next_f.push([1,"4:[\"$\",\"div\",null,{\"className\":\"max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8\",\"children\":[[\"$\",\"nav\",null,{\"className\":\"mb-6 text-sm\",\"children\":[[\"$\",\"$Ld\",null,{\"href\":\"/\",\"className\":\"text-blue-600 hover:text-blue-800\",\"children\":\"首页\"}],[\"$\",\"span\",null,{\"className\":\"mx-2 text-gray-400\",\"children\":\"/\"}],[\"$\",\"$Ld\",null,{\"href\":\"/courses/web\",\"className\":\"text-blue-600 hover:text-blue-800\",\"children\":\"网页设计与制作\"}],[\"$\",\"span\",null,{\"className\":\"mx-2 text-gray-400\",\"children\":\"/\"}],[\"$\",\"span\",null,{\"className\":\"text-gray-600\",\"children\":\"CSS 布局\"}]]}],[\"$\",\"div\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"text-2xl font-bold text-gray-900\",\"children\":\"CSS 布局\"}],[\"$\",\"p\",null,{\"className\":\"text-sm text-gray-500 mt-1\",\"children\":[\"网页设计与制作\",\" - 第 \",6,\" 章\"]}]]}],[\"$\",\"div\",null,{\"className\":\"bg-blue-50 text-blue-800 text-sm px-4 py-2 rounded-lg mb-4\",\"children\":[\"使用 ← → 方向键或空格键切换幻灯片，按 F 键全屏查看\",[\"$\",\"$Ld\",null,{\"href\":\"/slides/web/css-layout\",\"className\":\"ml-4 text-blue-600 hover:text-blue-800 underline\",\"children\":\"全屏查看\"}]]}],[\"$\",\"$Le\",null,{\"slides\":[{\"id\":\"slide-1\",\"content\":\"# CSS 布局\"},{\"id\":\"slide-2\",\"content\":\"## CSS 布局\\n\\nCSS 布局默认情况下采用正常布局，但为了实现更多现代化的效果，我们还要学习其他三种布局相关内容。本节将从下面几个部分介绍：\\n\\n- 正常布局\\n- 浮动布局\\n- 网格布局\\n- 定位\\n- 弹性盒子\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-3\",\"content\":\"## 正常布局流 - Normal Flow\",\"children\":[{\"id\":\"slide-4\",\"content\":\"### 改变正常布局的方法\\n\\n正常布局流是指在不对页面进行任何布局控制时，浏览器默认的 HTML 布局方式。出现在另一个元素下面的元素被描述为块元素，与出现在另一个元素旁边的内联元素不同，内联元素就像段落中的单个单词一样。使用以下 CSS 布局技术会使得元素离开正常布局流。\\n\\n{:style=\\\"font-size:75%;\\\"}\\n\\n- display 属性 — 标准的 value，比如 block, inline 。或者新式布局 CSS Grid 和 Flexbox 。\\n- 浮动 - 应用 float 值，诸如 left 能够让块级元素互相并排成一行，而不是一个堆叠在另一个上面。\\n- position 属性 — 允许你精准设置盒子中的盒子的位置，正常布局流中，默认为 static 。\\n- 表格布局 — 使用 display: table 布局方式可以用在非表格内容上。\\n- 多列布局— Multi-column layout 属性 可以让块按列布局，比如报纸的内容就是一列一列排布的。\\n\\n{:style=\\\"font-size:70%;\\\"}\"}]},{\"id\":\"slide-5\",\"content\":\"$f\",\"children\":[{\"id\":\"slide-6\",\"content\":\"$10\"},{\"id\":\"slide-7\",\"content\":\"### 浮动布局 - 清除浮动\\n\\n```html\\n\u003cfooter\u003e\\n  \u003cp\u003e\\n    \u0026copy;2016 your imagination. This isn't really copyright, this is a mockery\\n    of the very concept. Use as you wish.\\n  \u003c/p\u003e\\n\u003c/footer\u003e\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\\\"}\\n\\n```CSS\\nfooter {\\n  clear: both;\\n}\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\\\"}\"}]},{\"id\":\"slide-8\",\"content\":\"## 网格布局\\n\\n网格布局示意如下所示。\\n\\n![网格](/img/grid.png){:style=\\\"border:none;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\",\"children\":[{\"id\":\"slide-9\",\"content\":\"$11\"},{\"id\":\"slide-10\",\"content\":\"### 网格布局-第三方网格\\n\\n还可以采用 Bootstrap 之类第三方库提供的网格布局。\"}]},{\"id\":\"slide-11\",\"content\":\"$12\",\"children\":[{\"id\":\"slide-12\",\"content\":\"### 定位-静态定位\\n\\n静态定位是将元素放入它在正常布局流中的正常位置。为了演示这一点，并为以后的部分设置示例，首先在 HTML 中添加一个 positioned 的 class 到第二个`\u003cp\u003e`。\\n\\n{:style=\\\"font-size:70%;\\\"}\\n\\n```html\\n\u003cp class=\\\"positioned\\\"\u003e...\u003c/p\u003e\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\\\"}\\n\\n```CSS\\n.positioned {\\n   position: static;\\n  background: yellow;\\n}\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\\\"}\"},{\"id\":\"slide-13\",\"content\":\"### 定位-相对定位\\n\\n把刚才那个 `\u003cp\u003e` 改为相对定位。\\n\\n```CSS\\n.positioned {\\n  position: relative;\\n  background: yellow;\\n\\n  top: 30px;\\n  left: 30px;\\n}\\n```\"},{\"id\":\"slide-14\",\"content\":\"### 定位-绝对定位\\n\\n把刚才那个 `\u003cp\u003e` 改为相对定位。\\n\\n```CSS\\n.positioned {\\n  position: absolute;\\n  background: yellow;\\n\\n  top: 30px;\\n  left: 30px;\\n}\\n```\"},{\"id\":\"slide-15\",\"content\":\"### 定位 - `z-index`\\n\\n实现类似图层的效果。\\n\\n```CSS\\np:nth-of-type(1) {\\n  position: absolute;\\n  background: lime;\\n  top: 10px;\\n  right: 30px;\\n\\n  z-index: 1;\\n}\\n```\"}]},{\"id\":\"slide-16\",\"content\":\"## 弹性盒子\\n\\n长久以来，唯一可用的且有稳定的跨浏览器兼容性的能用来构建 CSS 布局的工具只有 `浮动` 和 `定位`。这些都很好而且有效，但是在某些布局方面它们就有限制，并且难以实现，比如：\\n\\n- 在父内容里面垂直居中一个块内容。\\n- 使容器的所有子项占用等量的可用宽度/高度，而不管有多少宽度/高度可用。\\n- 使多列布局中的所有列采用相同的高度，即使它们包含的内容量不同。\\n\\n{:style=\\\"font-size:70%;\\\"}\",\"children\":[{\"id\":\"slide-17\",\"content\":\"### 弹性盒子-模型说明\\n\\n![弹性模型](/img/flex_terms.png){:style=\\\"width:100%;border:none;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-18\",\"content\":\"### 弹性盒子-模型示例\\n\\n使用 Chrome 在新标签页中打开[示例](https://mdn.github.io/learning-area/css/css-layout/flexbox/flexbox0.html) ，通过开发者工具修改 `\u003csection\u003e` 的 `display: flex` ，即可实现文章的横向排列。\\n\\n{:style=\\\"font-size:70%;\\\"}\\n\\n![横向](/img/flexbox-example2.png){:style=\\\"width:100%;border:none;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-19\",\"content\":\"### 弹性盒子-换行\\n\\n弹性盒子的子元素过多时会发生溢出，此时可以组合使用 `flex-wrap: wrap` 和 `flex: 200px` 来实现子元素换行，打开[示例](https://mdn.github.io/learning-area/css/css-layout/flexbox/flexbox-wrap0.html)，并修改样式后，达到以下效果。\\n\\n{:style=\\\"font-size:70%;\\\"}\\n\\n![换行](/img/flexbox-example4.png){:style=\\\"width:60%;border:none;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-20\",\"content\":\"### 弹性盒子-方向与缩写\\n\\n弹性盒子子元素默认从左到右排列，也可以通过 `flex-direction: row-reverse` 反过来从右到左排列，此外 `flex-direction` 与 `flex-wrap` 可以合并为 `flex-flow` 。\\n\\n```CSS\\nflex-direction: row-reverse;\\nflex-wrap: wrap;\\n```\\n\\n```CSS\\nflex-flow: row-reverse wrap;\\n```\"},{\"id\":\"slide-21\",\"content\":\"### 弹性盒子- flex 缩写和全拼\\n\\n`flex` 属性可以有多种写法。\\n\\n| 写法             | 示例          | 效果                                     |\\n| ---------------- | ------------- | ---------------------------------------- |\\n| flex: basis      | flex: 200px   | 指定子元素最小宽度                       |\\n| flex: grow basis | flex: 2 200px | 指定子元素所占位置大小以及子元素最小宽度 |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-22\",\"content\":\"### 弹性盒子-对齐\\n\\n弹性盒子子元素默认情况下会在横轴上紧贴左侧以最大元素宽度横向排列，填满时则平均分配，纵轴上则拉伸填满父元素的高度，或者以最大子元素高度为统一高度。请打开[示例](https://mdn.github.io/learning-area/css/css-layout/flexbox/flex-align0.html)，依次添加如下 CSS 观察效果。\\n\\n```CSS\\ndiv {\\n  display: flex;\\n  align-items: center;\\n  justify-content: space-around;\\n}\\n```\"}]},{\"id\":\"slide-23\",\"content\":\"## Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: justify;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":false,\"course\":\"web\",\"chapter\":\"css-layout\"}],[\"$\",\"div\",null,{\"className\":\"flex justify-between items-center mt-6 pt-6 border-t border-gray-200\",\"children\":[[\"$\",\"$Ld\",null,{\"href\":\"/courses/web/css-box\",\"className\":\"flex items-center text-blue-600 hover:text-blue-800\",\"children\":[[\"$\",\"svg\",null,{\"className\":\"w-4 h-4 mr-1\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"viewBox\":\"0 0 24 24\",\"children\":[\"$\",\"path\",null,{\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"strokeWidth\":2,\"d\":\"M15 19l-7-7 7-7\"}]}],\"上一章：\",\"CSS 盒模型\"]}],[\"$\",\"$Ld\",null,{\"href\":\"/courses/web/javascript-introduction\",\"className\":\"flex items-center text-blue-600 hover:text-blue-800\",\"children\":[\"下一章：\",\"JavaScript 简介\",[\"$\",\"svg\",null,{\"className\":\"w-4 h-4 ml-1\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"viewBox\":\"0 0 24 24\",\"children\":[\"$\",\"path\",null,{\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"strokeWidth\":2,\"d\":\"M9 5l7 7-7 7\"}]}]]}]]}]]}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
