null,{\"className\":\"mx-2 text-gray-400\",\"children\":\"/\"}],[\"$\",\"$Ld\",null,{\"href\":\"/courses/web\",\"className\":\"text-blue-600 hover:text-blue-800\",\"children\":\"网页设计与制作\"}],[\"$\",\"span\",null,{\"className\":\"mx-2 text-gray-400\",\"children\":\"/\"}],[\"$\",\"span\",null,{\"className\":\"text-gray-600\",\"children\":\"JavaScript DOM API\"}]]}],[\"$\",\"div\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"text-2xl font-bold text-gray-900\",\"children\":\"JavaScript DOM API\"}],[\"$\",\"p\",null,{\"className\":\"text-sm text-gray-500 mt-1\",\"children\":[\"网页设计与制作\",\" - 第 \",10,\" 章\"]}]]}],[\"$\",\"div\",null,{\"className\":\"bg-blue-50 text-blue-800 text-sm px-4 py-2 rounded-lg mb-4\",\"children\":[\"使用 ← → 方向键或空格键切换幻灯片，按 F 键全屏查看\",[\"$\",\"$Ld\",null,{\"href\":\"/slides/web/javascript-API\",\"className\":\"ml-4 text-blue-600 hover:text-blue-800 underline\",\"children\":\"全屏查看\"}]]}],[\"$\",\"$Le\",null,{\"slides\":[{\"id\":\"slide-1\",\"content\":\"# JavaScript API\"},{\"id\":\"slide-2\",\"content\":\"## 什么是 API\\n\\n应用程序编程接口 (Application Programming Interface, API) 是大部分高级语言都具备的结构，编程语言的开发人员将一些基础功能封装起来，提供给编程者很方便的通过函数/对象方法等途径使用。\\n\\n![插座](/img/plug-socket.png){:style=\\\"width:60%;border:none;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\",\"children\":[{\"id\":\"slide-3\",\"content\":\"### 有哪些 API\\n\\n回顾我们开始学习的时候提到，API 分为 JavaScript 内置 API ，浏览器 API 和第三方 API ，实际上 JavaScript 还可以脱离浏览器在 Node 之类的环境中运行，那么这些环境也会给 JavaScript 提供 API 来方便大家编写程序，不过本节我们只关注浏览器和一些第三方的 API ，不会提到 Node 。\\n\\n{:style=\\\"font-size:60%;\\\"}\\n\\n![浏览器](/img/browser.png){:style=\\\"width:60%;border:none;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-4\",\"content\":\"### API 如何工作\\n\\n大部分 API 都是以对象的形式提供的，也就是它们也是基于对象的，比如我们之前例子中常用的 console.log() 实际上就是文档对象模型中的 Console 对象的一个方法；而 Math.random() 则是 JavaScript 内置的 Math 对象的一个方法。\\n\\n```js\\nconsole.log(\\\"Hello, world.\\\");\\n\\nMath.random();\\n```\"},{\"id\":\"slide-5\",\"content\":\"### API 与事件\\n\\n部分 API 包含对事件的处理与响应，能够通过上节课提到的事件机制来处理复杂的操作，比如非常常用的用于与服务器通讯的 API XMLHttpRequest 就使用事件机制处理收到的响应。\\n\\n```js\\nvar requestURL =\\n  \\\"https://mdn.github.io/learning-area/javascript/oojs/json/superheroes.json\\\";\\nvar request = new XMLHttpRequest();\\nrequest.open(\\\"GET\\\", requestURL);\\nrequest.responseType = \\\"json\\\";\\nrequest.send();\\n\\nrequest.onload = function() {\\n  var superHeroes = request.response;\\n  console.log(superHeroes);\\n};\\n```\"}]},{\"id\":\"slide-6\",\"content\":\"## 浏览器相关 API\\n\\n浏览器相关的 API 主要包括三个对象，通过访问这三个对象的属性和方法，我们可以完成绝大多数浏览器上的交互和功能。navigator 对象主要用来访问用户代理状态和标识，包括地理位置、摄像头、麦克风等辅助信息；window 对象则表示窗口相关的属性，包括当前窗口大小、当前 URL 等信息；document 对象则是最常用的对象，表示载入的页面内容。\\n\\n{:style=\\\"font-size:60%;\\\"}\\n\\n![浏览器相关API](/img/document-window-navigator.png){:style=\\\"width:60%;border:none;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\",\"children\":[{\"id\":\"slide-7\",\"content\":\"### 文档对象模型\\n\\n浏览器载入一个 HTML 页面后，会将其转化为一个文档对象模型，\\n\\n```html\\n\u003c!DOCTYPE html\u003e\\n\u003chtml\u003e\\n  \u003chead\u003e\\n    \u003cmeta charset=\\\"utf-8\\\" /\u003e\\n    \u003ctitle\u003eSimple DOM example\u003c/title\u003e\\n  \u003c/head\u003e\\n  \u003cbody\u003e\\n    \u003csection\u003e\\n      \u003cimg\\n        src=\\\"dinosaur.png\\\"\\n        alt=\\\"A red Tyrannosaurus Rex: A two legged dinosaur standing upright like a human, with small arms, and a large head with lots of sharp teeth.\\\"\\n      /\u003e\\n      \u003cp\u003e\\n        Here we will add a link to the\\n        \u003ca href=\\\"https://www.mozilla.org/\\\"\u003eMozilla homepage\u003c/a\u003e\\n      \u003c/p\u003e\\n    \u003c/section\u003e\\n  \u003c/body\u003e\\n\u003c/html\u003e\\n```\\n\\n{:style=\\\"font-size:0.6em;float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\\\"}\\n\\n![DOM](/img/dom-screenshot.png)\\n\\n{:style=\\\"float:right;width:48%;padding:1%;height:420px;display:flex;align-items:center;\\\"}\"},{\"id\":\"slide-8\",\"content\":\"### 文档对象模型-节点\\n\\n文档对象模型中，每个 HTML 中的元素都可以找到对应的位置，可以很方便的访问。\\n\\n- 元素节点: 一个元素，存在于 DOM 中。\\n- 根节点: 树中顶层节点，在 HTML 的情况下，总是一个 HTML 节点。\\n- 子节点: 直接位于另一个节点内的节点。例如上面例子中，IMG 是 SECTION 的子节点。\\n- 后代节点: 位于另一个节点内任意位置的节点。例如 上面例子中，IMG 是 SECTION 的子节点，也是一个后代节点。IMG 不是 BODY 的子节点，因为它在树中低了 BODY 两级，但它是 BODY 的后代之一。\\n- 父节点: 里面有另一个节点的节点。例如上面的例子中 BODY 是 SECTION 的父节点。\\n- 兄弟节点: DOM 树中位于同一等级的节点。例如上面例子中，IMG 和 P 是兄弟。\\n- 文本节点: 包含文字串的节点\\n\\n{:style=\\\"font-size:60%;\\\"}\"}]},{\"id\":\"slide-9\",\"content\":\"## AJAX\\n\\n回顾一下我们第一节课学习的 Web 服务器，工作的过程，发现一个问题，如果我们要更新页面的一部分，按照这个模型我们需要重新发起一个 HTTP GET 请求一个新的页面。这是不合理的，我也许只需要更新一个数值，没必要把整个页面重新获取一遍，效率太低了。\\n\\n{:style=\\\"font-size:60%;\\\"}\\n\\n![Web Server](/img/web-site-architechture.png){:style=\\\"width:70%;border:none;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\",\"children\":[{\"id\":\"slide-10\",\"content\":\"### AJAX 技术\\n\\n为了解决以上问题，结合我们前面提到的 XMLHttpRequest，Web 开发者们提出一种新的更新网页内容的方法，叫做 Asynchronous JavaScript and XML，简称 AJAX。虽然发展到今天已经不光请求 XML 还会请求 JSON 等其他格式文件，但是 AJAX 这个名字还是保存了下来。\\n\\n{:style=\\\"font-size:60%;\\\"}\\n\\n![AJAX](/img/moderne-web-site-architechture.png){:style=\\\"width:70%;border:none;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-11\",\"content\":\"### AJAX 请求\\n\\n我们使用 XMLHttpRequest 来请求一些在线的服务的例子来学习如何实现这种局部的页面更新过程。假设我们需要根据用户下拉选择的不同城市来显示相应的天气预报，其他的页面内容不变。\\n\\n- [HFS 服务器](hfs.exe)\\n- [demo.zip](demo.zip)\\n\\n{:style=\\\"font-size:60%;\\\"}\\n\\n下载以上两个文件，解压 `demo.zip` 到 `demo` 文件夹，打开 `hfs.exe` 服务器并将 `demo` 文件夹加入到服务器中，使得该网站可以在你的电脑上访问。然后在地址栏中输入 `http://localhost/demo/` 来查看执行效果。\"}]},{\"id\":\"slide-12\",\"content\":\"## Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: justify;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":false,\"course\":\"web\",\"chapter\":\"javascript-API\"}],[\"$\",\"div\",null,{\"className\":\"flex justify-between items-center mt-6 pt-6 border-t border-gray-200\",\"children\":[[\"$\",\"$Ld\",null,{\"href\":\"/courses/web/javascript-blocks\",\"className\":\"flex items-center text-blue-600 hover:text-blue-800\",\"children\":[[\"$\",\"svg\",null,{\"className\":\"w-4 h-4 mr-1\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"viewBox\":\"0 0 24 24\",\"children\":[\"$\",\"path\",null,{\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"strokeWidth\":2,\"d\":\"M15 19l-7-7 7-7\"}]}],\"上一章：\",\"JavaScript 代码块\"]}],[\"$\",\"$Ld\",null,{\"href\":\"/courses/web/javascript-oo\",\"className\":\"flex items-center text-blue-600 hover:text-blue-800\",\"children\":[\"下一章：\",\"JavaScript 面向对象\",[\"$\",\"svg\",null,{\"className\":\"w-4 h-4 ml-1\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"viewBox\":\"0 0 24 24\",\"children\":[\"$\",\"path\",null,{\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"strokeWidth\":2,\"d\":\"M9 5l7 7-7 7\"}]}]]}]]}]]}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
