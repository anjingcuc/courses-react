003e\n      \u003cinput type=\"text\" name=\"item\" id=\"item\" /\u003e\n      \u003cbutton\u003e添加\u003c/button\u003e\n    \u003c/div\u003e\n\n    \u003cul\u003e\u003c/ul\u003e\n\n    \u003cscript\u003e\n      const list = document.querySelector(\"ul\");\n      const input = document.querySelector(\"input\");\n      const button = document.querySelector(\"button\");\n\n      button.onclick = function() {\n        let myItem = input.value;\n        input.value = \"\";\n\n        const listItem = document.createElement(\"li\");\n        const listText = document.createElement(\"span\");\n        const listBtn = document.createElement(\"button\");\n\n        listItem.appendChild(listText);\n        listText.textContent = myItem;\n        listItem.appendChild(listBtn);\n        listBtn.textContent = \"删除\";\n        list.appendChild(listItem);\n\n        listBtn.onclick = function(e) {\n          list.removeChild(listItem);\n        };\n\n        input.focus();\n      };\n    \u003c/script\u003e\n  \u003c/body\u003e\n\u003c/html\u003e\n```"])</script><script>self.__next_f.push([1,"4:[\"$\",\"div\",null,{\"className\":\"max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8\",\"children\":[[\"$\",\"nav\",null,{\"className\":\"mb-6 text-sm\",\"children\":[[\"$\",\"$Ld\",null,{\"href\":\"/\",\"className\":\"text-blue-600 hover:text-blue-800\",\"children\":\"首页\"}],[\"$\",\"span\",null,{\"className\":\"mx-2 text-gray-400\",\"children\":\"/\"}],[\"$\",\"$Ld\",null,{\"href\":\"/courses/web\",\"className\":\"text-blue-600 hover:text-blue-800\",\"children\":\"网页设计与制作\"}],[\"$\",\"span\",null,{\"className\":\"mx-2 text-gray-400\",\"children\":\"/\"}],[\"$\",\"span\",null,{\"className\":\"text-gray-600\",\"children\":\"jQuery\"}]]}],[\"$\",\"div\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"text-2xl font-bold text-gray-900\",\"children\":\"jQuery\"}],[\"$\",\"p\",null,{\"className\":\"text-sm text-gray-500 mt-1\",\"children\":[\"网页设计与制作\",\" - 第 \",12,\"
