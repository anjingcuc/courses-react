":\"mx-2 text-gray-400\",\"children\":\"/\"}],[\"$\",\"$Ld\",null,{\"href\":\"/courses/web\",\"className\":\"text-blue-600 hover:text-blue-800\",\"children\":\"网页设计与制作\"}],[\"$\",\"span\",null,{\"className\":\"mx-2 text-gray-400\",\"children\":\"/\"}],[\"$\",\"span\",null,{\"className\":\"text-gray-600\",\"children\":\"JavaScript 面向对象\"}]]}],[\"$\",\"div\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"text-2xl font-bold text-gray-900\",\"children\":\"JavaScript 面向对象\"}],[\"$\",\"p\",null,{\"className\":\"text-sm text-gray-500 mt-1\",\"children\":[\"网页设计与制作\",\" - 第 \",11,\" 章\"]}]]}],[\"$\",\"div\",null,{\"className\":\"bg-blue-50 text-blue-800 text-sm px-4 py-2 rounded-lg mb-4\",\"children\":[\"使用 ← → 方向键或空格键切换幻灯片，按 F 键全屏查看\",[\"$\",\"$Ld\",null,{\"href\":\"/slides/web/javascript-oo\",\"className\":\"ml-4 text-blue-600 hover:text-blue-800 underline\",\"children\":\"全屏查看\"}]]}],[\"$\",\"$Le\",null,{\"slides\":[{\"id\":\"slide-1\",\"content\":\"# 面向对象的 JavaScript\"},{\"id\":\"slide-2\",\"content\":\"## 对象基础\\n\\nJavaScript 是一种面向对象的语言，同时，在 JavaScript 中实际上所有类型都是一种对象。\\n\\n```javascript\\nlet person = {};\\n\\ntypeof person;\\n```\",\"children\":[{\"id\":\"slide-3\",\"content\":\"### 对象实例\\n\\n完善上面的这个对象如下。\\n\\n```javascript\\nlet person = {\\n  // 属性\\n  name: [\\\"An\\\", \\\"Jing\\\"],\\n  age: 32,\\n  gender: \\\"male\\\",\\n  interests: [\\\"gaming\\\", \\\"skiing\\\"],\\n\\n  // 方法\\n  bio: function() {\\n    alert(\\n      this.name[0] +\\n        \\\" \\\" +\\n        this.name[1] +\\n        \\\" is \\\" +\\n        this.age +\\n        \\\" years old. He likes \\\" +\\n        this.interests[0] +\\n        \\\" and \\\" +\\n        this.interests[1] +\\n        \\\".\\\"\\n    );\\n  },\\n  greeting: function() {\\n    alert(\\\"Hi! I'm \\\" + this.name[0] + \\\".\\\");\\n  }\\n};\\n```\"},{\"id\":\"slide-4\",\"content\":\"### 对象成员的访问\\n\\n对象中的成员包括两大类，属性和方法。属性实际上就是对象中的一些变量，而方法实际上就是对象中的一些函数。访问这些成员我们一般有两种访问形式，点表示法和括号表示法，常用的是点表示法\\n\\n```javascript\\nperson.name;\\nperson.bio();\\n\\nperson[\\\"name\\\"];\\nperson[\\\"bio\\\"]();\\n```\"},{\"id\":\"slide-5\",\"content\":\"### 子命名空间\\n\\n属性的值可以是任意类型，包括对象，也就是说某个属性的值可以是一个新的对象，这个时候我们可以把这个属性叫做一个子命名空间(namespace)来访问这个子对象内部的属性，比如：\\n\\n```javascript\\nperson = {\\n  name: { first: \\\"AN\\\", last: \\\"JING\\\" }\\n};\\n\\nperson.name.first;\\nperson[\\\"name\\\"][\\\"first\\\"];\\n```\"},{\"id\":\"slide-6\",\"content\":\"### 设置成员\\n\\n在对象中，我们不仅可以更新属性和方法的内容，还可以新增成员。\\n\\n```javascript\\nperson.name.first = \\\"Steve\\\";\\nperson.name.last = \\\"Jobs\\\";\\n\\nperson.hairColor = \\\"Red\\\";\\n\\nperson.talk = function() {\\n  alert(\\\"Stay hungry. Stay foolish.\\\");\\n};\\n```\"},{\"id\":\"slide-7\",\"content\":\"## \\\"this\\\" 的作用\\n\\n在对象的方法中，如果想访问对象本身的其他属性或者方法，需要使用 \\\"this\\\" 这个关键词。\\n\\n```javascript\\nperson = {\\n  greeting: function() {\\n    alert(\\\"Hi! I\\\\'m \\\" + this.name + \\\".\\\");\\n  };\\n}\\n```\"},{\"id\":\"slide-8\",\"content\":\"### 全是对象？\\n\\n之前我们提到，所有的数据类型都是一种对象。\\n\\n```javascript\\nlet students = \\\"小明,小红\\\";\\n\\nstudents.split(\\\",\\\"); // 调用了字符串对象的 split 方法来分割字符串得到一个数组。\\n\\ndocument.querySelector(\\\"p\\\"); // 调用了文档对象的选择元素方法来选中 p 元素。\\n\\nlet age = 18;\\nage.isNumber();\\n```\"}]},{\"id\":\"slide-9\",\"content\":\"## 面向对象基础\\n\\n面向对象是一种编程思想，大部分高级语言都支持面向对象的编程方法。对于统一类型的对象，面向对象的编程语言都需要一个模板来定义这些对象拥有哪些属性和方法，比如说，所有的 person 对象都得有名字有年龄等等，我们把这样的模板叫做类 (Class)。\\n\\n![类](/img/person-diagram.png){:style=\\\"border:none;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\",\"children\":[{\"id\":\"slide-10\",\"content\":\"### 类的实例化\\n\\n我们根据一个模板也就是类创建出一个新的对象的过程，就叫做的实例化的过程，这样我们可以根据一个叫做 Person 的 Class 实例化出非常多不同的 person，他们拥有相同的构造，但是名字等等属性又有所区别。\\n\\n{:style=\\\"font-size:60%\\\"}\\n\\n![实例化](/img/MDN-Graphics-instantiation-2.png){:style=\\\"width:70%;border:none;\\\"}\\n\\n{:style=\\\"text-align:center;\\\"}\"},{\"id\":\"slide-11\",\"content\":\"### 构建函数和对象\\n\\n在 JavaScript 中，没有 Class 关键字来定义一个新的类，我们直接使用构建函数或叫构造函数来初始化一个对象。\\n\\n```javascript\\n// 一个普通函数\\nfunction createNewPerson(name) {\\n  var obj = {};\\n  obj.name = name;\\n  obj.greeting = function() {\\n    alert(\\\"Hi! I'm \\\" + this.name + \\\".\\\");\\n  };\\n  return obj;\\n}\\n\\n// 构造函数\\nfunction Person(name) {\\n  this.name = name;\\n  this.greeting = function() {\\n    alert(\\\"Hi! I'm \\\" + this.name + \\\".\\\");\\n  };\\n}\\n\\nlet teacher = createNewPerson(\\\"anjing\\\");\\n\\nlet student = new Person(\\\"anjing\\\");\\n```\"},{\"id\":\"slide-12\",\"content\":\"### 正式的构造函数\\n\\n我们可以根据本节开头的 person 对象写出一个完整的构造函数 Person。\\n\\n```javascript\\nfunction Person(first, last, age, gender, interests) {\\n  this.name = {\\n    first: first,\\n    last: last\\n  };\\n  this.age = age;\\n  this.gender = gender;\\n  this.interests = interests;\\n  this.bio = function() {\\n    alert(\\n      this.name.first +\\n        \\\" \\\" +\\n        this.name.last +\\n        \\\" is \\\" +\\n        this.age +\\n        \\\" years old. He likes \\\" +\\n        this.interests[0] +\\n        \\\" and \\\" +\\n        this.interests[1] +\\n        \\\".\\\"\\n    );\\n  };\\n  this.greeting = function() {\\n    alert(\\\"Hi! I'm \\\" + this.name.first + \\\".\\\");\\n  };\\n}\\n\\nvar person1 = new Person(\\\"An\\\", \\\"Jing\\\", 32, \\\"male\\\", [\\\"gaming\\\", \\\"skiing\\\"]);\\n```\"},{\"id\":\"slide-13\",\"content\":\"### 另一种方便的创建对象的方法\\n\\n使用 Object.create() 方法可以快速的创建根据一个已经存在的对象创建一个新的对象。\\n\\n```javascript\\nlet person2 = Object.create(person1);\\n```\"}]},{\"id\":\"slide-14\",\"content\":\"### 一般面型对象中的继承\\n\\n在其他的面向对象编程语言中，类与类之间有一种关系叫做继承，比如我们人还可以按照职业细分，比如教师，那么我们可以在 Person 的基础上创建一个 Teacher 类。\\n\\n{:style=\\\"font-size:60%\\\"}\\n\\n![继承](/img/MDN-Graphics-inherited-3.png){:style=\\\"width:70%;border:none;\\\"}\\n\\n{:style=\\\"text-align:center;\\\"}\",\"children\":[{\"id\":\"slide-15\",\"content\":\"### 原型链\\n\\nJavaScript 中的继承是一种基于原型的继承，要理解继承，需要先理解原型。每个对象都有一个原型，原型，原型又有原型，这种层层传递的关系叫做原型链。\\n\\n1. 构造函数有一个属性叫做 `prototype` 对应一个原型；\\n2. 通过这个构造函数实例化的对象有一个属性叫做 `__proto__` 和构造函数的 `prototype` 指向同一个原型；\\n3. 这个原型也有自己的 `__proto__` 属性指向它的原型。\\n\\n{:style=\\\"font-size:70%\\\"}\"},{\"id\":\"slide-16\",\"content\":\"### 原型链示例\\n\\n以我们之前的 Person 构造函数为例，我们来看看它的原型链是什么样的。我们可以在浏览器开发者工具中实例化一个 person1 然后分析 `person1.__proto__` 和 `Person.prototype` 的关系，并查看这个原型的原型是谁。\\n\\n![原型链](/img/MDN-Graphics-person-person-object-2.png){:style=\\\"border:none;\\\"}\\n\\n{:style=\\\"text-align:center;\\\"}\"},{\"id\":\"slide-17\",\"content\":\"### 对象成员的搜索顺序\\n\\n对象的成员中包含了自己的所有上级原型的成员。他们按照特定的顺序向上搜索。假如我们输入 `person1.valueOf()`，那么浏览器按照以下顺序搜索：\\n\\n1. 首先检查 `person1` 对象是否具有可用的 `valueOf()` 方法。\\n2. 如果没有，则浏览器检查 `person1` 对象的原型，即 `person1.__proto__` 或 `Person.prototype` 指向的那个原型，否具有可用的 `valueof()` 方法。\\n3. 如果也没有，则浏览器检查第 2 步中的原型的原型，即 `person1.__proto__.__proto__` 或 `Person.prototype.__proto__`，实际上就是 `Object构造函数` 的 `prototype` 属性所指向的对象是否具有可用的 `valueOf()` 方法。\\n4. 这里有这个方法，于是该方法被调用。\\n\\n{:style=\\\"font-size:70%\\\"}\"},{\"id\":\"slide-18\",\"content\":\"### 利用 prototype 实现继承\\n\\n在 JavaScript 中，继承关系是通过 `prototype` 来实现的，`Obejct` 构造函数实际上由非常多的[属性和方法](https://developer.mozilla.org/zh-CN/docs/Web/JavaScript/Reference/Global_Objects/Object)，但只有一部分被继承了——那些在 `prototype` 中定义的属性和方法会被继承。\\n\\n{:style=\\\"font-size:80%\\\"}\\n\\n```javascript\\nPerson.prototype;\\n\\nObject.prototype;\\n```\"},{\"id\":\"slide-19\",\"content\":\"### constructor 属性\\n\\n每个实例对象都要从原型中继承一个 construtor 属性，这个属性指向了构造该实例对象的构造函数。\\n\\n```javascript\\nperson1.constructor;\\n\\nlet person2 = new person1.constructor(\\\"Bill\\\", \\\"Gates\\\", 64, \\\"male\\\", [\\n  \\\"Money\\\",\\n  \\\"Charity\\\"\\n]);\\n```\"},{\"id\":\"slide-20\",\"content\":\"### 修改原型\\n\\n右键另存[oojs-class-further-exercises.html](oojs-class-further-exercises.html)并打开开发者工具的 Console 标签，对原型进行修改并观察结果。\\n\\n```javascript\\nPerson.prototype.farewell = function() {\\n  alert(this.name.first + \\\" has left the building. Bye for now!\\\");\\n};\\n\\nperson1.farewell();\\n```\"},{\"id\":\"slide-21\",\"content\":\"### 定义构造函数的最佳实践\\n\\n一般来说，在定义构造函数时，会将属性都直接定义在构造函数中，然后通过对构造函数的 `prototype` 属性赋予新的方法的形式来定义方法。\\n\\n{:style=\\\"font-size:80%\\\"}\\n\\n```javascript\\nfunction Person(first, last, age, gender, interests) {\\n  this.name = {\\n    first: first,\\n    last: last\\n  };\\n  this.age = age;\\n  this.gender = gender;\\n  this.interests = interests;\\n}\\n\\nPerson.prototype.bio = function() {\\n  alert(\\n    this.name.first +\\n      \\\" \\\" +\\n      this.name.last +\\n      \\\" is \\\" +\\n      this.age +\\n      \\\" years old. He likes \\\" +\\n      this.interests[0] +\\n      \\\" and \\\" +\\n      this.interests[1] +\\n      \\\".\\\"\\n  );\\n};\\n\\nPerson.prototype.greeting = function() {\\n  alert(\\\"Hi! I'm \\\" + this.name.first + \\\".\\\");\\n};\\n```\"}]},{\"id\":\"slide-22\",\"content\":\"## 继承实例\\n\\n我们在学习了原型的基础上，来利用原型的机制，实现我们前面提到的 Teacher 这个构造函数。右键另存[oojs-class-inheritance-start.html](oojs-class-inheritance-start.html)开始实验。\\n\\n1. Teacher 类包含一个新的属性，subject——这个属性包含了教师教授的学科。\\n2. 一个新的 greeting()方法，这个方法听起来比原来的更加正式一些。\\n\\n{:style=\\\"font-size:70%\\\"}\",\"children\":[{\"id\":\"slide-23\",\"content\":\"### 定义 Teacher 构造函数\\n\\n第一件事是添加一个 Teacher 构造函数。创建的时候，利用 Person 的 call() 方法来从 Person 的构造函数中继承所有的属性。\\n\\n{:style=\\\"font-size:80%\\\"}\\n\\n```javascript\\n// 不合理的写法\\nfunction Teacher(first, last, age, gender, interests, subject) {\\n  this.name = {\\n    first,\\n    last\\n  };\\n  this.age = age;\\n  this.gender = gender;\\n  this.interests = interests;\\n  this.subject = subject;\\n}\\n\\n// 正确的写法，使用了 Person.call() 这个方法来将所有 Person 中的属性继承过来。\\nfunction Teacher(first, last, age, gender, interests, subject) {\\n  Person.call(this, first, last, age, gender, interests);\\n\\n  this.subject = subject;\\n}\\n```\"},{\"id\":\"slide-24\",\"content\":\"### 设置 Teacher 的原型和 constructor\\n\\n完成上面的工作以后，在开发者工具中访问 Teacher.prototype 发现没有 Person.prototype 中包含的方法，所以我们要为其赋值。赋值后还要将 Teacher.prototype.constructor 修订成正确的构造函数 Teacher 。\\n\\n{:style=\\\"font-size:80%\\\"}\\n\\n```javascript\\nTeacher.prototype = Object.create(Person.prototype);\\n\\nTeacher.prototype.constructor = Teacher;\\n```\"},{\"id\":\"slide-25\",\"content\":\"### 修改 greeting 函数\\n\\n接下来就可以为 Teacher 编写新的 greeting 函数了。\\n\\n{:style=\\\"font-size:80%\\\"}\\n\\n```javascript\\nTeacher.prototype.greeting = function() {\\n  var prefix;\\n\\n  if (\\n    this.gender === \\\"male\\\" ||\\n    this.gender === \\\"Male\\\" ||\\n    this.gender === \\\"m\\\" ||\\n    this.gender === \\\"M\\\"\\n  ) {\\n    prefix = \\\"Mr.\\\";\\n  } else if (\\n    this.gender === \\\"female\\\" ||\\n    this.gender === \\\"Female\\\" ||\\n    this.gender === \\\"f\\\" ||\\n    this.gender === \\\"F\\\"\\n  ) {\\n    prefix = \\\"Mrs.\\\";\\n  } else {\\n    prefix = \\\"Mx.\\\";\\n  }\\n\\n  alert(\\n    \\\"Hello. My name is \\\" +\\n      prefix +\\n      \\\" \\\" +\\n      this.name.last +\\n      \\\", and I teach \\\" +\\n      this.subject +\\n      \\\".\\\"\\n  );\\n};\\n```\"},{\"id\":\"slide-26\",\"content\":\"### 恭喜\\n\\n你已经从 Person 中继承了一个 Teacher 类，可以开始玩耍了。\\n\\n{:style=\\\"font-size:80%\\\"}\\n\\n```javascript\\nvar teacher1 = new Teacher(\\n  \\\"An\\\",\\n  \\\"Jing\\\",\\n  32,\\n  \\\"male\\\",\\n  [\\\"gaming\\\", \\\"skiing\\\"],\\n  \\\"computer\\\"\\n);\\n\\nteacher1.greeting();\\nteacher1.subject;\\n```\"}]},{\"id\":\"slide-27\",\"content\":\"## JSON\\n\\nJSON (JavaScript Object Notation) 是一种参考了 JavaScript 的对象语法的数据格式，广泛用于网络中传递数据。\\n\\n{:style=\\\"font-size:80%\\\"}\\n\\n```json\\n{\\n  \\\"game\\\": \\\"英雄联盟\\\",\\n  \\\"company\\\": \\\"Riot Games\\\",\\n  \\\"heroes\\\": [\\n    {\\n      \\\"name\\\": \\\"加里奥\\\",\\n      \\\"skills\\\": [\\\"巨像重击\\\", \\\"战争罡风\\\", \\\"杜朗护盾\\\", \\\"正义冲拳\\\", \\\"英雄登场\\\"]\\n    },\\n    {\\n      \\\"name\\\": \\\"霞\\\",\\n      \\\"skills\\\": [\\\"锐切\\\", \\\"双刃\\\", \\\"致死羽衣\\\", \\\"倒钩\\\", \\\"暴风羽刃\\\"]\\n    },\\n    {\\n      \\\"name\\\": \\\"锤石\\\",\\n      \\\"skills\\\": [\\n        \\\"地狱诅咒\\\",\\n        \\\"死亡判决\\\",\\n        \\\"魂引之灯\\\",\\n        \\\"厄运钟摆\\\",\\n        \\\"幽冥监牢\\\",\\n        \\\"集魂者\\\"\\n      ]\\n    },\\n    {\\n      \\\"name\\\": \\\"盲僧\\\",\\n      \\\"skills\\\": [\\n        \\\"疾风骤雨\\\",\\n        \\\"天音波/回音击\\\",\\n        \\\"金钟罩/铁布衫\\\",\\n        \\\"天雷破/摧筋断骨\\\",\\n        \\\"猛龙摆尾\\\"\\n      ]\\n    },\\n    {\\n      \\\"name\\\": \\\"船长\\\",\\n      \\\"skills\\\": [\\\"烈火审讯\\\", \\\"枪火谈判\\\", \\\"坏血病疗法\\\", \\\"火药桶\\\", \\\"加农炮幕\\\"]\\n    }\\n  ]\\n}\\n```\",\"children\":[{\"id\":\"slide-28\",\"content\":\"### 通过 JSON 动态的构建页面\\n\\n我们将 JSON 赋值给一个变量后可以通过分析这个 JSON 的内容，动态的创建一个页面来介绍这些英雄。\\n首先创建一个包含 `\u003csection\u003e` 元素的页面，然后在 JavaScript 中获取该元素并执行以下代码来完成英雄技能展示。\\n\\n{:style=\\\"font-size:70%\\\"}\\n\\n```javascript\\nfunction showHeroes(jsonObj) {\\n  var heroes = jsonObj[\\\"heroes\\\"];\\n\\n  for (i = 0; i \u003c heroes.length; i++) {\\n    var myArticle = document.createElement(\\\"article\\\");\\n    var myH2 = document.createElement(\\\"h2\\\");\\n    var myList = document.createElement(\\\"ul\\\");\\n\\n    myH2.textContent = heroes[i].name;\\n\\n    var skills = heroes[i].skills;\\n    for (j = 0; j \u003c skills.length; j++) {\\n      var listItem = document.createElement(\\\"li\\\");\\n      listItem.textContent = skills[j];\\n      myList.appendChild(listItem);\\n    }\\n\\n    myArticle.appendChild(myH2);\\n    myArticle.appendChild(myList);\\n\\n    section.appendChild(myArticle);\\n  }\\n}\\n```\"}]},{\"id\":\"slide-29\",\"content\":\"## Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: justify;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":false,\"course\":\"web\",\"chapter\":\"javascript-oo\"}],[\"$\",\"div\",null,{\"className\":\"flex justify-between items-center mt-6 pt-6 border-t border-gray-200\",\"children\":[[\"$\",\"$Ld\",null,{\"href\":\"/courses/web/javascript-API\",\"className\":\"flex items-center text-blue-600 hover:text-blue-800\",\"children\":[[\"$\",\"svg\",null,{\"className\":\"w-4 h-4 mr-1\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"viewBox\":\"0 0 24 24\",\"children\":[\"$\",\"path\",null,{\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"strokeWidth\":2,\"d\":\"M15 19l-7-7 7-7\"}]}],\"上一章：\",\"JavaScript DOM API\"]}],[\"$\",\"$Ld\",null,{\"href\":\"/courses/web/jQuery\",\"className\":\"flex items-center text-blue-600 hover:text-blue-800\",\"children\":[\"下一章：\",\"jQuery\",[\"$\",\"svg\",null,{\"className\":\"w-4 h-4 ml-1\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"viewBox\":\"0 0 24 24\",\"children\":[\"$\",\"path\",null,{\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"strokeWidth\":2,\"d\":\"M9 5l7 7-7 7\"}]}]]}]]}]]}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
