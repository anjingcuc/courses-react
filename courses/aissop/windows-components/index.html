-2 rounded-lg mb-4\",\"children\":[\"使用 ← → 方向键或空格键切换幻灯片，按 F 键全屏查看\",[\"$\",\"$Ld\",null,{\"href\":\"/slides/aissop/windows-components\",\"className\":\"ml-4 text-blue-600 hover:text-blue-800 underline\",\"children\":\"全屏查看\"}]]}],[\"$\",\"$Le\",null,{\"slides\":[{\"id\":\"slide-1\",\"content\":\"# Windows 组件\"},{\"id\":\"slide-2\",\"content\":\"## 用户与账户\",\"children\":[{\"id\":\"slide-3\",\"content\":\"### 设置\\r\\n\\r\\n![用户账户设置](/img/user-init.png){:style=\\\"width:70%;\\\"}\\r\\n\\r\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-4\",\"content\":\"### Windows 内置用户帐号\\r\\n\\r\\nWindows 默认内置了多个不同权限的账号。\\r\\n\\r\\n- \u003cb style=\\\"color:red;\\\"\u003eAdministrator\u003c/b\u003e用户，该帐号为系统默认的管理员帐号，该帐户具有 Windows 的最高管理权限，默认禁用。\\r\\n- \u003cb style=\\\"color:red;\\\"\u003eGuest\u003c/b\u003e用户，来宾账户，可运行部分抵权限程序，查看部分文件，该类型用户无法永久地改变其桌面的工作环境。\\r\\n\\r\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-5\",\"content\":\"### 用户组\\r\\n\\r\\n把类型相同的一些用户帐号放置在一个组群中，方便对其进行全局的权限和服务的设置管理，Windows 设置了一些初始用户组:\\r\\n\\r\\n- Administrators，即管理员组，该组用户对计算机/域有不受限制的完全访问权，分配给该组的默认权限允许对整个系统进行完全控制。\\r\\n- Power Users，即高级用户组，Power Users 可以执行除了为 Administrators 组保留的任务外的其他任何操作系统任务。\\r\\n- Users，即普通用户组，默认权限不允许成员修改操作系统的设置或用户资料。\\r\\n- Guests，即来宾组，来宾组跟普通组 Users 的成员有同等访问权，但来宾帐户的限制更多。\\r\\n- Everyone，即所有的用户，这个计算机上的所有用户都属于这个组。\\r\\n- SYSTEM，即系统组，这个组拥有比 Administrators 更高的权限，这个组主要是保证了系统服务的正常运行，赋予系统及系统服务的权限。\\r\\n\\r\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-6\",\"content\":\"### 命令行添加用户账户\\r\\n\\r\\nWIN + R 键打开命令行。\\r\\n\\r\\n```powershell\\r\\nnet user /?\\r\\n此命令的语法是:\\r\\n\\r\\nNET USER\\r\\n[username [password | *] [options]] [/DOMAIN]\\r\\n         username {password | *} /ADD [options] [/DOMAIN]\\r\\n         username [/DELETE] [/DOMAIN]\\r\\n         username [/TIMES:{times | ALL}]\\r\\n         username [/ACTIVE: {YES | NO}]\\r\\n```\"},{\"id\":\"slide-7\",\"content\":\"### 操作用户命令\\r\\n\\r\\n以下是一些操作用户的命令示例，请注意 `\u003c\u003e` 之间的内容需要替换成你需要的值：\\r\\n\\r\\n```powershell\\r\\nnet user                              # 查看用户\\r\\nnet user \u003cusername\u003e \u003cpassword\u003e /add   # 添加用户\\r\\nnet user \u003cusername\u003e /delete           # 删除用户\\r\\n```\"},{\"id\":\"slide-8\",\"content\":\"### 用户组操作\\r\\n\\r\\n同样可以对用户组进行操作。\\r\\n\\r\\n```powershell\\r\\nnet localgroup /?\\r\\n此命令的语法是:\\r\\n\\r\\nNET LOCALGROUP\\r\\n[groupname [/COMMENT:\\\"text\\\"]] [/DOMAIN]\\r\\n              groupname {/ADD [/COMMENT:\\\"text\\\"] | /DELETE}  [/DOMAIN]\\r\\n              groupname name [...] {/ADD | /DELETE} [/DOMAIN]\\r\\n```\"},{\"id\":\"slide-9\",\"content\":\"### 操作用户组命令\\r\\n\\r\\n以下是一些操作用户组的命令示例，请注意 `\u003c\u003e` 之间的内容需要替换成你需要的值：\\r\\n\\r\\n```powershell\\r\\nnet localgroup                              # 查看用户组\\r\\nnet localgroup \u003cgroupname\u003e /add             # 添加用户组\\r\\nnet localgroup \u003cgroupname\u003e /delete          # 删除用户组\\r\\nnet localgroup \u003cgroupname\u003e \u003cusername\u003e /add  # 将用户加入某组\\r\\n```\"}]},{\"id\":\"slide-10\",\"content\":\"## 进程与线程\",\"children\":[{\"id\":\"slide-11\",\"content\":\"### 任务栏管理器\\r\\n\\r\\n通过右键 Windows 任务栏，可以打开任务栏管理器，可以查看进程。\\r\\n\\r\\n![任务栏管理器](/img/task_manager.png){:style=\\\"width:70%;\\\"}\\r\\n\\r\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-12\",\"content\":\"### 查看当前计算机状态\\r\\n\\r\\n可以使用任务栏管理器查看计算机状态。\\r\\n\\r\\n- 查看 CPU 使用情况。\\r\\n- 查看内存使用情况。\\r\\n- 根据需要结束进程。\\r\\n\\r\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-13\",\"content\":\"$f\"},{\"id\":\"slide-14\",\"content\":\"### 进程\\r\\n\\r\\n进程与可执行程序的区别：\\r\\n\\r\\n- “可执行程序”不等于“进程”。\\r\\n- “可执行程序”是静态的文件。\\r\\n- “进程”则是操作系统加载可执行程序后管理的对象。\\r\\n\\r\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-15\",\"content\":\"### 线程\\r\\n\\r\\n线程的基本概念，在学习编程过程中可能遇到多线程问题。\\r\\n\\r\\n- 线程包含于进程中，线程是 Windows 操作系统的指令执行最小调度单位，线程唯一标识为 TID。\\r\\n- 同一进程内的多个线程可以实现数据共享，多线程间执行切换需要系统内核调度。\\r\\n\\r\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-16\",\"content\":\"## 常见进程简介\\r\\n\\r\\nWindows 正常运行需要多个系统进程实现基本功能，常见的系统有:\\r\\n\\r\\n- System 进程，Windows 内存处理系统进程；用于实现 Windows 页面内存管理的进程，最高优先级。\\r\\n- System Idle Process 进程，Windows 空闲进程；表示 CPU 的空闲率。\\r\\n- csrss 进程，客户端服务子系统（Client/Server Runtime Subsystem）；用以控制 Windows 图形相关子系统\\r\\n- Lsass 进程，本地安全权限服务；本地安全权限服务控制 Windows 安全机制。\\r\\n- Services 进程，Windows 服务控制；管理 Windows 服务。\\r\\n- Spoolsv 进程，打印机服务；用于使打印机就绪。\\r\\n- Svchost 进程，主机服务程序；标准的动态链接库主机处理服务。\\r\\n- Winlogon 进程，Windows 登陆进程；Windows 用户的登陆程序。\\r\\n- Taskmgr 进程，Windows 任务管理器；执行 Windows 的任务。\\r\\n- Explorer 进程，Windows 资源管理器；管理 Windows 图形 Shell，包括开始菜单，任务栏，桌面和文件管理。\\r\\n\\r\\n{:style=\\\"font-size:60%;\\\"}\"},{\"id\":\"slide-17\",\"content\":\"### 进程查看进阶工具\"},{\"id\":\"slide-18\",\"content\":\"### Process Explorer\\r\\n\\r\\n找出进程打开了哪些文件、注册表项和其他对象以及已加载哪些 DLL 等信息。\\r\\n\\r\\n![PE](/img/procexp.png){:style=\\\"width:60%;\\\"}\\r\\n\\r\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-19\",\"content\":\"### Process Monitor\\r\\n\\r\\n实时监视文件系统、注册表、进程、线程和 DLL 活动。\\r\\n\\r\\n![PM](/img/procmon.png){:style=\\\"width:60%;\\\"}\\r\\n\\r\\n{:style=\\\"text-align:center\\\"}\"}]},{\"id\":\"slide-20\",\"content\":\"## 注册表\",\"children\":[{\"id\":\"slide-21\",\"content\":\"## 简介\\r\\n\\r\\n注册表在 windows 系统的配置和控制方面扮演了一个非常关键的角色，它既是系统全局设置的存储仓库，也是每个用户的设置信息的存储仓库。\"},{\"id\":\"slide-22\",\"content\":\"## 打开方式\\r\\n\\r\\n快捷键 Win + R 打开运行窗口，输入`regedit`并在弹出`UAC`对话框中选择允许。\\r\\n\\r\\n![注册表](/img/regedit.png){:style=\\\"width:70%;\\\"}\\r\\n\\r\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-23\",\"content\":\"## 五个根节点\\r\\n\\r\\nWindows 下注册表是一个树状结构，主要包含 5 个根节点。\\r\\n\\r\\n- HKEY_CLASSES_ROOT，存储各类不同文件扩展名对应的默认打开程序。\\r\\n- HKEY_CURRENT_USER，当前用户的配置数据信息。\\r\\n- HKEY_LOCAL_MACHINE，硬件、计算机所有用户的配置数据信息。\\r\\n- HKEY_USERS，计算机默认用户的配置文件和已知用户的配置文件的子项。\\r\\n- HKEY_CURRENT_CONFIG，当前硬件配置信息。\\r\\n\\r\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-24\",\"content\":\"## 注册表常见作用\\r\\n\\r\\n注册表的作用：\\r\\n\\r\\n- 记录各种软件的注册信息\\r\\n- 保存系统及软件配置\\r\\n- 保存系统自启动项\\r\\n\\r\\n{:style=\\\"font-size:70%;\\\"}\"}]},{\"id\":\"slide-25\",\"content\":\"## Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\r\\n    text-align: justify;\\r\\n    font-size: 0.8em;\\r\\n  }\\r\\n  .reveal ul {\\r\\n    display: block;\\r\\n  }\\r\\n  .reveal ol {\\r\\n    display: block;\\r\\n  }\",\"fullscreen\":false,\"course\":\"aissop\",\"chapter\":\"windows-components\"}],[\"$\",\"div\",null,{\"className\":\"flex justify-between items-center mt-6 pt-6 border-t border-gray-200\",\"children\":[[\"$\",\"$Ld\",null,{\"href\":\"/courses/aissop/virtualbox\",\"className\":\"flex items-center text-blue-600 hover:text-blue-800\",\"children\":[[\"$\",\"svg\",null,{\"className\":\"w-4 h-4 mr-1\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"viewBox\":\"0 0 24 24\",\"children\":[\"$\",\"path\",null,{\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"strokeWidth\":2,\"d\":\"M15 19l-7-7 7-7\"}]}],\"上一章：\",\"VirtualBox 虚拟化\"]}],[\"$\",\"$Ld\",null,{\"href\":\"/courses/aissop/maintain\",\"className\":\"flex items-center text-blue-600 hover:text-blue-800\",\"children\":[\"下一章：\",\"系统维护\",[\"$\",\"svg\",null,{\"className\":\"w-4 h-4 ml-1\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"viewBox\":\"0 0 24 24\",\"children\":[\"$\",\"path\",null,{\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"strokeWidth\":2,\"d\":\"M9 5l7 7-7 7\"}]}]]}]]}]]}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
