ext-gray-400\",\"children\":\"/\"}],[\"$\",\"$Ld\",null,{\"href\":\"/courses/aissop\",\"className\":\"text-blue-600 hover:text-blue-800\",\"children\":\"智能系统安全运维与实践\"}],[\"$\",\"span\",null,{\"className\":\"mx-2 text-gray-400\",\"children\":\"/\"}],[\"$\",\"span\",null,{\"className\":\"text-gray-600\",\"children\":\"VirtualBox 虚拟化\"}]]}],[\"$\",\"div\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"text-2xl font-bold text-gray-900\",\"children\":\"VirtualBox 虚拟化\"}],[\"$\",\"p\",null,{\"className\":\"text-sm text-gray-500 mt-1\",\"children\":[\"智能系统安全运维与实践\",\" - 第 \",6,\" 章\"]}]]}],[\"$\",\"div\",null,{\"className\":\"bg-blue-50 text-blue-800 text-sm px-4 py-2 rounded-lg mb-4\",\"children\":[\"使用 ← → 方向键或空格键切换幻灯片，按 F 键全屏查看\",[\"$\",\"$Ld\",null,{\"href\":\"/slides/aissop/virtualbox\",\"className\":\"ml-4 text-blue-600 hover:text-blue-800 underline\",\"children\":\"全屏查看\"}]]}],[\"$\",\"$Le\",null,{\"slides\":[{\"id\":\"slide-1\",\"content\":\"# 虚拟机\"},{\"id\":\"slide-2\",\"content\":\"## 什么是虚拟机？\\n\\n虚拟机是指通过软件模拟一套独立运行的硬件环境，用户可以在这个虚拟硬件环境上运行任何系统。虚拟机中运行的系统与物理主机隔离。常见的虚拟机软件包括：\\n\\n- Hyper-V\\n- Oracle Virtualbox\\n- VMWare 系列\\n- Parallels Desktop (macOS only)\\n\\n{:style=\\\"font-size: 70%;\\\"}\",\"children\":[{\"id\":\"slide-3\",\"content\":\"### 主要用途\\n\\n在软件测试、信息安全、云计算等多种领域广泛使用。\\n\\n- 体验各种操作系统环境\\n- 可重复利用的实验环境\\n- 为用户提供独立的空间\\n\\n{:style=\\\"font-size: 70%;\\\"}\"},{\"id\":\"slide-4\",\"content\":\"### 软件测试角度\\n\\n虚拟机能够安装多种不同的做系统，构建各种异构的网络环境，帮助测试。\\n\\n- 多样化网络环境测试\\n- 多操作系统兼容测试\\n\\n{:style=\\\"font-size: 70%;\\\"}\"},{\"id\":\"slide-5\",\"content\":\"### 信息安全角度\\n\\n虚拟机能够提供隔离、安全的环境来使用危险工具和分析恶意样本，同时也能够构建各种虚拟环境练习渗透技术。\\n\\n- 恶意代码检测分析\\n- 单机模拟攻防环境\\n- 本地操作系统调试\\n\\n{:style=\\\"font-size: 70%;\\\"}\"},{\"id\":\"slide-6\",\"content\":\"### 云计算角度\\n\\n云服务、云计算领域大量采用虚拟化技术为用户提供即开即用的计算资源和服务。\\n\\n- 基础设施即服务的关键技术\\n- 独立虚拟主机(VPS)\\n\\n{:style=\\\"font-size: 70%;\\\"}\"}]},{\"id\":\"slide-7\",\"content\":\"## 虚拟机相关概念\",\"children\":[{\"id\":\"slide-8\",\"content\":\"### 主机操作系统\\n\\n主机操作系统(Host OS)是指虚拟机软件安装、运行的操作系统环境，比如本课在 Windows 上安装 Virtualbox，那么 Windows 就是主机操作系统。\"},{\"id\":\"slide-9\",\"content\":\"### 客机操作系统\\n\\n客机操作系统(Guest OS)是指运行虚拟机软件配构建一台虚拟机后，在虚拟机内运行的操作系统，比如可以在 Virtualbox 中新建一台虚拟机安装 Windows，同时新建另一台虚拟机安装 Kali Linux，那么 Windows 和 Kali 都是客机操作系统。\"},{\"id\":\"slide-10\",\"content\":\"### 客机增强件\\n\\n客机增强件(Guest Additions)是运行在客机操作系统上的一个程序，能够帮助为客机操作系统提供驱动支持，还包含拖放文件、共享粘贴板、自适应显示窗口等高级功能。\"}]},{\"id\":\"slide-11\",\"content\":\"## Virtualbox 主要配置\\n\\n由于 Virtualbox 开源免费，本课中实验环境采用 Virtualbox 虚拟机。\\n\\n- 虚拟 CPU\\n- 虚拟内存\\n- 虚拟硬盘\\n- 虚拟网络\\n\\n{:style=\\\"font-size: 70%;\\\"}\",\"children\":[{\"id\":\"slide-12\",\"content\":\"## 内存与 CPU\\n\\n根据需求和主机配置来分配，一般不超过 1/2。\"},{\"id\":\"slide-13\",\"content\":\"### 虚拟硬盘\\n\\n虚拟磁盘实际上在主机操作系统中就是一个特定格式的文件。\\n\\n- 支持多种硬盘格式: VDI / VHD / VMDK\\n- 支持多种存放方式: 动态分配 / 固定大小\\n\\n{:style=\\\"font-size: 70%;\\\"}\"},{\"id\":\"slide-14\",\"content\":\"### 虚拟网络\\n\\nVirtualbox 的客机虚拟网络分为以下几种：\\n\\n|                | NAT | 桥接 | 内部网络 | Host-Only |\\n| -------------- | --- | ---- | -------- | --------- |\\n| 客机-\u003e主机     | 是  | 是   | 不       | 是        |\\n| 主机-\u003e客机     | 不  | 是   | 不       | 是        |\\n| 客机-\u003e其他主机 | 是  | 是   | 不       | 是        |\\n| 其他主机-\u003e客机 | 不  | 是   | 不       | 不        |\\n| 客机之间       | 不  | 是   | 同子网   | 是        |\\n\\n{:style=\\\"font-size: 70%;\\\"}\"}]},{\"id\":\"slide-15\",\"content\":\"## 文件传输\",\"children\":[{\"id\":\"slide-16\",\"content\":\"### 共享文件夹\\n\\n在主客机之间传输文件，共享文件夹是一种比较方便的办法，需要在主机上配置 Virtualbox:\\n\\n- 添加 `固定分配` 共享文件夹\\n- 选择需要共享的文件夹并设置共享名\\n- 根据需求选择是否`自动挂载`或`只读分配`\\n\\n{:style=\\\"font-size: 70%;\\\"}\\n\\n客机上进行以下配置：\\n\\n- Windows 下使用`映射网络驱动器功能`并映射路`\\\\\\\\vboxsvr\\\\share_name`\\n- Linux 下先创建空文件夹如`/mnt/share`，然后 shell 中输入命令:\\n\\n{:style=\\\"font-size: 70%;\\\"}\\n\\n```bash\\nsudo mount -t vboxsf share_name /mnt/share\\n```\"},{\"id\":\"slide-17\",\"content\":\"### 其他传输方法\\n\\n安装客机增强件后还可以采用以下方法实现文件传输：\\n\\n- 开启拖放功能实现文件拖放\\n- 使用 U 盘等设备实现文件复制\\n\\n{:style=\\\"font-size: 70%;\\\"}\"}]},{\"id\":\"slide-18\",\"content\":\"## 快照与迁移\",\"children\":[{\"id\":\"slide-19\",\"content\":\"### 快照\\n\\n虚拟机在任何状态下都可以暂停或称之为挂起，也可以对当前状态进行快照。对于专业相关实验尤其方便，任何时候都可以通过恢复快照还原系统状态。\\n\\n- 保存当前客机的系统、文件、运行状态\\n- 需要时通过恢复快照回到所保存的状态\\n- 即使虚拟机进行了迁移也能恢复快照\\n- 删除快照并不会影响虚拟机当前的状态\\n\\n{:style=\\\"font-size: 70%;\\\"}\"},{\"id\":\"slide-20\",\"content\":\"### 迁移\\n\\n如果要分享自己的虚拟机给其他人或者在不同电脑之间移动虚拟机，则可以采用以下方法进行迁移：\\n\\n- 最简单的迁移方式就是直接复制整个客机文件夹\\n- 还可以使用导出导入功能在不同虚拟机软件之间迁移\\n\\n{:style=\\\"font-size: 70%;\\\"}\"}]},{\"id\":\"slide-21\",\"content\":\"## Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: justify;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":false,\"course\":\"aissop\",\"chapter\":\"virtualbox\"}],[\"$\",\"div\",null,{\"className\":\"flex justify-between items-center mt-6 pt-6 border-t border-gray-200\",\"children\":[[\"$\",\"$Ld\",null,{\"href\":\"/courses/aissop/shell\",\"className\":\"flex items-center text-blue-600 hover:text-blue-800\",\"children\":[[\"$\",\"svg\",null,{\"className\":\"w-4 h-4 mr-1\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"viewBox\":\"0 0 24 24\",\"children\":[\"$\",\"path\",null,{\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"strokeWidth\":2,\"d\":\"M15 19l-7-7 7-7\"}]}],\"上一章：\",\"Shell 命令\"]}],[\"$\",\"$Ld\",null,{\"href\":\"/courses/aissop/windows-components\",\"className\":\"flex items-center text-blue-600 hover:text-blue-800\",\"children\":[\"下一章：\",\"Windows 组件\",[\"$\",\"svg\",null,{\"className\":\"w-4 h-4 ml-1\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"viewBox\":\"0 0 24 24\",\"children\":[\"$\",\"path\",null,{\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"strokeWidth\":2,\"d\":\"M9 5l7 7-7 7\"}]}]]}]]}]]}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"
