tional Digital Publishing Forum) 提出个一个电子书格式。EPUB 同样是一种压缩格式，它包含多个 XHTML 文件。\"},{\"id\":\"slide-9\",\"content\":\"### MOBI\\n\\nMOBI, \u003cb style=\\\"color:red;\\\"\u003eMOBI\u003c/b\u003epocket 格式是由一家法国公司为早期的智能手机以及个人数字助理（PDA）推出的一种电子书格式，同时推出的还有一款 MOBI 电子书阅读软件。同样是一种基于 XHTML 的电子书格式。在智能手机发展的初期特别常见，MOBI 电子书的阅读软件往往支持非常丰富的标注、编辑等功能。\"},{\"id\":\"slide-10\",\"content\":\"### AZW3\\n\\nAZW 又称为 Kindle File Format ，是亚马逊随 Kindle 推出的一种基于 MOBI 的电子书格式，而 AZW3 则是在 AZW 基础上持续改进的一种电子书格式，加入了 HTML5 和 CSS 的支持。\"}]},{\"id\":\"slide-11\",\"content\":\"## 工具软件\",\"children\":[{\"id\":\"slide-12\",\"content\":\"### PDF 工具\\n\\nPDF 受众广泛，工具众多，单独梳理工具软件如下表所示。\\n\\n| 软件名称           | 是否收费 | 是否可编辑 | 特点                               |\\n| ------------------ | -------- | ---------- | ---------------------------------- |\\n| Adobe Acrobat      | 是       | 是         | 功能最完善的 PDF 全能处理工具      |\\n| 福昕阅读器 (Foxit) | 否       | 否         | 高级版收费且提供可编辑功能         |\\n| Sumatra PDF        | 否       | 否         | 开源软件，且支持本节介绍的其他格式 |\\n| ABBYY FineReader   | 是       | 是         | PDF 文本识别 (OCR) 领域最强软件    |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-13\",\"content\":\"### 电子书工具软件\\n\\n通用的电子书阅读、制作、编辑软件也为数众多，calibre 是其中受众较多的免费开源通用软件，支持多种格式，能阅读能制作还能实现格式转换。\"}]},{\"id\":\"slide-14\",\"content\":\"## 格式对比汇总\",\"children\":[{\"id\":\"slide-15\",\"content\":\"### 功能支持比较\\n\\n本节介绍的几种格式在功能上有所差异，如下表所示。\\n\\n| 格式 | 版权保护 | 图片 | 注释标注   | 书签       |\\n| ---- | -------- | ---- | ---------- | ---------- |\\n| TXT  | 否       | 否   | 否         | 否         |\\n| PDF  | 是       | 是   | 是         | 是         |\\n| CHM  | 否       | 是   | 否         | 否         |\\n| EPUB | 是       | 是   | 需软件支持 | 需软件支持 |\\n| MOBI | 是       | 是   | 是         | 是         |\\n| AZW3 | 是       | 是   | 是         | 是         |\\n\\n{:style=\\\"font-size:70%;\\\"}\"}]},{\"id\":\"slide-16\",\"content\":\"# Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: left;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":false,\"course\":\"online-publishing\",\"chapter\":\"digital-book\"}],[\"$\",\"div\",null,{\"className\":\"flex justify-between items-center mt-6 pt-6 border-t border-gray-200\",\"children\":[[\"$\",\"$Ld\",null,{\"href\":\"/courses/online-publishing/css\",\"className\":\"flex items-center text-blue-600 hover:text-blue-800\",\"children\":[[\"$\",\"svg\",null,{\"className\":\"w-4 h-4 mr-1\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"viewBox\":\"0 0 24 24\",\"children\":[\"$\",\"path\",null,{\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"strokeWidth\":2,\"d\":\"M15 19l-7-7 7-7\"}]}],\"上一章：\",\"CSS 样式\"]}],null]}]]}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
