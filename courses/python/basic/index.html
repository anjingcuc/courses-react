:\"/\"}],[\"$\",\"$Ld\",null,{\"href\":\"/courses/python\",\"className\":\"text-blue-600 hover:text-blue-800\",\"children\":\"Python 程序设计\"}],[\"$\",\"span\",null,{\"className\":\"mx-2 text-gray-400\",\"children\":\"/\"}],[\"$\",\"span\",null,{\"className\":\"text-gray-600\",\"children\":\"基本概念\"}]]}],[\"$\",\"div\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"text-2xl font-bold text-gray-900\",\"children\":\"基本概念\"}],[\"$\",\"p\",null,{\"className\":\"text-sm text-gray-500 mt-1\",\"children\":[\"Python 程序设计\",\" - 第 \",2,\" 章\"]}]]}],[\"$\",\"div\",null,{\"className\":\"bg-blue-50 text-blue-800 text-sm px-4 py-2 rounded-lg mb-4\",\"children\":[\"使用 ← → 方向键或空格键切换幻灯片，按 F 键全屏查看\",[\"$\",\"$Ld\",null,{\"href\":\"/slides/python/basic\",\"className\":\"ml-4 text-blue-600 hover:text-blue-800 underline\",\"children\":\"全屏查看\"}]]}],[\"$\",\"$Le\",null,{\"slides\":[{\"id\":\"slide-1\",\"content\":\"# 基本概念\"},{\"id\":\"slide-2\",\"content\":\"## 环境配置\",\"children\":[{\"id\":\"slide-3\",\"content\":\"### 下载 Python\\n\\n开始学习 Python 之前，我们需要先下载好 Python 的安装包，并配置好环境。官方网站: https://www.python.org/ 。下载页面: https://www.python.org/downloads/ 。\\n\\n{:style=\\\"font-size:60%;\\\"}\\n\\n![下载 Python](/img/python_download.png){:style=\\\"width:80%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-4\",\"content\":\"### 安装 Python\\n\\n![安装 Python](/img/python_install.png){:style=\\\"width:80%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-5\",\"content\":\"### 编写代码\\n\\nPython 安装包默认提供一个集成开发学习环境 (Integrated Development and Learning Environment, IDLE) 我们可以用来编写、运行代码。\\n\\n![运行 Python](/img/python_idle_edit.png)\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-6\",\"content\":\"### 运行程序\\n\\n在 IDLE 中编写完成代码后，我们可以保存为扩展名 `.py` 的文件，并按 `F5` 执行该文件或者在 IDLE 的菜单中选择 Run 来执行。\\n\\n![运行 Python](/img/python_idle_run.png)\\n\\n{:style=\\\"text-align:center\\\"}\"}]},{\"id\":\"slide-7\",\"content\":\"## 编译型与解释型语言\\n\\n- 为什么 Python 源代码不需要像 C 语言一样进行 Build 就能运行？\\n- C 语言的源代码需要经过编译链接的过程，生成目标代码，C 语言编译后得到的目标代码是机器码，可以直接在 CPU 上执行。\\n- Python 语言依赖解释器即 Python.exe 来解释执行源代码。\",\"children\":[{\"id\":\"slide-8\",\"content\":\"### 处理流程区别\\n\\n![编译型VS解释型](/img/compile_vs_interpret.jpg){:style=\\\"width:85%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-9\",\"content\":\"### Python 程序基本结构\\n\\n```python\\nimport random # 导入 random 库\\n\\n###############以上是所需模块导入过程###############\\n\\ndef roll():\\n    print(random.randrange(1,7))\\n\\n###############   以上是函数定义   ###############\\n\\nprint(\\\"无论如何都会执行并打印\\\")\\n\\n###############   以上是独立语句   ###############\\n\\nif __name__==\\\"__main__\\\":\\n    roll()\\n\\n###############   以上是测试入口   ###############\\n```\"}]},{\"id\":\"slide-10\",\"content\":\"## Python 程序的运行\",\"children\":[{\"id\":\"slide-11\",\"content\":\"### 运行方式 1-交互式模式逐行输入\\n\\n1. 安装好 Python 开发环境后，直接在命令行中输入 `python` 回车来进入解释器的交互模式；或者在开始菜单中找到 Python 安装后自带的 IDLE 来进入交互模式。\\n\\n2. 逐行输入程序语句并观察输出。\"},{\"id\":\"slide-12\",\"content\":\"### 运行方式 2-命令行中命令执行\\n\\n1. 新建文本文件。\\n2. 修改后缀名为 `.py`, 即 Python 源代码文件。\\n3. 将源代码写入该源代码文件并保存，假设为 `src.py`。\\n4. 进入命令行切换到文件所在目录输入 `python src.py` 来运行该文件。\"},{\"id\":\"slide-13\",\"content\":\"### 运行方式 3-集成开发环境中运行/调试\\n\\n1. 在 IDLE 等集成开发环境中，通过菜单或者软件提供的快捷键来执行程序。\"}]},{\"id\":\"slide-14\",\"content\":\"## VSCode\\n\\n本课程推荐使用 Visual Studio Code 安装插件的方式来作为集成开发环境。\\n\\n1. 跨平台 Windows / macOS / Linux。\\n2. 支持多种编程语言，装 1 个就够了。\",\"children\":[{\"id\":\"slide-15\",\"content\":\"### 下载 VSCode\\n\\n访问官方网站: https://code.visualstudio.com/ 下载安装包。\\n\\n![VSCode安装](/img/vscode-download.png)\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-16\",\"content\":\"### 安装 VSCode\\n\\n运行安装程序并参考下图选择安装选项。\\n\\n![VSCode安装](/img/vscode-install.png){:style=\\\"width:66%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-17\",\"content\":\"### 配置扩展\\n\\n安装并启动 VSCode 后配置扩展，首先安装中文语言包，即在 Extensions 页面搜索关键字 `Chinese` 安装 Microsoft 官方出的语言包，然后再安装 Python 扩展，同样在 Extensions 页面搜索关键字 `Python` 安装 Microsoft 官方出品的扩展。\\n\\n{:style=\\\"font-size:0.6em;\\\"}\\n\\n![VSCode 扩展](/img/vscode-extensions.png){:style=\\\"width:90%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-18\",\"content\":\"### 编写并执行程序\\n\\n配置好 VSCode 以后，我们就可以使用 VSCode 运行刚才的小乌龟画图实例代码。\\n\\n![VSCode 扩展](/img/vscode-run.png){:style=\\\"width:90%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"}]},{\"id\":\"slide-19\",\"content\":\"## 本章小节\\n\\n1. 学习 Python 之前需要先下载安装 Python 。\\n2. Python 是一种解释型语言，开发简单，运行效率有待提升。\\n3. 有多种方式运行 Python 程序，我个人推荐命令行运行。\\n4. 本课程使用 Python 3 并将 VSCode 作为集成开发环境。\"},{\"id\":\"slide-20\",\"content\":\"## Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: left;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":false,\"course\":\"python\",\"chapter\":\"basic\"}],[\"$\",\"div\",null,{\"className\":\"flex justify-between items-center mt-6 pt-6 border-t border-gray-200\",\"children\":[[\"$\",\"$Ld\",null,{\"href\":\"/courses/python/introduction\",\"className\":\"flex items-center text-blue-600 hover:text-blue-800\",\"children\":[[\"$\",\"svg\",null,{\"className\":\"w-4 h-4 mr-1\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"viewBox\":\"0 0 24 24\",\"children\":[\"$\",\"path\",null,{\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"strokeWidth\":2,\"d\":\"M15 19l-7-7 7-7\"}]}],\"上一章：\",\"课程概述\"]}],[\"$\",\"$Ld\",null,{\"href\":\"/courses/python/data-types-basic\",\"className\":\"flex items-center text-blue-600 hover:text-blue-800\",\"children\":[\"下一章：\",\"基础数据类型\",[\"$\",\"svg\",null,{\"className\":\"w-4 h-4 ml-1\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"viewBox\":\"0 0 24 24\",\"children\":[\"$\",\"path\",null,{\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"strokeWidth\":2,\"d\":\"M9 5l7 7-7 7\"}]}]]}]]}]]}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-
