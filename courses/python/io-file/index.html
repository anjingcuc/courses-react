ile.read(size=-1)`                 | 可选，以字节为单位的读取长度，不填则返回整个文件内容             | 返回一个字符串或者二进制 bytes                     |\n| `file.readline(size=-1)`             | 可选，以字节为单位的读取长度，不填则返回整行                     | 返回一个字符串，包含换行符`\\n`                     |\n| `file.readlines(hint=-1)`            | 可选，读取的行数，不填则返回所有行                               | 返回一个字符串或者二进制 bytes 组成的列表          |\n| `file.write(s)`                      | 一个要写入的字符串                                               | 返回成功写入的字符数量                             |\n| `file.tell()`                        | 无                                                               | 返回一个整数，表示目前访问的文件位置在多少个字节处 |\n| `file.seek(offset, whence=SEEK_SET)` | `offset`表示将当前位置移到偏移处，`whence`表示从哪里开始计算偏移 | 返回一个整数，新的文件位置                         |\n\n{:style=\"font"])</script><script>self.__next_f.push([1,"-size:50%;\"}"])</script><script>self.__next_f.push([1,"4:[\"$\",\"div\",null,{\"className\":\"max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8\",\"children\":[[\"$\",\"nav\",null,{\"className\":\"mb-6 text-sm\",\"children\":[[\"$\",\"$Ld\",null,{\"href\":\"/\",\"className\":\"text-blue-600 hover:text-blue-800\",\"children\":\"首页\"}],[\"$\",\"span\",null,{\"className\":\"mx-2 text-gray-400\",\"children\":\"/\"}],[\"$\",\"$Ld\",null,{\"href\":\"/courses/python\",\"className\":\"text-blue-600 hover:text-blue-800\",\"children\":\"Python 程序设计\"}],[\"$\",\"span\",null,{\"className\":\"mx-2 text-gray-400\",\"children\":\"/\"}],[\"$\",\"span\",null,{\"className\":\"text-gray-600\",\"children\":\"输入输出与文件操作\"}]]}],[\"$\",\"div\",null,{\"className\":\"mb-6\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"text-2xl font-bold text-gray-900\",\"children\":\"输入输出与文件操作\"}],[\"$\",\"p\",null,{\"className\":\"text-sm text-gray-500 mt-1\",\"children\":[\"Python 程序设计\",\" - 第 \",6,\" 章\"]}]]}],[\"$\",\"div\",null,{\"className\":\"bg-blue-50 text-blue-800 text-sm px-4 py-2 rounded-lg mb-4\",\"children\":[\"使用 ← → 方向键或空格键切换幻灯片，按 F 键全屏查看\",[\"$\",\"$Ld\",null,{\"href\":\"/slides/python/io-file\",\"className\":\"ml-4 text-blue-600 hover:text-blue-800 underline\",\"children\":\"全屏查看\"}]]}],[\"$\",\"$Le\",null,{\"slides\":[{\"id\":\"slide-1\",\"content\":\"# 输入输出\"},{\"id\":\"slide-2\",\"content\":\"## 输入-input 函数\\n\\n示例代码中有两句使用了输入函数 input , 在终端输出提示信息后等待用户输入，并将输入保存到返回值中。\\n\\n- 函数原型: input([prompt])\\n- 参数 prompt : 可选，提示字符串。\\n- 返回值: 无\\n\\n{:style=\\\"font-size:60%;\\\"}\",\"children\":[{\"id\":\"slide-3\",\"content\":\"### 输出-print 函数\\n\\n经典输出函数 print , 用于在终端（系统标准输出）或文件中显示参数指定的内容。\\n\\n- 函数原型: print(\\\\*objects, sep=' ', end='\\\\n', file=sys.stdout, flush=False)\\n- 参数 \\\\*objects: 表示任意个数的参数\\n- 参数 sep: 多个参数输出时使用的分隔符，默认分割符为一个空格，即 ' ' 。\\n- 参数 end: 输出结束后的自动追加的字符，默认追加一个换行符 `\\\\n` 来实现自动换行。\\n- 参数 file: 指定 print 输出的位置，默认输出到标准系统输入 sys.stdout 也就是终端/命令行中，也可以指定文件对象。\\n- 参数 flush: Python 3.3 后加入的内容，如果存在文件缓存的话表示是否立刻写入文件。\\n- 返回值: 无\\n\\n{:style=\\\"font-size:60%;\\\"}\"}]},{\"id\":\"slide-4\",\"content\":\"## 字符串格式化进阶\\n\\n除了类似 C 语言 printf 的格式化字符串意外，Python 提供了更方便快捷的字符串格式化方式。\",\"children\":[{\"id\":\"slide-5\",\"content\":\"### f-string\\n\\nf-string 又称为格式化字符串字面值，特点是简单易用，在字符串的开始之前加上一个 `f` 或 `F` 即可。\\n\\n```python\\nteacher = 'anjing'\\nage = 18\\n\\nprint(f'My teacher is {teacher}. He is {age} years old.')\\n```\"},{\"id\":\"slide-6\",\"content\":\"### format() 方法\\n\\n字符串对象提供 `str.format()` 方法来实现对输出内容的格式化。\\n\\n```python\\nteacher = 'anjing'\\nage = 18\\n\\nprint('My teacher is {}. He is {} years old.'.format(teacher, age))\\nprint('My teacher is {1}. He is {0} years old.'.format(age, teacher))\\nprint('My teacher is {t}. He is {a} years old.'.format(a=age, t=teacher))\\nprint('My teacher is {0}. He is {a} years old.'.format(teacher, a=age))\\n```\"},{\"id\":\"slide-7\",\"content\":\"### 格式规格迷你语言\\n\\n在使用以上字符串格式化方法时，都可以运用 `格式规格迷你语言` 来对输出的内容进行对齐、填充、正负号以及精度控制等操作。\\n\\n```python\\nimport random\\n\\n# 生成一个假的名单\\n# 包含 10 个学生\\nstudents = []\\nfor x in range(10):\\n    # 利用字母对应 ASCII 码增加来自动起名\\n    name = '小' + chr(ord('A') + x)\\n    student = {\\n        'name': name,\\n        'id': 20190001 + x,  # 按顺序生成学号\\n        'score': random.randint(60, 100)  # 随机一个成绩\\n    }\\n\\n    # 将一名学生对应的字典加入到名单中\\n    students.append(student)\\n\\n# 对名单进行排序，排序的key是每个学生的成绩，倒序\\nstudents.sort(key=lambda x: x['score'], reverse=True)\\n\\n# 输出排序后的成绩单\\nrank = 1\\nfor student in students:\\n    print(f'{rank:02d}. {student[\\\"name\\\"]:\u003e5} {student[\\\"score\\\"]:\u003c3d}')\\n    print('{:02d}. {:\u003e5} {:\u003c3d}'.format(rank, student['name'], student['score']))\\n    print('{0:02d}. {1[name]:\u003e5} {1[score]:\u003c3d}'.format(rank, student))\\n\\n    rank += 1\\n```\\n\\n_注：详见 https://docs.python.org/zh-cn/3/library/string.html#formatspec_\\n\\n{:style=\\\"font-size:50%;\\\"}\"}]},{\"id\":\"slide-8\",\"content\":\"## 文件读写\\n\\nPython 内置文件对象 `file` 使用 `open()` 函数打开文件并创建文件对象，最常见的用法有两个参数：`filename` 即文件名（文件路径），`mode` 即打开模式。\\n\\n```python\\nf = open('readme.md', 'r')\\n```\",\"children\":[{\"id\":\"slide-9\",\"content\":\"### mode 参数\\n\\n打开文件时，通过参数 `mode` 来指定打开方式。\\n\\n| 字符 | 意义                             |\\n| ---- | -------------------------------- |\\n| 'r'  | 读取（默认）                     |\\n| 'w'  | 写入，并先截断文件               |\\n| 'x'  | 排它性创建，如果文件已存在则失败 |\\n| 'a'  | 写入，如果文件存在则在末尾追加   |\\n| 'b'  | 二进制模式                       |\\n| 't'  | 文本模式（默认）                 |\\n| '+'  | 打开用于更新（读取并写入）       |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-10\",\"content\":\"$f\"},{\"id\":\"slide-11\",\"content\":\"### 练习\"}]},{\"id\":\"slide-12\",\"content\":\"## Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: left;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":false,\"course\":\"python\",\"chapter\":\"io-file\"}],[\"$\",\"div\",null,{\"className\":\"flex justify-between items-center mt-6 pt-6 border-t border-gray-200\",\"children\":[[\"$\",\"$Ld\",null,{\"href\":\"/courses/python/control-flow\",\"className\":\"flex items-center text-blue-600 hover:text-blue-800\",\"children\":[[\"$\",\"svg\",null,{\"className\":\"w-4 h-4 mr-1\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"viewBox\":\"0 0 24 24\",\"children\":[\"$\",\"path\",null,{\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"strokeWidth\":2,\"d\":\"M15 19l-7-7 7-7\"}]}],\"上一章：\",\"控制流\"]}],[\"$\",\"$Ld\",null,{\"href\":\"/courses/python/file-and-path\",\"className\":\"flex items-center text-blue-600 hover:text-blue-800\",\"children\":[\"下一章：\",\"文件与路径\",[\"$\",\"svg\",null,{\"className\":\"w-4 h-4 ml-1\",\"fill\":\"none\",\"stroke\":\"currentColor\",\"viewBox\":\"0 0 24 24\",\"children\":[\"$\",\"path\",null,{\"strokeLinecap\":\"round\",\"strokeLinejoin\":\"round\",\"strokeWidth\":2,\"d\":\"M9 5l7 7-7 7\"}]}]]}]]}]]}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
