.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z\",\"clipRule\":\"evenodd\"}]}],\"GitHub\"]}]}]]}]}]}]]}]}]],null],null],\"couldBeIntercepted\":false,\"initialHead\":[null,\"$La\"],\"globalErrorComponent\":\"$b\",\"missingSlots\":\"$Wc\"}]\n"])</script><script>self.__next_f.push([1,"d:I[55953,[\"924\",\"static/chunks/924-0ab8daba027740c3.js\",\"788\",\"static/chunks/app/slides/%5Bcourse%5D/%5Bchapter%5D/page-d12534b00ce90974.js\"],\"SlideContainer\"]\n"])</script><script>self.__next_f.push([1,"4:[\"$\",\"$Ld\",null,{\"slides\":[{\"id\":\"slide-1\",\"content\":\"# 模块与包\"},{\"id\":\"slide-2\",\"content\":\"## 模块\\n\\nPython 中可以将函数、变量以及类等放在一个文件中，并在另一个文件中进行引用。这样的文件称之为 `模块`，模块的名字就是文件名。\\n\\n![模块](/img/module.png)\",\"children\":[{\"id\":\"slide-3\",\"content\":\"### 模块导入的 N 种写法\\n\\n在 `main.py` 中，第一种会将 `calc` 作为`main.py`的全局变量，且通过`module.itemname` 类似的语法来访问其中的函数和变量；第二种方式类似于第一种，但此时将使用 `cc` 作为模块名字；第三种方式则会直接将模块中的函数或者变量导入 `main.py` 中，而不导入 `calc` ，此时在 `main.py` 中访问 `calc` 会报错，但可以直接使用 `sum` 等函数，而不用加 `calc.` ；第四种方式和第三种类似，但会导入所有内容，不推荐。\\n\\n```python\\nimport calc           # 导入名为 calc 的模块\\n\\nimport calc as cc     # 导入 calc 模块并命名为 cc\\n\\nfrom calc import sum  # 从 calc 模块中单独导入 sum\\n\\nfrom calc import *    # 导入所有符号，可以不用 modname. 直接使用\\n```\"},{\"id\":\"slide-4\",\"content\":\"### 模块的符号表\\n\\n一个模块可以包含直接执行的语句以及函数定义，还可以包含一些变量，用于初始化这个模块。这些内容在第一次 `import` 被执行。 开发者可以通过 `dir(modname)` 来得到一个模块的符号列表，然后可以通过 `modname.itemname` 来访问这个符号（函数或者变量）。\\n\\n```python\\nimport calc\\n\\nprint(dir(calc))\\n\\nprint(calc.sum(1, 2))\\n```\"},{\"id\":\"slide-5\",\"content\":\"### `__name__` 变量\\n\\nPython 将文件名不包含后缀的部分（也就是去掉`.py`）作为模块的名字，如上个示例中，就是用了 `calc` 这个模块。模块名可以通过模块内部的一个内置全局变量 `__name__` 来访问。而在模块被别的文件调用时，可以通过 `module.__name__` 的形式来访问。\\n\\n```python\\nimport calc\\n\\ncalc.__name__ # calc\\n```\"},{\"id\":\"slide-6\",\"content\":\"### 脚本方式执行\\n\\n在命令行中，可以脚本方式运行某一文件/模块，这种场景下，全局变量 `__name__` 的值为 `__main__`，因此在 Python 中常常通过判断 `__name__` 的值来编写测试用例。如要运行上例中的 `calc.py`，则进入该文件所在目录后输入 `python calc.py [arguments]` 。\\n\\n```python\\n# calc.py\\n# 省略函数定义...\\nif __name__ == '__main__':\\n  import sys           # 导入模块可以不在最开始\\n  a = int(sys.argv[1]) # 访问第一个参数\\n  b = int(sys.argv[2]) # 访问第二个参数\\n  print(sum(a, b))\\n```\\n\\n_注：sys 标准库参考文档 https://docs.python.org/zh-cn/3/library/sys.html_\\n\\n{:style=\\\"font-size:50%;\\\"}\"},{\"id\":\"slide-7\",\"content\":\"### sys 标准库\\n\\nPython 系统相关参数和函数。\\n\\n| 属性          | 描述                                           |\\n| ------------- | ---------------------------------------------- |\\n| sys.version   | 字符串，包含 Python 版本信息                   |\\n| sys.platform  | 字符串，包含操作系统信息                       |\\n| sys.path      | 列表，包含元素为字符串，存储了模块搜索路径     |\\n| sys.byteorder | 字符串，包含当前字节序，'little' / 'big'       |\\n| sys.argv      | 列表，包含元素为字符串，存储了被空格分割的参数 |\\n\\n{:style=\\\"font-size:70%;\\\"}\"}]},{\"id\":\"slide-8\",\"content\":\"## 模块的路径\\n\\n在导入模块的过程中，Python 内置了一个搜索规则来查找所需的模块：\\n\\n1. 内置模块\\n2. sys.path\\n   1. 包含输入脚本的目录（或者未指定文件时的当前目录）。\\n   2. PYTHONPATH （一个包含目录名称的列表，它和 shell 变量 PATH 有一样的语法）。\\n   3. 取决于安装的默认设置。\\n\\n{:style=\\\"font-size:70%;\\\"}\",\"children\":[{\"id\":\"slide-9\",\"content\":\"### 模块\\\"编译\\\"\\n\\nPython 会自动对每个模块进行编译来提升加载速度，编译好的模块名称规则为 `module.version.pyc` 被统一放在 `__pycache__` 目录中。比如，在 Python 3.8 版本下的 `calc.py` 编译后结果为 `calc.cpython-38.pyc` 。\\n\\n_注：一般打包源码或者提交到源代码管理工具时，请先删除或者忽略 `__pycache__` 目录。_\\n\\n{:style=\\\"font-size:50%;\\\"}\"}]},{\"id\":\"slide-10\",\"content\":\"## 包\\n\\n将多个文件/模块组织在一起，形成一个集合（文件夹）并向其他开发者提供，这个集合就称之为 `包` 。文件夹的最顶级子目录必须包含一个 `__init__.py` 来告诉 Python 解释器这个文件夹要当成一个包来处理，其内容可以做一些初始化操作也可以为空。\\n\\n```txt\\nsound/                      # Top-level package\\n  __init__.py               # Initialize the sound package\\n  formats/                  # Subpackage for file format conversions\\n    __init__.py\\n    wavread.py\\n    wavwrite.py\\n  effects/                  # Subpackage for sound effects\\n    __init__.py\\n    echo.py\\n```\",\"children\":[{\"id\":\"slide-11\",\"content\":\"### 包的 N 种导入方式\\n\\n```python\\nimport sound\\n\\nimport sound.formats\\n\\nimport sound.formats.wavread\\n\\nfrom sound.formats import wavread\\n\\nfrom sound.formats.wavread import read\\n```\"},{\"id\":\"slide-12\",\"content\":\"### 子包中使用相对路径相互导入\\n\\n```python\\n# wavread.py\\n\\nfrom . import wavwrite\\nfrom ..effects import echo\\n```\"},{\"id\":\"slide-13\",\"content\":\"### 包的导入所有库 \\\\*\\n\\n无法使用 `from sound.formats import *` 这类于法导入包中的所有模块。如果开发者在 `__init__.py` 中定义了列表变量 `__all__` ，并且其中包含了要导入的模块名字，那么在用 \\\\* 号导入时就会导入列表中的模块，否则仅仅导入包并执行其 `__init__.py` 。\"}]},{\"id\":\"slide-14\",\"content\":\"## Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: left;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":true,\"course\":\"python\",\"chapter\":\"lib-and-packages\"}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
