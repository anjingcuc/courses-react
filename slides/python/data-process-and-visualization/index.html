lign:center\\\"}\\n\\n_注: 图片来源于 https://www.geeksforgeeks.org/python-pandas-dataframe/ ；文档参考: https://pandas.pydata.org/pandas-docs/stable/reference/frame.html _\\n\\n{:style=\\\"font-size:60%;\\\"}\"}]},{\"id\":\"slide-7\",\"content\":\"## 可视化-matplotlib\\n\\nmatplotlib 是 Python 的全能图表库。\\n\\n可参考 https://matplotlib.org/gallery/index.html\",\"children\":[{\"id\":\"slide-8\",\"content\":\"### 结构说明\\n\\n![图表组成部分](/img/anatomy.png){:style=\\\"width:60%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-9\",\"content\":\"### 数据处理与可视化结合\\n\\npandas 依赖 matplotlib 提供了内置的绘图方法。\"}]},{\"id\":\"slide-10\",\"content\":\"## Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: left;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":true,\"course\":\"python\",\"chapter\":\"data-process-and-visualization\"}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
