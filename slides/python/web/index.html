8.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z\",\"clipRule\":\"evenodd\"}]}],\"GitHub\"]}]}]]}]}]}]]}]}]],null],null],\"couldBeIntercepted\":false,\"initialHead\":[null,\"$La\"],\"globalErrorComponent\":\"$b\",\"missingSlots\":\"$Wc\"}]\n"])</script><script>self.__next_f.push([1,"d:I[55953,[\"924\",\"static/chunks/924-0ab8daba027740c3.js\",\"788\",\"static/chunks/app/slides/%5Bcourse%5D/%5Bchapter%5D/page-d12534b00ce90974.js\"],\"SlideContainer\"]\n"])</script><script>self.__next_f.push([1,"4:[\"$\",\"$Ld\",null,{\"slides\":[{\"id\":\"slide-1\",\"content\":\"# Web 开发\"},{\"id\":\"slide-2\",\"content\":\"## Web 基本概念\\n\\n![Web 服务器](/img/browser_web.jpg){:style=\\\"width:100%;border-style: none;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\",\"children\":[{\"id\":\"slide-3\",\"content\":\"### 流程概览\\n\\n![页面获取流程](/img/MDN_get_a_page.png){:style=\\\"width:80%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"}]},{\"id\":\"slide-4\",\"content\":\"## Web 发展演变\\n\\n1. 静态网页\\n2. 动态网页\\n   1. Web 框架\\n   2. AJAX (\u003cb style=\\\"color:red;\\\"\u003eA\u003c/b\u003esynchronous \u003cb style=\\\"color:red;\\\"\u003eJ\u003c/b\u003eavaScript \u003cb style=\\\"color:red;\\\"\u003ea\u003c/b\u003end \u003cb style=\\\"color:red;\\\"\u003eX\u003c/b\u003eML)\\n3. 前端框架\",\"children\":[{\"id\":\"slide-5\",\"content\":\"### 静态网页\\n\\n一般是指直接以文件形式存放在服务器上的 HTML / CSS / JavaScript 组成的网页。这类页面生成后不会根据用户交互发生内容上的改变。\"},{\"id\":\"slide-6\",\"content\":\"### 动态网页 (1/4)\\n\\nCGI - \u003cb style=\\\"color:red;\\\"\u003eC\u003c/b\u003eommon \u003cb style=\\\"color:red;\\\"\u003eG\u003c/b\u003eateway \u003cb style=\\\"color:red;\\\"\u003eI\u003c/b\u003enterface\\n\\n- 通用网关接口；\\n- 定义了一系列环境变量和接口；\\n- 实现与其他程序对接，提供更加复杂的在线服务。\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-7\",\"content\":\"### 动态网页 (2/4)\\n\\nFastCGI 在 CGI 基础上进行了优化：\\n\\n- 一个守护进程处理多个请求；\\n- 现在的主流对接方式；\\n- 支持绝大多数服务器；\\n- 支持绝大多数语言。\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-8\",\"content\":\"### 动态网页 (3/4)\\n\\nWSGI - \u003cb style=\\\"color:red;\\\"\u003eW\u003c/b\u003eeb \u003cb style=\\\"color:red;\\\"\u003eS\u003c/b\u003eerver \u003cb style=\\\"color:red;\\\"\u003eG\u003c/b\u003eateway \u003cb style=\\\"color:red;\\\"\u003eI\u003c/b\u003enterface，Python 实现的与 Web 服务器通信的接口标准。\\n\\n- 专门为 Python 提供的接口；\\n- 可使用 FastCGI 与 Web 服务器通信；\\n- 多种实现: uWSGI / Gunicorn。\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-9\",\"content\":\"### 动态网页 (4/4)\\n\\nWeb 开发者们提出一种新的更新网页内容的方法，叫做 Asynchronous JavaScript and XML，简称 AJAX。虽然发展到今天已经不光请求 XML 还会请求 JSON 等其他格式文件，但是 AJAX 这个名字还是保存了下来。\\n\\n![AJAX](/img/moderne-web-site-architechture.png){:style=\\\"width:80%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-10\",\"content\":\"### 前端框架\\n\\n移动终端爆发使得现在前端已经不能满足于仅仅浏览器看看网页，还进一步希望能提供一个完整的应用体验给用户，于是出现了前端框架 Vue / React / Angular 等。\"},{\"id\":\"slide-11\",\"content\":\"### 参考代码\\n\\nhttps://github.com/CUCSec/simple-flask-website\"}]},{\"id\":\"slide-12\",\"content\":\"## Flask 简介\\n\\nFlask 是一个微型 Web 框架，它基于 Werkzeug / Jinja2 开发。Werkzeug 实现 WSGI 和一个简单的 Web 服务器，Jinja2 模板引擎渲染 HTML 模板。\\n\\n![全栈](/img/fullstackpythonmap.jpg){:style=\\\"width:80%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\",\"children\":[{\"id\":\"slide-13\",\"content\":\"### 环境配置\\n\\n```bash\\n# 创建一个叫 blog 的文件夹作为项目文件夹并进入\\nmkdir blog\\ncd blog\\n\\n# 初始化虚拟环境\\npipenv install\\n\\n# 这里改一下 Pipfile 里面的源\\n# https://mirrors.aliyun.com/pypi/simple\\n\\n# 安装 flask\\npipenv install flask\\n\\n# 激活虚拟环境\\npipenv shell\\n```\"},{\"id\":\"slide-14\",\"content\":\"### 最小化 Flask 应用\\n\\n```python\\n# app.py\\n\\nfrom flask import Flask\\napp = Flask(__name__)\\n\\n@app.route('/')\\ndef hello_world():\\n    return 'Hello, World!'\\n\\nif __name__ == '__main__':\\n    app.run()\\n```\"},{\"id\":\"slide-15\",\"content\":\"### 装饰器\\n\\nPython 中有一种特殊的函数叫做装饰器。装饰器本质上是函数，返回值为另一个函数，通常使用 @wrapper 语法形式来进行函数变换。\\n\\n```python\\n# 看看是周几\\ndef check_time_alarm(f):\\n    import datetime\\n\\n    def wrapper():\\n        d = datetime.datetime.now()\\n        weekday = d.weekday()\\n        if weekday \u003c 6:\\n            f()\\n        return\\n\\n    return wrapper\\n\\n###########################################\\n\\n# 闹钟\\ndef alarm():\\n    print('Good good study, Day day up!')\\n\\nmy_alarm = check_time_alarm(alarm)\\nmy_alarm()\\n\\n##################上下二选一#################\\n\\n# 闹钟\\n@check_time_alarm\\ndef alarm():\\n    print('Good good study, Day day up!')\\n\\nalarm()\\n\\n###########################################\\n```\"},{\"id\":\"slide-16\",\"content\":\"### 运行 flask\\n\\n```bash\\n# 方法 0\\npython app.py\\n\\n# 方法 1\\n# Windows 下 cmd 里面应该是 set FLASK_APP=app.py\\n# Windows 下 powershell 里面应该是 $env:FLASK_APP = \\\"hello.py\\\"\\nexport FLASK_APP=app.py\\nflask run\\n\\n# 方法 2\\n# Windows 下 cmd 里面应该是 set FLASK_APP=app.py\\n# Windows 下 powershell 里面应该是 $env:FLASK_APP = \\\"hello.py\\\"\\nexport FLASK_APP=app.py\\npython -m flask run\\n```\"}]},{\"id\":\"slide-17\",\"content\":\"## MVC 设计模式\\n\\nMVC - \u003cb style=\\\"color:red;\\\"\u003eM\u003c/b\u003eodel \u003cb style=\\\"color:red;\\\"\u003eV\u003c/b\u003eiew \u003cb style=\\\"color:red;\\\"\u003eC\u003c/b\u003eontroller 是一种软件设计模式，常常在各种 Web 框架中看到。\\n\\n![MVC](/img/mvc.png){:style=\\\"width:100%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\",\"children\":[{\"id\":\"slide-18\",\"content\":\"### Flask 与 MVC\\n\\nFlask 是一个微型框架，实际上并不符合 MVC 模型，但是可以通过插件进行扩展，比如 flask-sqlalchemy 来实现数据库的对接和 model 的功能；还有人会提 Flask 是 MTV 模型的框架，但这种说法接受度不高。\"}]},{\"id\":\"slide-19\",\"content\":\"### 代码示例分析\\n\\nhttps://github.com/anjingcuc/learn_flask_the_hard_way\"},{\"id\":\"slide-20\",\"content\":\"## Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: left;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":true,\"course\":\"python\",\"chapter\":\"web\"}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
