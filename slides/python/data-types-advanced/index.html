5.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z\",\"clipRule\":\"evenodd\"}]}],\"GitHub\"]}]}]]}]}]}]]}]}]],null],null],\"couldBeIntercepted\":false,\"initialHead\":[null,\"$La\"],\"globalErrorComponent\":\"$b\",\"missingSlots\":\"$Wc\"}]\n"])</script><script>self.__next_f.push([1,"d:I[55953,[\"924\",\"static/chunks/924-0ab8daba027740c3.js\",\"788\",\"static/chunks/app/slides/%5Bcourse%5D/%5Bchapter%5D/page-d12534b00ce90974.js\"],\"SlideContainer\"]\n"])</script><script>self.__next_f.push([1,"4:[\"$\",\"$Ld\",null,{\"slides\":[{\"id\":\"slide-1\",\"content\":\"# 数据类型进阶\"},{\"id\":\"slide-2\",\"content\":\"## 列表进阶操作\\n\\n列表除了之前学习的取值、拼接、切片等运算符或方法，还有不少更加复杂的运算符或方法来对其进行增加、更新、查找及其他操作。\\n\\n下面我们按照这四个方面来介绍：\",\"children\":[{\"id\":\"slide-3\",\"content\":\"### 增加内容\\n\\n| 操作                  | 返回值                           |\\n| --------------------- | -------------------------------- |\\n| L \\\\*= n               | 序列重放 n 次并存入原序列        |\\n| L.append(x)           | 将 x 元素追加到序列尾部          |\\n| L.extend(t) 或 L += t | 列表 L 后面追加 t 输出的所有项   |\\n| L.insert(i, x)        | 在列表 L 的索引 i 处插入新元素 x |\\n\\n{:style=\\\"font-size:70%;\\\"}\\n\\n_注： t 必须为可迭代对象 (iterable)_\\n\\n{:style=\\\"font-size:50%;\\\"}\"},{\"id\":\"slide-4\",\"content\":\"### 更新内容\\n\\n| 操作                            | 返回值                                               |\\n| ------------------------------- | ---------------------------------------------------- |\\n| L[start:end] = t                | 将 start:end 部分替换成 t                            |\\n| L[start:end:step] = t           | 按步长 step 替换 start:end 为 t                      |\\n| L.sort(key=None, reverse=False) | 对列表 L 进行排序，可以通过 key 来指定确定顺序的键值 |\\n| L.reverse()                     | 反转列表 L 中元素的顺序                              |\\n\\n{:style=\\\"font-size:70%;\\\"}\\n\\n_注： t 必须为可迭代对象 (iterable)_\\n\\n{:style=\\\"font-size:50%;\\\"}\"},{\"id\":\"slide-5\",\"content\":\"### 查找内容\\n\\n| 操作                       | 返回值                                                        |\\n| -------------------------- | ------------------------------------------------------------- |\\n| x in L                     | True / False                                                  |\\n| x not in L                 | True / False                                                  |\\n| min(L)                     | 返回 L 中的最小值                                             |\\n| max(L)                     | 返回 L 中的最大值                                             |\\n| L.index(x[, start[, end]]) | 返回 x 在 L 中的第一次出现的下标，可指定查找范围 [start, end) |\\n| L.count(x)                 | 返回 x 在 L 中出现的次数                                      |\\n\\n{:style=\\\"font-size:70%;\\\"}\\n\\n_注： t 必须为可迭代对象 (iterable)_\\n\\n{:style=\\\"font-size:50%;\\\"}\"},{\"id\":\"slide-6\",\"content\":\"### 其他操作\\n\\n| 操作                                  | 返回值                                              |\\n| ------------------------------------- | --------------------------------------------------- |\\n| L.copy() 或 L[:]                      | 返回一个与 L 内容完全一致的新列表                   |\\n| L \\\\* n                                | 列表 L 重复 n 次                                    |\\n| L.pop([i])                            | 删除索引为 i 的元素并返回，无参数时返回最后一个元素 |\\n| L.remove(x)                           | 删除第一个值为 x 的元素                             |\\n| L.clear()                             | 删除列表 L 中所有元素，即 L 变成一个空列表          |\\n| del L[start:end] 或 l[start:end] = [] | 删除相应部分                                        |\\n| del L[start:end:step]                 | 删除相应部分                                        |\\n| del L                                 | 删除列表 L                                          |\\n\\n{:style=\\\"font-size:70%;\\\"}\"}]},{\"id\":\"slide-7\",\"content\":\"## 元组 - tuple\\n\\n元组是不可变序列，同样可以用多种方式构建元组：\\n\\n- 使用一对圆括号来表示空元组: ()。\\n- 使用一个后缀的逗号来表示单元组: a, 或 (a,)。\\n- 使用以逗号分隔的多个项: a, b, c or (a, b, c)。\\n- 使用内置的 tuple(): tuple() 或 tuple(iterable)。\\n\\n{:style=\\\"font-size:70%;\\\"}\",\"children\":[{\"id\":\"slide-8\",\"content\":\"### 元组的操作\\n\\n元组和列表实际上都属于一种`序列`，它支持那些没有改变自身内容的`序列`操作。但元组作为不可变`序列`，支持 `hash()` 函数得到一个哈希值。\\n\\n| 操作    | 返回值         |\\n| ------- | -------------- |\\n| hash(s) | 返回整形哈希值 |\\n\\n{:style=\\\"font-size:70%;\\\"}\\n\\n_注：可变序列不能作为字典的 key，不可变序列可以，也就是元组可以作为字典的 key_\\n\\n{:style=\\\"font-size:50%;\\\"}\"}]},{\"id\":\"slide-9\",\"content\":\"## range\\n\\nrange 也属于不可变的`序列`，最大的作用就是用来 `for` 循环，好处是占用空间小。\\n\\n_注：与列表不同，并不实际分配空间，而是生成一个可迭代的 range 对象_\\n\\n{:style=\\\"font-size:50%;\\\"}\"},{\"id\":\"slide-10\",\"content\":\"## 几种序列支持的操作对比\\n\\n| 操作类型 | 列表 | 元组                                     | range                                    |\\n| -------- | ---- | ---------------------------------------- | ---------------------------------------- |\\n| 取值     | 支持 | 支持                                     | 支持                                     |\\n| 切片     | 支持 | 支持                                     | 支持                                     |\\n| 查找     | 支持 | 不支持                                   | 不支持                                   |\\n| 增加     | 支持 | 不支持                                   | 不支持                                   |\\n| 更新     | 支持 | 不支持                                   | 不支持                                   |\\n| 删除     | 支持 | 部分支持\u003csup style=\\\"color:red;\\\"\u003e\\\\*\u003c/sup\u003e | 部分支持\u003csup style=\\\"color:red;\\\"\u003e\\\\*\u003c/sup\u003e |\\n\\n{:style=\\\"font-size:70%;\\\"}\\n\\n_注: 部分支持是指它们都可以整体删除（变量会变成 `undefined`），不支持删除其中部分内容。_\\n\\n{:style=\\\"font-size:50%;\\\"}\"},{\"id\":\"slide-11\",\"content\":\"## 集合\\n\\n集合中无序地保存不重复的元素，也就是说集合中的元素是唯一的，经常用来去重。\\n\\n- set() 来创建空集合。\\n- 集合也可以用大括号符号，但是 `{}` 是一个空的字典，而不是集合。\\n\\n{:style=\\\"font-size:70%;\\\"}\\n\\n_注: 为了避免代码出现歧义，建议大家都用 set() 来表示集合。_\\n\\n{:style=\\\"font-size:50%;\\\"}\",\"children\":[{\"id\":\"slide-12\",\"content\":\"### 集合操作\\n\\n| 操作                                          | 返回值                              |\\n| --------------------------------------------- | ----------------------------------- |\\n| x in s                                        | x 存在于集合 s 中                   |\\n| x not in s                                    | x 不在集合 s 中                     |\\n| len(s)                                        | 集合元素个数                        |\\n| s.isdisjoint(t)                               | s t 是否有交集，交集为空则返回 True |\\n| union(\\\\*others) 或 set \u0026#124; other           | 并集                                |\\n| intersection(\\\\*others) 或 set \u0026 other         | 交集                                |\\n| difference(\\\\*others) 或 set - other           | 差集                                |\\n| symmetric_difference(\\\\*others) 或 set ^ other | 对称差集                            |\\n\\n{:style=\\\"font-size:70%;\\\"}\"}]},{\"id\":\"slide-13\",\"content\":\"## 字典 - dict\\n\\n一个可哈希的值映射到任意值。\\n\\n```python\\nteacher = {\\n  # 'key': 'value',\\n  'name': 'anjing',\\n  'age': 18\\n}\\n\\na = dict(one=1, two=2, three=3)\\nb = {'one': 1, 'two': 2, 'three': 3}\\nc = dict(zip(['one', 'two', 'three'], [1, 2, 3]))\\nd = dict([('two', 2), ('one', 1), ('three', 3)])\\ne = dict({'three': 3, 'one': 1, 'two': 2})\\n```\",\"children\":[{\"id\":\"slide-14\",\"content\":\"### 字典操作 (1/3)\\n\\n| 操作                  | 返回值                                                      |\\n| --------------------- | ----------------------------------------------------------- |\\n| len(d)                | 键值对的数目                                                |\\n| d[key]                | 获得键 key 对应的值 value                                   |\\n| d.get(key[, default]) | 获取某个 key 的值，如果不存在 key 则返回 None               |\\n| d.pop(key[, default]) | 获取某个 key 的值并从字典中删除，如果不存在 key 则返回 None |\\n| d.popitem()           | 取出最后进入的一对键值对                                    |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-15\",\"content\":\"### 字典操作 (2/3)\\n\\n| 操作           | 返回值                           |\\n| -------------- | -------------------------------- |\\n| d[key] = value | 修改/新建一个 key , 并复制 value |\\n| del d[key]     | 删除某个 key 以及对应 value      |\\n| key in d       | d 存在键 key                     |\\n| key not in d   | d 不存在键 key                   |\\n| d.clear()      | 清空 d 剩下一个空字典            |\\n| d.copy()       | 复制一个 d                       |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-16\",\"content\":\"### 字典操作 (3/3)\\n\\n| 操作       | 返回值                                      |\\n| ---------- | ------------------------------------------- |\\n| d.keys()   | 返回一个可迭代的对象, 包含所有 key          |\\n| d.items()  | 返回一个可迭代的 view, 包含所有(key, value) |\\n| d.values() | 返回一个可迭代的 view, 包含所有 value       |\\n\\n{:style=\\\"font-size:70%;\\\"}\"}]},{\"id\":\"slide-17\",\"content\":\"## Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: left;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":true,\"course\":\"python\",\"chapter\":\"data-types-advanced\"}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
