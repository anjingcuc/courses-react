6\",\"content\":\"## 字符串\\n\\n字符串是 Python 中的一种不可变序列，使用一个字符串的格式化操作来讲要输出的变量按照需要的格式进行输出，并加上了相关文字。\\n\\n- 字符串可以用单引号`'`或者双引号`\\\"`括起来。\\n- 与 C 语言类似，转义字符为反斜杠 `\\\\`。\\n- 如果一个字符串中想要禁用转义符号，则前面加`r`,如 `r'C:\\\\Windows'`。\\n- 多行字符串可以使用三个但单引号或三个双引号来包裹。\\n\\n{:style=\\\"font-size:70%;\\\"}\",\"children\":[{\"id\":\"slide-7\",\"content\":\"### 字符串的索引\\n\\n索引，即取出某个位置上的字符:\\n\\n```\\n +---+---+---+---+---+---+\\n | P | y | t | h | o | n |\\n +---+---+---+---+---+---+\\n   0   1   2   3   4   5\\n  -6  -5  -4  -3  -2  -1\\n```\\n\\n```python\\ndemo = 'Hello, world!'\\nprint(demo[0]) # 'H'\\nprint(demo[-1]) # '!'\\n```\"},{\"id\":\"slide-8\",\"content\":\"### 字符串切片\\n\\n切片，或称为子串:\\n\\n```\\n +---+---+---+---+---+---+\\n | P | y | t | h | o | n |\\n +---+---+---+---+---+---+\\n 0   1   2   3   4   5   6\\n-6  -5  -4  -3  -2  -1\\n```\\n\\n```python\\ndemo = 'Hello, world!'\\nprint(demo[0:5]) # 'Hello'\\nprint(demo[:5]) # 'Hello'\\nprint(demo[5:13]) # ', world!'\\nprint(demo[5:]) # ', world!'\\n```\"},{\"id\":\"slide-9\",\"content\":\"### 字符串拼接\\n\\n字符串拼接非常简单，用 `+` 操作符可以直接完成。\\n\\n```python\\nfirst_name = 'An'\\nlast_name = 'Jing'\\n\\nname = first_name + last_name\\n```\"},{\"id\":\"slide-10\",\"content\":\"### printf 风格的字符串格式化\\n\\n使用 `%` 来实现输出。\\n\\n```python\\nnumber = 2\\nmood = '快乐'\\nprint('这是我们第 %d 节课，我很%s。' % (number, mood))\\n```\\n\\n_注：[详细格式化规则](https://docs.python.org/zh-cn/3/library/string.html#format-specification-mini-language)_\\n\\n{:style=\\\"font-size:60%;\\\"}\"}]},{\"id\":\"slide-11\",\"content\":\"### 类型转换\\n\\n直接使用类型的名称对应的内置函数来进行转换，在整型与浮点进行运算时，将会全部转换成浮点型来完成计算：\\n\\n| 函数                | 作用                                                   |\\n| ------------------- | ------------------------------------------------------ |\\n| int(x, base=10)     | 将数字或者 base 对应进制的字符串 x，转换成十进制的整数 |\\n| float(x)            | 将数字或者字符串 x，转换成浮点数                       |\\n| hex(x)              | 将整数 x 转换为以'0x'为前缀的小写十六进制字符串        |\\n| oct(x)              | 将整数 x 转换为以'0o'为前缀的八进制字符串              |\\n| bin(x)              | 将整数 x 转换为以'0b'为前缀的二进制字符串              |\\n| str(x)              | 将 x 转换为字符串                                      |\\n| ord(x)              | 将单个字符 x 转换为整数                                |\\n| chr(x)              | 将整数 x 转换为对应的单个字符                          |\\n| complex(real, imag) | 返回 real + imag\\\\*1j 的复数                            |\\n\\n{:style=\\\"font-size:60%;\\\"}\"},{\"id\":\"slide-12\",\"content\":\"## 列表\\n\\n列表属于 Python 中的可变序列中的一种，类似其他高级语言中的数组，但它的长度和内容是可以使用中改变的。列表可以通过多种方式来构建。\\n\\n- 使用一对方括号来构建一个空的列表 `[]` 。\\n- 使用方括号，里面的项用逗号分割，`[1, 2, 3]`。\\n- 使用列表推导式构建: `[x for x in range(4)]`。\\n- 使用类型构造器: `list()` / `list(range(4))`。\\n\\n{:style=\\\"font-size:70%;\\\"}\",\"children\":[{\"id\":\"slide-13\",\"content\":\"### 列表的索引\\n\\n与字符串类似，列表也可以通过索引来访问其中的单个元素。但与字符串不同的是，索引后可以通过赋值操作来改变特定项的内容。\\n\\n```\\n['a', 'b', 'c', 'd', 'e', 'f', 'g']\\n  0    1    2    3    4    5    6\\n -7   -6   -5   -4   -3   -2   -1\\n```\\n\\n```python\\na = ['a', 'b', 'c', 'd', 'e', 'f', 'g']\\na[1] = '666'  # ['a', '666', 'c', 'd', 'e', 'f', 'g']\\nprint(a[1]) # 666\\n```\"},{\"id\":\"slide-14\",\"content\":\"### 列表的切片\\n\\n切片，或称为子串:\\n\\n```\\n +-----+-----+-----+-----+-----+-----+-----+\\n | 'a' | 'b' | 'c' | 'd' | 'e' | 'f' | 'g' |\\n +-----+-----+-----+-----+-----+-----+-----+\\n 0     1     2     3     4     5     6     7\\n-7    -6    -5    -4    -3    -2    -1\\n```\\n\\n```python\\na = ['a', 'b', 'c', 'd', 'e', 'f', 'g']\\nprint(a[0:5]) # ['a', 'b', 'c', 'd']\\nprint(demo[:5]) # ['a', 'b', 'c', 'd']\\nprint(demo[5:]) # ['e', 'f', 'g']\\n```\"},{\"id\":\"slide-15\",\"content\":\"### 列表的拼接\\n\\n与字符串类似，也可以用 `+` 运算符来实现，或者用 `.append()` 在尾部加入新的项。\\n\\n```python\\nshop_cart = ['口罩', '洗手液']\\nshop_cart = shop_cart + ['Switch', '口红'] # ['口罩', '洗手液', 'Switch', '口红']\\nshop_cart.append('摄像头') # ['口罩', '洗手液', 'Switch', '口红', '摄像头']\\n```\"}]},{\"id\":\"slide-16\",\"content\":\"## Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: left;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":true,\"course\":\"python\",\"chapter\":\"data-types-basic\"}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
