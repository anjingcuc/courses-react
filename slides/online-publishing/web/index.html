 描述                                                                                                                                                                                                                                                                 |\n| ----"])</script><script>self.__next_f.push([1,"----- | -------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------- |\n| `\u003caudio\u003e` | HTML `\u003caudio\u003e` 元素用于在文档中表示音频内容。 `\u003caudio\u003e` 元素可以包含多个音频资源， 这些音频资源可以使用 src 属性或者\u003csource\u003e 元素来进行描述； 浏览器将会选择最合适的一个来使用。对于不支持\u003caudio\u003e元素的浏览器，\u003caudio\u003e元素也可以作为浏览器不识别的内容加入到文档中。 |\n| `\u003cimg\u003e`   | HTML `\u003cimg\u003e` 元素代表文档中的一个图像。                                                                                                                                                                                                                              |\n| `\u003cvideo\u003e` | HTML `\u003cvideo\u003e` 元素 用于在 HTML 或者 XHTML 文档中嵌入媒体播放器，用于支持文档内的视频播放。                                                                                                                                                                          |\n\n{:style=\"font-size:70%;\"}"])</script><script>self.__next_f.push([1,"4:[\"$\",\"$Ld\",null,{\"slides\":[{\"id\":\"slide-1\",\"content\":\"# Web 服务\"},{\"id\":\"slide-2\",\"content\":\"## 概述\",\"children\":[{\"id\":\"slide-3\",\"content\":\"### Web 简介\\n\\n本课所指的 Web 指代 World Wide Web, WWW 也就是所谓的万维网或者互联网，通俗的说就是“网络出版”中的“网络”。Web 实际上是由 URL 链接起来的 HTML 组成的一个“网”，用户通过计算机使用 HTTP 协议来获取网上的内容也即 HTML。\"},{\"id\":\"slide-4\",\"content\":\"### 应用实例\\n\\n微信公众号、博客、视频网站、网页游戏以及各种教程网站乃至 Gitbook 等在线书籍都是通过 Web 来为用户提供服务的。\"}]},{\"id\":\"slide-5\",\"content\":\"## Web 工作原理\",\"children\":[{\"id\":\"slide-6\",\"content\":\"### 概述\\n\\n简单描述，Web 基本工作逻辑如下图所示。\\n\\n![Web](/img/webserver.jpg){:style=\\\"padding:20px;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"}]},{\"id\":\"slide-7\",\"content\":\"## HTML - \u003cb style='color:red'\u003eH\u003c/b\u003eyper\u003cb style='color:red'\u003eT\u003c/b\u003eext \u003cb style='color:red'\u003eM\u003c/b\u003earkup \u003cb style='color:red'\u003eL\u003c/b\u003eanguage\",\"children\":[{\"id\":\"slide-8\",\"content\":\"### 简介\\n\\nHTML，超文本标记语言，是一种用于创建网页的标准标记语言。它定义了页面的基本结构和内容，可以被浏览器渲染成俗称的“网页”。\\n\\nHTML 的标准由 W3C（万维网联盟）维护，目前我们所见的大多数网站都是 HTML 4.01 版，而移动互联网时代口头常说的 H5 实际上是 HTML 标准的 5.0 版本。\"},{\"id\":\"slide-9\",\"content\":\"### HTML 元素\\n\\n相关定义如下：\\n\\n- HTML 元素以**开始标签**起始，以**结束标签**中止。\\n- 元素的内容是**开始标签**与**结束标签**之间的内容。\\n- 有一种元素为**空元素**，在**开始标签**中进行关闭。\\n- 大多数 HTML 元素可拥有**属性**，如 style。\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-10\",\"content\":\"### HTML 标签\\n\\nHTML 文件中，为了区分内容和描述 HTML 文档结构的**标记**，定义了很多**标签**，**标签**由尖括号包裹，分为**开始标签**、**结束标签**以及空标签三种。\\n\\n```html\\n\u003ch1\u003e\u003c/h1\u003e\\n\u003cp\u003e\u003c/p\u003e\\n\u003cbr /\u003e\\n```\"},{\"id\":\"slide-11\",\"content\":\"### HTML 设计与构建\\n\\n类似纸质书排版的过程。\\n\\n1. 先在草稿纸上画出自己想要制作的页面的大概布局结构。\\n2. 判断一下各个位置的内容属于 HTML 结构中的什么元素。\\n3. 查找恰当的标签来填写清楚，构建好自己想要的页面。\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-12\",\"content\":\"### 图片与超链接\\n\\n在 HTML 中可以随时添加 `\u003cimg/\u003e` 图片元素来加载一幅图片，也可以添加 `\u003ca\u003e\u003c/a\u003e` 超链接元素来跳转到新的页面。\\n\\n利用这一特性，可以在数字出版物中加入图片并灵活地组织出版物的内容。\"},{\"id\":\"slide-13\",\"content\":\"### 更多的 HTML 元素\\n\\n还有更多种类的 HTML 元素和响应的标签需要扩展学习。\\n\\n更多元素标签，可参考:\\n\\nhttps://www.w3school.com.cn/html/html_jianjie.asp 。\"},{\"id\":\"slide-14\",\"content\":\"### HTML 样式\\n\\n可以通过 HTML 元素的 style 属性改变元素的表现形式，如颜色、字体、位置等等，或者使用专门的 CSS 样式表来美化页面。\"}]},{\"id\":\"slide-15\",\"content\":\"## 常见 HTML 元素\",\"children\":[{\"id\":\"slide-16\",\"content\":\"### 内容结构\\n\\n| 元素        | 描述                                                                                                                                                       |\\n| ----------- | ---------------------------------------------------------------------------------------------------------------------------------------------------------- |\\n| `\u003ch1\u003e-\u003ch6\u003e` | HTML `\u003ch1\u003e–\u003ch6\u003e` 标题(Heading)元素呈现了六个不同的级别的标题，`\u003ch1\u003e` 级别最高，而 `\u003ch6\u003e` 级别最低。                                                        |\\n| `\u003cp\u003e`       | HTML `\u003cp\u003e`元素或叫做 HTML 段落元素表示文本的一个段落。该元素通常表现为一整块与相邻文本分离的文本，或以垂直的空白隔离或以首行缩进。另外，`\u003cp\u003e` 是块级元素。 |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-17\",\"content\":\"$e\"},{\"id\":\"slide-18\",\"content\":\"### 文本修饰 (1/2)\\n\\n| 元素  | 描述                                                                                                                                       |\\n| ----- | ------------------------------------------------------------------------------------------------------------------------------------------ |\\n| `\u003ci\u003e` | HTML 元素 `\u003ci\u003e` 用于表现因某些原因需要区分普通文本的一系列文本。例如技术术语、外文短语或是小说中人物的思想活动等，它的内容通常以斜体显示。 |\\n| `\u003cb\u003e` | HTML `\u003cb\u003e` 是提醒注意元素，用于吸引读者的注意到该元素的内容上。大多数浏览器仍然将文字显示为粗体。                                          |\\n| `\u003cs\u003e` | HTML `\u003cs\u003e` 元素使用删除线来渲染文本。使用 `\u003cs\u003e` 元素来表示不再相关，或者不再准确的事情。                                                   |\\n| `\u003cu\u003e` | HTML `\u003cu\u003e` 元素使文本在其内容的基线下的一行呈现下划线。                                                                                    |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-19\",\"content\":\"### 文本修饰 (2/2)\\n\\n| 元素       | 描述                                                                                                                             |\\n| ---------- | -------------------------------------------------------------------------------------------------------------------------------- |\\n| `\u003cem\u003e`     | HTML `\u003cem\u003e` 着重元素标记出需要用户着重阅读的内容， `\u003cem\u003e` 元素是可以嵌套的，嵌套层次越深，则其包含的内容被认定为越需要着重阅读。 |\\n| `\u003cstrong\u003e` | HTML `\u003cstrong\u003e` 元素表示文本十分重要，一般用粗体显示。                                                                           |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-20\",\"content\":\"### 嵌入元素\\n\\n| 元素     | 描述                                                                                                             |\\n| -------- | ---------------------------------------------------------------------------------------------------------------- |\\n| `\u003ca\u003e`    | HTML `\u003ca\u003e` 元素（或称锚元素）可以创建通向其他网页、文件、同一页面内的位置、电子邮件地址或任何其他 URL 的超链接。 |\\n| `\u003cbr\u003e`   | HTML `\u003cbr\u003e` 元素在文本中生成一个换行（回车）符号。此元素在写诗和地址时很有用，这些地方的换行都非常重要。         |\\n| `\u003ccode\u003e` | HTML `\u003ccode\u003e` 元素呈现一段计算机代码. 默认情况下, 它以浏览器的默认等宽字体显示.                                  |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-21\",\"content\":\"$f\"},{\"id\":\"slide-22\",\"content\":\"### 表格\\n\\n| 元素      | 描述                                                                          |\\n| --------- | ----------------------------------------------------------------------------- |\\n| `\u003ctable\u003e` | HTML 的 `\u003ctable\u003e` 元素表示表格数据 — 即通过二维数据表表示的信息。             |\\n| `\u003cthead\u003e` | HTML 的`\u003cthead\u003e`元素定义了一组定义表格的列头的行。                            |\\n| `\u003ctbody\u003e` | 这个 HTML 标签类似 HTML 标签中的 `\u003cbody\u003e` 表示表格内容的部分。                |\\n| `\u003ctfoot\u003e` | HTML 元素`\u003ctfoot\u003e` 定义了一组表格中各列的汇总行。                             |\\n| `\u003cth\u003e`    | HTML 的 `\u003cth\u003e` 元素代表一个表格的表头部分属性                                 |\\n| `\u003ctr\u003e`    | HTML `\u003ctr\u003e` 元素定义表格中的行。 元素内包含一系列的 `\u003ctd\u003e` 或者 `\u003cth\u003e` 元素。 |\\n| `\u003ctd\u003e`    | HTML `\u003ctd\u003e` 元素定义了一个单元格。                                            |\\n\\n{:style=\\\"font-size:70%;\\\"}\"}]},{\"id\":\"slide-23\",\"content\":\"## 工具使用\",\"children\":[{\"id\":\"slide-24\",\"content\":\"### 浏览器\\n\\n常用浏览器 Chrome 或者 Edge 中自带“开发者工具”可以对 HTML 页面进行分析和学习。Typora 本质上也是基于浏览器实现的，也有同款开发者工具。\"}]},{\"id\":\"slide-25\",\"content\":\"# Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: left;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":true,\"course\":\"online-publishing\",\"chapter\":\"web\"}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
