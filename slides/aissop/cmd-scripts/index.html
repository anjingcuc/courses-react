一个叫`where`的外部命令找到相应的`exe`文件\"},{\"id\":\"slide-12\",\"content\":\"### 内部命令的帮助文档\\n\\n- `command /?`\\n\\n![CMD帮助](/img/cmd_help.png)\"},{\"id\":\"slide-13\",\"content\":\"### 管理员与非管理员\\n\\n![管理员与非管理员](/img/cmd_admin.png)\"},{\"id\":\"slide-14\",\"content\":\"### 命令行的结构\\n\\n![命令行的结构](/img/cmd_struct.png)\"},{\"id\":\"slide-15\",\"content\":\"### 命令的结构\\n\\n![命令的结构](/img/cmd_command_struct.png)\"},{\"id\":\"slide-16\",\"content\":\"### 命令帮助文档不同含义\\n\\n- 可选参数用方括号 `[]` 括起来\\n- N 选 1 的参数用竖线 `|` 分割\\n- 必填参数无任何符号修饰\\n\\n![命令帮助文档不同含义](/img/cmd_doc_symbol.png)\"},{\"id\":\"slide-17\",\"content\":\"### 命令行中的路径\\n\\n- 任意目录都包含两个子目录为 `.` 和 `..`\\n- `.` 表示当前目录，`..` 表示上一级目录\\n- 绝对路径，从卷标开始写出完整的目录层级关系\\n- 相对路径，使用`.`和`..`来访问以当前目录为起点的其他目录\"},{\"id\":\"slide-18\",\"content\":\"### 命令行快捷键\\n\\n- `Tab` 自动补全命令\\n- `↑↓` 方向键可以翻看命令历史记录\\n- 非管理员权限的命令行支持直接拖放目录或文件\\n- 按住左键选中内容后点击右键可复制，直接点击右键可黏贴\"},{\"id\":\"slide-19\",\"content\":\"### 参考资料\\n\\n- Windows CMD 命令行快速查询\\n  - http://ss64.com/nt/\\n- Windows PowerShell 2.0（下一代 CMD）快速查询\\n  - http://ss64.com/ps/\"}]},{\"id\":\"slide-20\",\"content\":\"## 环境变量\\n\\n![环境变量](/img/system_env.png)\",\"children\":[{\"id\":\"slide-21\",\"content\":\"## 不同类型环境变量\\n\\n- 系统变量\\n  - 与 Windows 操作系统包括网络状况有关，由操作系统定义。Administrators 组的用户可以添加添加、修改或删除，\\n  - 系统变量的作用域是全局的，对所有用户生效\\n- 用户变量\\n  - 由操作系统、某些应用程序以及用户建立，任何用户都可以添加、修改或删除\\n  - 用户变量的作用域是当前用户，只对当前用户生效\"},{\"id\":\"slide-22\",\"content\":\"### 环境变量的作用\\n\\n- Windows / Linux / macOS 都有的一种运行机制\\n- 在当前用户或者系统层面设置一些变量的值\\n- 在各个进程运行时，通过访问这些变量，可以得到运行环境的相关信息\"},{\"id\":\"slide-23\",\"content\":\"### 常用环境变量\\n\\n- `%Path%`: 可执行文件搜索路径\\n- `%OS%`: 操作系统内核版本\\n- %WINDIR%: Windows 文件夹的路径\\n- %APPDATA%: 当前用户程序数据存放路径\\n- %ProgramFiles%: 默认程序安装目录\"}]},{\"id\":\"slide-24\",\"content\":\"## 批处理\\n\\n- 根据需求讲命令行的多条命令集合于一个文件中\\n- 每行一条命令\\n- `.bat` 为 MS-DOS 批处理文件\\n- `.cmd` Windows NT 命令行脚本\\n- `.cmd` 支持命令且只支持 Windows 2000 以上系统\\n- 处于兼容性考虑，`.bat` 较为常见\",\"children\":[{\"id\":\"slide-25\",\"content\":\"### 批处理中的符号\\n\\n| 符号         | 作用                                 |\\n| ------------ | ------------------------------------ |\\n| %            | 修饰参数或变量来读取他们的值         |\\n| @            | 在行首使用禁止该行命令的回显         |\\n| \u0026            | 多条命令顺序执行                     |\\n| \u0026\u0026           | 多条命令顺序执行如果有命令出错则停止 |\\n| \u0026#124;\u0026#124; | 多条命令顺序执行如果有命令成功则停止 |\"},{\"id\":\"slide-26\",\"content\":\"### 批处理中的符号\\n\\n| 符号   | 作用                                 |\\n| ------ | ------------------------------------ |\\n| \u0026#124; | 管道，将前命令的输出作为后命令的输入 |\\n| \u003e      | 重定向输出并覆盖                     |\\n| \u003e\u003e     | 重定向输出并追加                     |\\n| \u003c      | 重定向输入                           |\\n| ^      | 转义符，要输出\u003e等特殊符号则用^修饰   |\\n| ::     | 注释                                 |\\n| rem    | 注释                                 |\"}]},{\"id\":\"slide-27\",\"content\":\"## Q \u0026 A\"}],\"globalStyle\":\"\",\"fullscreen\":true,\"course\":\"aissop\",\"chapter\":\"cmd-scripts\"}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
