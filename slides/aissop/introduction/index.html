# 什么是信息安全\",\"children\":[{\"id\":\"slide-9\",\"content\":\"### 黑客是什么\\n\\n\u003cb style=\\\"color: red;\\\"\u003e广义上的黑客文化\u003c/b\u003e起源于 1960s 麻省理工学院的“铁路模型技术俱乐部”，他们把难题的解法技巧称为 `hack`。\\n\\n{:style=\\\"font-size:70%\\\"}\\n\\n\u003cb style=\\\"color: red;\\\"\u003e狭义上的黑客称谓\u003c/b\u003e起源于电话“飞客”，是一群研究如何入侵电话系统免费打电话的人。\\n\\n{:style=\\\"font-size:70%\\\"}\\n\\n![嘎吱船长](/img/john_draper.jpg){:style=\\\"width:60%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\\n\\n补充: [柯学家](https://www.bilibili.com/video/BV1u4411q7sn)\\n\\n{:style=\\\"font-size:50%\\\"}\"},{\"id\":\"slide-10\",\"content\":\"## 黑客干什么\\n\\n狭义上的黑客主要研究以下内容：\\n\\n- 软硬件系统的设计缺陷，或者良好的设计在实现过程中不完善导致的缺陷；\\n- 研究人的心理盲点，以人作为突破口获取信息或计算机系统的权限。\\n\\n{:style=\\\"font-size:70%\\\"}\"},{\"id\":\"slide-11\",\"content\":\"### 黑客与程序员的区别\\n\\n更多的逆向思维和心理揣摩。\\n\\n```python\\nimport os\\n\\nhost = input('请输入要检测的 IP : ')\\nresult = os.popen('ping -n 1 %s' % (host)).read()\\n\\nif 'TTL' in result:\\n  print('IP 在线')\\nelse:\\n  print('IP 不在线')\\n```\\n\\n来源: [Soptq @ 知乎](https://www.zhihu.com/question/340229645/answer/791552302)\\n\\n{:style=\\\"font-size:50%;\\\"}\"},{\"id\":\"slide-12\",\"content\":\"## 为什么学习信息安全？\\n\\n信息安全，怎么学，能学会什么？\\n\\n![v](/img/v.jpg){:style=\\\"width:70%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-13\",\"content\":\"### 信息收集\\n\\n学习丰富的搜索技巧。\\n\\n- 高级搜索\\n- 社工搜索\\n\\n{:style=\\\"font-size:70%\\\"}\"},{\"id\":\"slide-14\",\"content\":\"### 好玩的 CTF\\n\\nCTF, Capture The Flag, 全称夺旗赛，以游戏比赛的形式进行学习。\\n\\n![Def CON CTF](/img/def_con.png){:style=\\\"width:70%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-15\",\"content\":\"### PWN Everything\\n\\n进行各种奇怪的操作(腾讯玄武实验室)。\\n\\n\u003cvideo src=\\\"badbarcode.mp4\\\" controls=\\\"controls\\\"\u003e\\n  你的浏览器不支持 video 标签。\\n\u003c/video\u003e\"},{\"id\":\"slide-16\",\"content\":\"### 守护网络空间\\n\\n成为白帽子，守护网络空间安全。\\n\\n- 病毒查杀\\n- 漏洞分析\\n- 网络攻防\\n\\n{:style=\\\"font-size:70%\\\"}\"}]},{\"id\":\"slide-17\",\"content\":\"## Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: justify;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":true,\"course\":\"aissop\",\"chapter\":\"introduction\"}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
