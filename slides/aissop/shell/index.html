.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z\",\"clipRule\":\"evenodd\"}]}],\"GitHub\"]}]}]]}]}]}]]}]}]],null],null],\"couldBeIntercepted\":false,\"initialHead\":[null,\"$La\"],\"globalErrorComponent\":\"$b\",\"missingSlots\":\"$Wc\"}]\n"])</script><script>self.__next_f.push([1,"d:I[55953,[\"924\",\"static/chunks/924-0ab8daba027740c3.js\",\"788\",\"static/chunks/app/slides/%5Bcourse%5D/%5Bchapter%5D/page-d12534b00ce90974.js\"],\"SlideContainer\"]\ne:T678,### 指令\n\nPowershell 中采用 cmdlets 作为指令或命令来执行特定任务，以下内容截取自[Powershell-维基百科](https://zh.wikipedia.org/wiki/PowerShell)。\n\n| PowerShell（命令行） | PowerShell（别名）            | 命令提示符            | Unix shell   | 描述                       |\n| -------------------- | ----------------------------- | --------------------- | ------------ | -------------------------- |\n| Get-ChildItem        | gci, dir, ls                  | dir                   | ls           | 列出文件和文件夹           |\n| Test-Connection      | ping                          | ping                  | ping         | 发送 Ping                  |\n| Get-Help             | help, man                     | help                  | apropos, man | 查看文档                   |\n| Clear-Host           | cls, clear                    | cls                   | clear        | 清除屏幕[b]                |\n| Copy-Item            | cpi, copy, cp                 | copy, xcopy, robocopy | cp           | 复制文件或文件夹           |\n| Move-Item            | mi, move, mv                  | move                  | mv           | 移动文件或文件夹           |\n| Remove-Item          | ri, del, erase, rmdir, rd, rm | del, erase, rmdir, rd | rm, rmdir    | 删除文件或文件夹           |\n| Get-Location         | gl, cd, pwd                   | cd                    | pwd          | 显示工作路径（目前文件夹） |\n| Set-Location         | sl, cd, chdir                 | cd, chdir             | cd           | 改变工作路径               |\n\n{:style=\"font-size:50%\"}"])</script><script>self.__next_f.push([1,"4:[\"$\",\"$Ld\",null,{\"slides\":[{\"id\":\"slide-1\",\"content\":\"# Shell 与脚本\"},{\"id\":\"slide-2\",\"content\":\"## 图形用户界面\u003cbr\u003e与\u003cbr\u003e命令行界面\",\"children\":[{\"id\":\"slide-3\",\"content\":\"### 图形用户界面\\n\\n图形用户界面 (GUI, **G**raphical **U**ser **I**nterface) 是指采用图形方式显示的用户界面，图形用户界面的学习成本更低，用户可以使用鼠标及键盘与应用程序、操作系统进行交互。\"},{\"id\":\"slide-4\",\"content\":\"### 命令行界面\\n\\n命令行界面 (CLI, **C**ommand **L**ine **I**nterface) 是早期电脑最广泛的用户界面，用户通过键盘出入指令，指令的执行结果往往也以文本的形式呈现给用户。\\n\\n![黑客与命令行界面](/img/hacker-with-CLI.jpg){:style=\\\"width:70%;\\\"}\\n\\n{:style=\\\"text-align:center;margin-bottom:10px;\\\"}\\n\\n© Sputnik / Vladimir Trefilov\\n\\n{:style=\\\"text-align:right;font-size:40%;margin-top:10px;\\\"}\"},{\"id\":\"slide-5\",\"content\":\"### 为什么要讲 CLI\\n\\nCLI 相较于 GUI 的优势在于：\\n\\n- 更方便地进行批量任务；\\n- 专业工具需要用到 CLI 。\\n\\n{:style=\\\"font-size:70%\\\"}\"}]},{\"id\":\"slide-6\",\"content\":\"## CLI 相关概念及工具\",\"children\":[{\"id\":\"slide-7\",\"content\":\"### 终端与控制台\\n\\n早年的计算机像房子一样大，操作计算机的人们在另外一个房间里用终端 (Terminal) 机来与计算机进行交互，早期的终端一般叫做电传打字机 (Teletype，缩写为 tty) ；管理员用的与计算机主机一体的特殊终端叫做控制台 (Console) ；现代操作系统中用 GUI 类型的软件来模拟这种终端设备让用户进行交互，一般称之为终端模拟器 (Terminal Emulator)。\\n\\n{:style=\\\"font-size:70%\\\"}\\n\\n![电传打字机](/img/asr-33.jpg){:style=\\\"width:40%;\\\"}\\n\\n{:style=\\\"text-align:center;margin-bottom:10px;\\\"}\\n\\n参考: [printempw@segmentfault](https://segmentfault.com/a/1190000016129862)\\n\\n{:style=\\\"font-size:50%\\\"}\"},{\"id\":\"slide-8\",\"content\":\"### 常见终端模拟器\\n\\n各个系统下常见的终端模拟器软件有：\\n\\n|         | 虚拟终端                  |\\n| ------- | ------------------------- |\\n| Windows | 控制台 / Windows Terminal |\\n| Linux   | gnome-terminal / Konsole  |\\n| macOS   | Terminal.app / iTerm2     |\\n\\n{:style=\\\"font-size:70%\\\"}\"},{\"id\":\"slide-9\",\"content\":\"### Shell\\n\\nShell（也称为壳层）则是指为用户提供用户“界面”的软件，这里的界面一般指 CLI 。当然也有 GUI 的 Shell 比如 `Windows Explorer` ，即 `Windows 资源管理器` 。一般来说计算机科学中提到 Shell 的时候都是指 CLI 类型的软件。\\n\\n|         | CLI Shell        | GUI Shell          |\\n| ------- | ---------------- | ------------------ |\\n| Windows | cmd / powershell | Windows 资源管理器 |\\n| 类 Unix | bash / zsh       | GNOME / KDE        |\\n\\n{:style=\\\"font-size:70%\\\"}\"},{\"id\":\"slide-10\",\"content\":\"### 标准流\\n\\n终端和 Shell 之间通过标准流进行通信，标准流有三个:\\n\\n- `stdin` 即 `标准输入`。\\n- `stdout` 即 `标准输出`。\\n- `stderr` 即 `标准错误输出`。\\n\\n{:style=\\\"font-size:70%\\\"}\"},{\"id\":\"slide-11\",\"content\":\"### 小结\\n\\n现代操作系统中，用户用到的看来是 CLI 形式的“命令行窗口”或“终端”往往包括两个部分：一个终端模拟器软件以及真正处理用户命令的 Shell 。比如 Windows 下常见的`命令提示符`运行后包含一个终端模拟器 `conhost.exe` 以及一个 Shell `cmd.exe` 。\\n\\n![](/img/conhost-cmd.png){:style=\\\"width:50%;\\\"}\\n\\n{:style=\\\"text-align:center;\\\"}\"}]},{\"id\":\"slide-12\",\"content\":\"## Powershell 基本用法\",\"children\":[{\"id\":\"slide-13\",\"content\":\"### 运行\\n\\n在 Windows 10 上右键点击左下角的开始图标，在弹出菜单中选择 `Windows Powershell` 即可，如果需要更高权限，则选择 `Windows Powershell (管理员)` 。\\n\\n![运行 Powershell](/img/powershell-run.png){:style=\\\"width:50%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-14\",\"content\":\"### 管理员与非管理员\\n\\n管理员权限打开的和非管理员权限的 Powershell 可以通过窗口标题以及初始工作目录来区分。\\n\\n![管理员与非管理员](/img/admin-vs-noadmin.png){:style=\\\"width:80%;\\\"}\\n\\n{:style=\\\"text-align:center;\\\"}\"},{\"id\":\"slide-15\",\"content\":\"### Powershell 默认终端的布局\\n\\nWindows 10 上为 Powershell 默认提供的终端布局如下：\\n\\n![终端的布局](/img/powershell-layout.png){:style=\\\"width:80%;\\\"}\\n\\n{:style=\\\"text-align:center;\\\"}\"},{\"id\":\"slide-16\",\"content\":\"$e\"},{\"id\":\"slide-17\",\"content\":\"### 查看命令的帮助\\n\\n对于内置的 cmdlet 指令，可以使用 `help` 或者 `man` 来查看指令的帮助文档。\\n\\n![命令帮助文档](/img/powershell-help-doc.png){:style=\\\"width:80%;\\\"}\\n\\n{:style=\\\"text-align:center;\\\"}\"},{\"id\":\"slide-18\",\"content\":\"### 快捷键\\n\\n有一些快捷键能极大地提升使用效率，供参考：\\n\\n- `Tab` 自动补全命令。\\n- `↑↓` 方向键可以翻看命令历史记录。\\n- `CTRL+C` 可以中断当前指令或脚本运行。\\n- 非管理员权限的命令行支持直接拖放目录或文件。\\n- 按住左键选中内容后点击右键可复制，直接点击右键可黏贴。\\n\\n{:style=\\\"font-size:70%\\\"}\"},{\"id\":\"slide-19\",\"content\":\"### 重定向\\n\\n在 Powershell 或其他 Shell 中，可以将指令执行的结果输出到文件中，甚至输出流之间也可以相互输出，我们称之为重定向。\\n\\n| 符号 | 作用                                                           |\\n| ---- | -------------------------------------------------------------- |\\n| \u003e    | 重定向输出并覆盖                                               |\\n| \u003e\u003e   | 重定向输出并追加                                               |\\n| 2\u003e\u00261 | 2 代表`stderr`，1 代表`stdout`，即将`stderr`重定向到`stdout`中 |\\n\\n{:style=\\\"font-size:70%\\\"}\"},{\"id\":\"slide-20\",\"content\":\"### 管道\\n\\n在 Powershell 或其他 Shell 中，还可以将第一个指令的输出作为第二个指令的输入，来实现程序之间的互通，管道的符号是 `|` 。比如想要删除当前文件夹中，文件名包含 `\u003ckeyword\u003e` 的所有文件。可以运行：\\n\\n```powershell\\ndir -Name | grep \u003ckeyword\u003e | Select-Object -ExpandProperty Line | rm\\n```\\n\\n注: grep 是 Select-String 的别名；如果用 GNU 工具链中的 grep 程序，则不需要 Select-Object -ExpandProperty Line 直接 `dir -Name | grep \u003ckeyword\u003e | rm` 即可。\\n\\n{:style=\\\"font-size:50%;margin-top:10px;\\\"}\"},{\"id\":\"slide-21\",\"content\":\"### 参考资料\\n\\n想了解完整的 cmdlets 可以查阅微软官方文档，一般情况下 Windows 10 自带的 Powershell 5.1 核心功能文档链接请点击 [Microsoft.PowerShell.Core](https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/?view=powershell-5.1) 。\"}]},{\"id\":\"slide-22\",\"content\":\"## 环境变量\",\"children\":[{\"id\":\"slide-23\",\"content\":\"### GUI 下设置环境变量\\n\\nWindows 10 下通过系统设置可以浏览及修改环境变量。\\n\\n![环境变量](/img/env-GUI.png){:style=\\\"width:80%;\\\"}\\n\\n{:style=\\\"text-align:center;\\\"}\"},{\"id\":\"slide-24\",\"content\":\"### 影响范围\\n\\n不同类型的环境变量影响范围不同，用户变量只对特定用户生效，而系统变量则全局生效。\\n\\n- 系统变量，与 Windows 操作系统包括网络状况有关，由操作系统定义。管理员权限的用户可以添加添加、修改或删除；系统变量的作用域是全局的，对所有用户生效。\\n- 用户变量，由操作系统、某些应用程序以及用户建立，相应的用户可以添加、修改或删除；用户变量只影响对应的用户。\\n\\n{:style=\\\"font-size:70%\\\"}\"},{\"id\":\"slide-25\",\"content\":\"### 环境变量的作用\\n\\n环境变量在现代操作系统中几乎无处不在，常见作用有：\\n\\n- 为各个进程提供系统相关信息，比如 Windows 下环境变量 `TEMP` 对应临时文件夹。\\n- `PATH` 环境变量存放一些目录，Shell 在执行指令时会试图从这些目录查找对应程序。\\n- 脚本中可以用环境变量来存储一些必要的数据，甚至可以将这些数据传递给其他进程。\\n\\n{:style=\\\"font-size:70%\\\"}\"},{\"id\":\"slide-26\",\"content\":\"### 常用环境变量\\n\\nWindows 下常见的环境变量有:\\n\\n- `Path`: 可执行文件搜索路径\\n- `ProgramFiles`: 默认程序安装目录\\n- `windir`: Windows 文件夹的路径\\n- `APPDATA`: 当前用户程序数据存放路径\\n- `TEMP` / `TMP`: 当前用户临时文件夹\\n\\n{:style=\\\"font-size:70%\\\"}\"},{\"id\":\"slide-27\",\"content\":\"### CLI 下操作环境变量\\n\\n在 Powershell 中也可以访问和修改环境变量：\\n\\n```powershell\\n# 显示所有环境变量\\ndir env:\\n\\n# 显示环境变量 Path 的值\\n$env:Path\\n\\n# 在 Path 后面追加一个目录\\n$env:Path += \\\";C:\\\\Temp\\\"\\n```\"}]},{\"id\":\"slide-28\",\"content\":\"## 脚本初探\",\"children\":[{\"id\":\"slide-29\",\"content\":\"### 什么是脚本\\n\\n将多条 cmdlets 集中在一个文件中，像编程一样自动化完成任务，这个文件我们称之为“脚本”。\\n\\n- cmd.exe 的脚本扩展名为 `.bat`，称之为批处理文件。\\n- Powershell 的脚本扩展名为 `.ps1` 。\\n\\n{:style=\\\"font-size:70%\\\"}\"},{\"id\":\"slide-30\",\"content\":\"### 脚本执行策略\\n\\nWindows 上出于安全考虑，默认脚本执行策略为 `Restricted` ，即阻止所有脚本运行。Powershell 执行策略包括以下几种：\\n\\n| 策略         | 作用                                                       |\\n| ------------ | ---------------------------------------------------------- |\\n| AllSigned    | 可以运行脚本，但要求数字签名，包括本地编写的脚本           |\\n| Bypass       | 不阻止任何脚本运行                                         |\\n| RemoteSigned | 可以运行脚本，远程下载的脚本需要数字签名，而本地编写的不用 |\\n| Restricted   | 不允许运行脚本                                             |\\n| Undefined    | 未定义                                                     |\\n| Unrestricted | 不限制脚本运行但会对非本地脚本弹出警告                     |\\n\\n{:style=\\\"font-size:70%;margin-bottom:10px;\\\"}\\n\\n详见[about_Execution_Policies](https://docs.microsoft.com/zh-cn/powershell/module/microsoft.powershell.core/about/about_execution_policies?view=powershell-7.1)\\n\\n{:style=\\\"font-size:50%;margin-top:10px;\\\"}\"},{\"id\":\"slide-31\",\"content\":\"### 脚本实例\\n\\n课件下方页面将通过一个实例来展示脚本的功能。\\n\\n参考: [Powershell 语法手册](https://docs.microsoft.com/en-us/powershell/scripting/lang-spec/chapter-01?view=powershell-7.2)\\n\\n{:style=\\\"font-size:50%;margin-top:10px;\\\"}\"}]},{\"id\":\"slide-32\",\"content\":\"## Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: justify;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":true,\"course\":\"aissop\",\"chapter\":\"shell\"}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
