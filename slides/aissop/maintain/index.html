.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z\",\"clipRule\":\"evenodd\"}]}],\"GitHub\"]}]}]]}]}]}]]}]}]],null],null],\"couldBeIntercepted\":false,\"initialHead\":[null,\"$La\"],\"globalErrorComponent\":\"$b\",\"missingSlots\":\"$Wc\"}]\n"])</script><script>self.__next_f.push([1,"d:I[55953,[\"924\",\"static/chunks/924-0ab8daba027740c3.js\",\"788\",\"static/chunks/app/slides/%5Bcourse%5D/%5Bchapter%5D/page-d12534b00ce90974.js\"],\"SlideContainer\"]\n"])</script><script>self.__next_f.push([1,"4:[\"$\",\"$Ld\",null,{\"slides\":[{\"id\":\"slide-1\",\"content\":\"# 系统维护\"},{\"id\":\"slide-2\",\"content\":\"## 路径与文件\",\"children\":[{\"id\":\"slide-3\",\"content\":\"### 概述\\n\\nWindows 中大体可以分为 `驱动器` / `目录` / `文件` 三个层级来组织管理系统及用户的文件。目录 (directory) 也可以称为文件夹，本课统一称之为目录。目录可以嵌套，文件可以直接放在驱动器根目录中，或者是任意子目录中，每一个目录或文件通过路径 (path) 来进行定位和访问。\"},{\"id\":\"slide-4\",\"content\":\"### 绝对路径\\n\\n又称完整路径，完整的唯一的定位某目录或文件的路径，必须包含驱动器根目录。绝对路径由驱动器根目录开始，逐级包含各层目录，最终指向某个文件或目录。\\n\\n![绝对路径](/img/path.png){:style=\\\"width:70%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-5\",\"content\":\"### 相对路径\\n\\n以当前目录为基点，利用 `.` 和 `..` 两个特殊目录为途径访问其他文件或目录的方法。文件或目录的相对路径随着当前目录变化而变化，并不唯一，但优势在于能够适用于程序在不同计算机上访问的情况。\\n\\n![相对路径](/img/relation_path.png){:style=\\\"width:70%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-6\",\"content\":\"### 路径切换\\n\\n在 cmd 或者 powershell 终端中可以使用 `cd` 命令加上目录的路径来切换当前目录：\\n\\n```bat\\n:: 切换到 C:\\\\Windows 目录\\ncd C:\\\\Windows\\n\\n:: 切换到当前驱动器根目录\\ncd \\\\\\n\\n:: 切换到上一级目录\\ncd ..\\\\\\n```\"}]},{\"id\":\"slide-7\",\"content\":\"## 磁盘管理\",\"children\":[{\"id\":\"slide-8\",\"content\":\"### 驱动器\\n\\nWindows 下将磁盘划分为不同区域进行管理，并为每个分区分配驱动器号，常说的“C 盘”实际上是驱动器号为 \\\"C:\\\" 的分区。在安装系统或者笔记本出厂时，会设置一些用于系统恢复的数据分区，不分配驱动器号，避免用户误操作破坏数据。\\n\\n{:style=\\\"font-size: 70%;\\\"}\\n\\n![驱动器](/img/drive.png){:style=\\\"width:60%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-9\",\"content\":\"### 分区大小调整\\n\\n在磁盘管理工具中，可以捅过扩展卷或者压缩卷的功能来对卷（分区）大小进行调整。\\n\\n![调整分区大小](/img/adjust_partitions.png){:style=\\\"width:60%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-10\",\"content\":\"### 格式化\\n\\n在磁盘工具或者文件资源管理器中，还可以对分区进行格式化。\\n\\n![格式化](/img/format.png){:style=\\\"width:70%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"}]},{\"id\":\"slide-11\",\"content\":\"## 文件系统\",\"children\":[{\"id\":\"slide-12\",\"content\":\"### 二进制与文件\\n\\n计算机存储、运算都采用二进制，文件保存在硬盘上也是以二进制数据的形式存在的。\\n\\n![十六进制查看文件](/img/binary_png_file.png){:style=\\\"width:70%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-13\",\"content\":\"### NTFS 文件系统\\n\\nWindows 操作系统在单个磁盘分区上默认采用 NTFS (New Technology File System) 文件系统来组织管理文件。对于部分版本较老的机器还可能采用 FAT32 文件系统来管理文件。\"},{\"id\":\"slide-14\",\"content\":\"### NTFS 元文件\\n\\nNTFS 文件系统在格式化时会自动产生以下元文件来记录本分区的内容。\\n\\n| 序号 | 文件名    | 作用                   |\\n| ---- | --------- | ---------------------- |\\n| 0    | \\\\$MFT     | 主文件表               |\\n| 1    | \\\\$MFTMirr | 文件表镜像             |\\n| 2    | \\\\$LogFile | 日志文件               |\\n| 3    | \\\\$Volumn  | 卷文件，记录卷标信息   |\\n| 4    | \\\\$AttrDef | 属性定义文件           |\\n| 5    | \\\\$Root    | 根目录文件，管理根目录 |\\n| 6    | \\\\$Bitmap  | 位图记录簇的使用情况   |\\n| 7    | \\\\$Boot    | 引导文件，分区引导信息 |\\n\\n{:style=\\\"font-size: 70%;\\\"}\"},{\"id\":\"slide-15\",\"content\":\"### 文件记录\\n\\n保存在 \\\\$MFT 中，每条文件记录以 `FILE` 开头，以 `FFFFFFFF` 结束。\\n\\n![文件记录](/img/file_record.png){:style=\\\"width:70%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\"},{\"id\":\"slide-16\",\"content\":\"### 文件记录结构\\n\\n文件记录是按一定结构进行组织的，包含了文件名、文件大小、创建时间等绝大部分信息。\u003cb style=\\\"color:red;\\\"\u003e文件记录头和各属性字段分析详见课件下方网页。\u003c/b\u003e\\n\\n| 序号 | 名称       | 作用                   |\\n| ---- | ---------- | ---------------------- |\\n| 0    | 文件记录头 | 文件记录本身的相关信息 |\\n| 1    | 属性记录 1 | 文件的属性信息         |\\n| 2    | 属性记录 2 | 文件的属性信息         |\\n| ...  | ...        | ...                    |\\n| n    | 属性记录 n | 文件的属性信息         |\\n\\n{:style=\\\"font-size: 70%;\\\"}\"},{\"id\":\"slide-17\",\"content\":\"### 文件恢复\\n\\n默认情况下，Windows 在删除文件时，只是简单的将该文件对应的文件记录中的文件是否删除标记进行了修改，并没有抹掉文件内容和文件记录，可以通过 Winhex 等工具进行恢复。\"}]},{\"id\":\"slide-18\",\"content\":\"## 网络维护\",\"children\":[{\"id\":\"slide-19\",\"content\":\"### IP 地址\\n\\nInternet Protocol Address, 用于标识发送与接受数据的设备的一串数字。IP 地址分为 IPv4 和 IPv6 两大类，目前还默认指代 IPv4 地址。IPv4 地址往往由 32 位二进制组成，为了便于记忆和使用，常常划分为 4 组取值 0-255 之间的十进制数字并用`.`隔开，称之为点分十进制，如 `202.205.16.4`。\\n\\n扩展阅读: [IP 地址-维基百科](https://zh.wikipedia.org/wiki/IP%E5%9C%B0%E5%9D%80)\\n\\n{:style=\\\"font-size: 50%;font-style: italic;\\\"}\"},{\"id\":\"slide-20\",\"content\":\"### NAT - 网络地址转换\\n\\nNetwork Address Translation, 一种为了缓解 IPv4 地址枯竭问题而广泛使用的技术。常见路由器上都搭载了 NAT 技术来实现地址转换。\\n\\n![NAT](/img/NAT.png){:style=\\\"width:110%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\\n\\n扩展阅读: [网络地址转换-维基百科](https://zh.wikipedia.org/wiki/%E7%BD%91%E7%BB%9C%E5%9C%B0%E5%9D%80%E8%BD%AC%E6%8D%A2)\\n\\n{:style=\\\"font-size: 50%;font-style: italic;\\\"}\"},{\"id\":\"slide-21\",\"content\":\"### 子网\\n\\n为了便于管理，将整个 IP 网络划分为无数小的子网，IP 地址由两个部分组成：网络前缀(network prefix)和剩余字段(rest field)，日常中也可以叫做网络部分和主机部分。为了明确一个 IPv4 地址的网络前缀和剩余字段，可采用以下两种写法：\\n\\n- 子网掩码，比如 IPv4 地址为 `10.66.4.122` ，其中前 24 位是网络前缀，子网掩码就是 `255.255.255.0`。\\n- 无类别域间路由 (CIDR, Classless Inter-Domain Routing)，上面的地址和子网用 CIDR 表示为 `10.66.4.122/24`。\\n\\n{:style=\\\"font-size: 70%;\\\"}\\n\\n扩展阅读: [子网-维基百科](https://zh.wikipedia.org/wiki/%E5%AD%90%E7%BD%91)\\n\\n{:style=\\\"font-size: 50%;font-style: italic;\\\"}\"},{\"id\":\"slide-22\",\"content\":\"### 网关\\n\\n如果两台主机处于不同的子网，那么他们不能直接通信，需要经过各自的网关进行数据的转发才能通信。日常生活中，路由器往往就是我们的网关设备，因此网关地址就是路由器在内网上的 IP 地址。\\n\\n扩展阅读: [网关-维基百科](https://zh.wikipedia.org/wiki/%E7%BD%91%E5%85%B3) / [路由器-维基百科](https://zh.wikipedia.org/wiki/%E8%B7%AF%E7%94%B1%E5%99%A8)\\n\\n{:style=\\\"font-size: 50%;font-style: italic;\\\"}\"},{\"id\":\"slide-23\",\"content\":\"### DNS\\n\\nDomain Name System, 域名系统能够将域名与 IP 地址进行对应，域名是一些方便记忆的字符串比如 `cuc.edu.cn`。计算机通过域名访问各种服务时，需要先通过域名服务器也就是 DNS 服务器来查询目标域名对应的 IP，再通过 IP 进行访问，这一过程称为域名解析。\\n\\n扩展阅读: [域名系统-维基百科](https://zh.wikipedia.org/wiki/%E5%9F%9F%E5%90%8D%E7%B3%BB%E7%BB%9F)\\n\\n{:style=\\\"font-size: 50%;font-style: italic;\\\"}\"},{\"id\":\"slide-24\",\"content\":\"### DHCP 与手动配置\\n\\n一般情况下，电脑会自动访问路由器内置动态主机设置协议(DHCP, Dynamic Host Configuration Protocol)服务器完成网络配置。在特殊情况下还可以在“设置”-\u003e“网络连接”-\u003e“以太网”或“WLAN”中手动设置网络相关配置。\\n\\n{:style=\\\"font-size: 70%;\\\"}\\n\\n![手动设置](/img/manual_ip_setting.png){:style=\\\"width:70%;\\\"}\\n\\n{:style=\\\"text-align:center\\\"}\\n\\n扩展阅读: [动态主机设置协议-维基百科](https://zh.wikipedia.org/wiki/%E5%8A%A8%E6%80%81%E4%B8%BB%E6%9C%BA%E8%AE%BE%E7%BD%AE%E5%8D%8F%E8%AE%AE)\\n\\n{:style=\\\"font-size: 50%;font-style: italic;\\\"}\"},{\"id\":\"slide-25\",\"content\":\"### 网络连接诊断与修复\\n\\n发现联网失败时，可以从多个角度判断连接问题，尽力修复连接。\"}]},{\"id\":\"slide-26\",\"content\":\"## Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: justify;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":true,\"course\":\"aissop\",\"chapter\":\"maintain\"}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
