pt><script>self.__next_f.push([1,"or=\"inputZip\"\u003eZip\u003c/label\u003e\n      \u003cinput type=\"text\" class=\"form-control\" id=\"inputZip\" /\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n  \u003cdiv class=\"form-group\"\u003e\n    \u003cdiv class=\"form-check\"\u003e\n      \u003cinput class=\"form-check-input\" type=\"checkbox\" id=\"gridCheck\" /\u003e\n      \u003clabel class=\"form-check-label\" for=\"gridCheck\"\u003e\n        Check me out\n      \u003c/label\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n  \u003cbutton type=\"submit\" class=\"btn btn-primary\"\u003eSign in\u003c/button\u003e\n\u003c/form\u003e\n```"])</script><script>self.__next_f.push([1,"4:[\"$\",\"$Ld\",null,{\"slides\":[{\"id\":\"slide-1\",\"content\":\"# Bootstrap\"},{\"id\":\"slide-2\",\"content\":\"## Bootstrap 简介\\n\\nBootstrap 是 Twitter 的两位设计师发起的一个开源项目，2011 年开始在 GitHub 上开源，现在有一个专门的团队维护，非常流行。它是一款响应式、移动优先的前端组件库。\\n\\n- [官方文档](https://getbootstrap.com/)\\n\\n{:style=\\\"font-size:70%\\\"}\"},{\"id\":\"slide-3\",\"content\":\"$e\",\"children\":[{\"id\":\"slide-4\",\"content\":\"### viewport\\n\\n`viewport` 这一 `meta` 元素是用来使得页面宽度与设备宽度一致而设计的，其中 `width=device-width` 使得页面宽度与设备宽度一致，`initial-scale=1` 使得默认元素缩放为 100%，`shrink-to-fit=no` 是为了兼容 Safari 9 设计的。\"},{\"id\":\"slide-5\",\"content\":\"### 安全机制\\n\\n在 `link` 与 `script` 中引入了两个属性来提升页面加载的安全性，`integrity` 是文件的校验和用来避免引入被人篡改过的文件，`crossorigin` 则是跨站安全领域的设置，此处不做展开。\"}]},{\"id\":\"slide-6\",\"content\":\"## 布局\\n\\nBootstrap 的布局包括一个 container 一个网格系统以及一些实用的布局组件。\",\"children\":[{\"id\":\"slide-7\",\"content\":\"$f\"},{\"id\":\"slide-8\",\"content\":\"### Grid\\n\\n在 CSS 布局中我们提到了网格系统，Bootstrap 基于 flexbox 实现了一套非常完善的网格系统。行的 `class` 为 `row`，列则根据宽度 `col`/`col-sm`/`col-md`/`col-lg`/`col-xl` 几种，每行宽度为 12 列。\\n\\n```html\\n\u003cdiv class=\\\"container\\\"\u003e\\n  \u003cdiv class=\\\"row\\\"\u003e\\n    \u003cdiv class=\\\"col\\\"\u003e\\n      One of three columns\\n    \u003c/div\u003e\\n    \u003cdiv class=\\\"col\\\"\u003e\\n      One of three columns\\n    \u003c/div\u003e\\n    \u003cdiv class=\\\"col\\\"\u003e\\n      One of three columns\\n    \u003c/div\u003e\\n  \u003c/div\u003e\\n\u003c/div\u003e\\n```\"}]},{\"id\":\"slide-9\",\"content\":\"## 内容样式\\n\\nBootstrap 为大部分元素都定义了对应的 class 来使得页面元素样式美观一致。\",\"children\":[{\"id\":\"slide-10\",\"content\":\"### 标题\\n\\n`\u003ch1\u003e` 到 `\u003ch6\u003e` 在引入 Bootstrap 样式以后都有统一的样式，如果你想让正文的段落看起来像不同的标题级别，可以为它们添加 class 为 `h1` 到 `h6`。\\n\\n```html\\n\u003cp class=\\\"h1\\\"\u003eh1. Bootstrap heading\u003c/p\u003e\\n\u003cp class=\\\"h2\\\"\u003eh2. Bootstrap heading\u003c/p\u003e\\n\u003cp class=\\\"h3\\\"\u003eh3. Bootstrap heading\u003c/p\u003e\\n\u003cp class=\\\"h4\\\"\u003eh4. Bootstrap heading\u003c/p\u003e\\n\u003cp class=\\\"h5\\\"\u003eh5. Bootstrap heading\u003c/p\u003e\\n\u003cp class=\\\"h6\\\"\u003eh6. Bootstrap heading\u003c/p\u003e\\n```\"},{\"id\":\"slide-11\",\"content\":\"### 文本/图像/表格等\\n\\n针对文本/图像/表格等元素，Bootstrap 提供了大量的样式来帮助调整对齐、颜色等样式。\\n\\n- [文本](https://getbootstrap.com/docs/4.4/utilities/text/)\\n- [图像](https://getbootstrap.com/docs/4.4/content/images/)\\n- [表格](https://getbootstrap.com/docs/4.4/content/tables/)\\n\\n{:style=\\\"font-size:60%\\\"}\"}]},{\"id\":\"slide-12\",\"content\":\"## 组件\\n\\nBootstrap 非常重要的一个优势就是提供了大量视觉设计统一，响应式的组件，能够帮助用户快速的构建自己的站点。\",\"children\":[{\"id\":\"slide-13\",\"content\":\"### 导航-介绍\\n\\nNavbar 是 Bootstrap 提供的响应式导航栏，它可以固定在页面上方，为用户提供快速在页面中跳转的能力，且能够在屏幕宽度变化是折叠展开。\\n\\n- 导航栏使用 .navbar 以及 .navbar-expand{-sm|-md|-lg|-xl} 来包裹。\\n- 导航栏的宽度默认是占满整个页面宽度的，类似 .container-fluid 。\\n- 导航栏应该使用 `\u003cnav\u003e` 元素进行创建。\\n\\n{:style=\\\"font-size:70%\\\"}\"},{\"id\":\"slide-14\",\"content\":\"$10\"},{\"id\":\"slide-15\",\"content\":\"### 导航-样式\\n\\n导航栏可以引用不同的颜色样式，常见的有三种。\\n\\n```html\\n\u003cnav class=\\\"navbar navbar-dark bg-dark\\\"\u003e\\n  \u003c!-- Navbar content --\u003e\\n\u003c/nav\u003e\\n\\n\u003cnav class=\\\"navbar navbar-dark bg-primary\\\"\u003e\\n  \u003c!-- Navbar content --\u003e\\n\u003c/nav\u003e\\n\\n\u003cnav class=\\\"navbar navbar-light\\\" style=\\\"background-color: #e3f2fd;\\\"\u003e\\n  \u003c!-- Navbar content --\u003e\\n\u003c/nav\u003e\\n```\"},{\"id\":\"slide-16\",\"content\":\"### 表单\\n\\nBootstrap 对表单也进行了风格统一和美化，提供了表单布局以及样式方面的类来帮助用户快速构建现在风格的页面。\"},{\"id\":\"slide-17\",\"content\":\"### 表单-实例\\n\\n```html\\n\u003cform\u003e\\n  \u003cdiv class=\\\"form-group\\\"\u003e\\n    \u003clabel for=\\\"exampleInputEmail1\\\"\u003eEmail address\u003c/label\u003e\\n    \u003cinput\\n      type=\\\"email\\\"\\n      class=\\\"form-control\\\"\\n      id=\\\"exampleInputEmail1\\\"\\n      aria-describedby=\\\"emailHelp\\\"\\n    /\u003e\\n    \u003csmall id=\\\"emailHelp\\\" class=\\\"form-text text-muted\\\"\\n      \u003eWe'll never share your email with anyone else.\u003c/small\\n    \u003e\\n  \u003c/div\u003e\\n  \u003cdiv class=\\\"form-group\\\"\u003e\\n    \u003clabel for=\\\"exampleInputPassword1\\\"\u003ePassword\u003c/label\u003e\\n    \u003cinput type=\\\"password\\\" class=\\\"form-control\\\" id=\\\"exampleInputPassword1\\\" /\u003e\\n  \u003c/div\u003e\\n  \u003cdiv class=\\\"form-group form-check\\\"\u003e\\n    \u003cinput type=\\\"checkbox\\\" class=\\\"form-check-input\\\" id=\\\"exampleCheck1\\\" /\u003e\\n    \u003clabel class=\\\"form-check-label\\\" for=\\\"exampleCheck1\\\"\u003eCheck me out\u003c/label\u003e\\n  \u003c/div\u003e\\n  \u003cbutton type=\\\"submit\\\" class=\\\"btn btn-primary\\\"\u003eSubmit\u003c/button\u003e\\n\u003c/form\u003e\\n```\"},{\"id\":\"slide-18\",\"content\":\"$11\"}]},{\"id\":\"slide-19\",\"content\":\"## 总结\\n\\nBootstrap 提供了一套完成自洽且能够快速开发的前端库，我们可以在其[官网](https://getbootstrap.com/)找到相关资料并开发自己的站点。\"},{\"id\":\"slide-20\",\"content\":\"## Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: justify;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":true,\"course\":\"web\",\"chapter\":\"bootstrap\"}]\n"])</script><script
