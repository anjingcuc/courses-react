02 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z\",\"clipRule\":\"evenodd\"}]}],\"GitHub\"]}]}]]}]}]}]]}]}]],null],null],\"couldBeIntercepted\":false,\"initialHead\":[null,\"$La\"],\"globalErrorComponent\":\"$b\",\"missingSlots\":\"$Wc\"}]\n"])</script><script>self.__next_f.push([1,"d:I[55953,[\"924\",\"static/chunks/924-0ab8daba027740c3.js\",\"788\",\"static/chunks/app/slides/%5Bcourse%5D/%5Bchapter%5D/page-d12534b00ce90974.js\"],\"SlideContainer\"]\n"])</script><script>self.__next_f.push([1,"4:[\"$\",\"$Ld\",null,{\"slides\":[{\"id\":\"slide-1\",\"content\":\"# CSS 盒子样式\"},{\"id\":\"slide-2\",\"content\":\"## CSS 盒模式\",\"children\":[{\"id\":\"slide-3\",\"content\":\"### 块状盒子 - block\\n\\n块状盒子有以下特点：\\n\\n— 行内方向(横向)扩充自身占据父容器的所有可用空间；\\n— 每个盒子都会自动换行；\\n— width / height 可以定义宽和高；\\n— padding / margin / border 会将其他盒子推开。\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-4\",\"content\":\"### 行内盒子 - inline\\n\\n行内盒子有以下特点：\\n\\n- 盒子不会换行；\\n- width / height 不起作用；\\n- padding / margin / border 不会将其他行内盒子推开。\\n\\n{:style=\\\"font-size:70%;\\\"}\"}]},{\"id\":\"slide-5\",\"content\":\"## 盒子样式\\n\\n盒子样式分为四个部分进行介绍：\\n\\n- 基本样式\\n- 背景边界\\n- 表格样式\\n- 高级样式\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-6\",\"content\":\"## 盒子样式-基本样式\\n\\n复习，盒子分为块状盒子 (block) 和内联盒子 (inline) ，两种盒子会在页面流 (page flow) 和元素之间的关系方面表现出不同行为。\\n\\n{:style=\\\"font-size:70%;\\\"}\\n\\n| 行为                         | 块状盒子         | 内联盒子 |\\n| ---------------------------- | ---------------- | -------- |\\n| 换行                         | 是               | 否       |\\n| width / height               | 能够指定盒子宽高 | 不起作用 |\\n| 边距和边框是否推开其他原元素 | 是               | 否       |\\n\\n{:style=\\\"font-size:70%;\\\"}\",\"children\":[{\"id\":\"slide-7\",\"content\":\"### 基本样式-内部/外部\\n\\n块状与内联都是盒子在页面上对外展示出来的样式，盒子内部也有样式。`display: flex` 可以使得盒子内容采用弹性盒子 (flexbox) 进行布局，该内容将在布局一节展开介绍。\\n\\n{:style=\\\"font-size:70%;\\\"}\\n\\n```css\\np,\\nul {\\n  border: 2px solid rebeccapurple;\\n  padding: 0.5em;\\n}\\n.block,\\nli {\\n  border: 2px solid blue;\\n  padding: 0.5em;\\n}\\nul {\\n  display: flex;\\n  list-style: none;\\n}\\n.block {\\n  display: block;\\n}\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\\\"}\\n\\n```html\\n\u003cp\u003eI am a paragraph. A short one.\u003c/p\u003e\\n\u003cul\u003e\\n  \u003cli\u003eItem One\u003c/li\u003e\\n  \u003cli\u003eItem Two\u003c/li\u003e\\n  \u003cli\u003eItem Three\u003c/li\u003e\\n\u003c/ul\u003e\\n\u003cp\u003e\\n  I am another paragraph. Some of the\\n  \u003cspan class=\\\"block\\\"\u003ewords\u003c/span\u003e\\n  have been wrapped in a\\n  \u003cspan\u003espan element\u003c/span\u003e.\\n\u003c/p\u003e\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\\\"}\"},{\"id\":\"slide-8\",\"content\":\"### 基本样式-盒模型组成部分\\n\\n对于一个块状盒子来说，包括以下组成部分。\\n\\n| 部分 | 作用                               | CSS          |\\n| ---- | ---------------------------------- | ------------ |\\n| 内容 | 显示盒子包含的内容，主要显示区域。 | width/height |\\n| 填充 | 内容部分和边框部分之间填充的空白。 | padding      |\\n| 边框 | 盒子的边框。                       | border       |\\n| 空白 | 最外层，和其他盒子之间的空白。     | margin       |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-9\",\"content\":\"### 基本样式-标准/替代模型\\n\\n盒模型一共分为两种：标准盒子 / 替代盒子，现代浏览器默认使用标准盒子，如果要强制使用替代盒子，则使用`box-sizing: border-box;`。\\n\\n![标准](/img/standard-box-model.png)\\n\\n{:style=\\\"float:left;width:48%;padding:1%;\\\"}\\n\\n![替代](/img/alternate-box-model.png)\\n\\n{:style=\\\"float:left;width:48%;padding:1%;\\\"}\"},{\"id\":\"slide-10\",\"content\":\"### 基本样式-外边距\\n\\n| CSS                            | 作用                           |\\n| ------------------------------ | ------------------------------ |\\n| margin: value;                 | 四周同样大小的空白。           |\\n| margin: vertical horizontal;   | 分别定义纵向，横向的空白。     |\\n| margin: top horizontal bottom; | 定义上面，横向，下面的空白。   |\\n| margin: top right bottom left; | 分别定义上、右、下、左的空白。 |\\n\\n{:style=\\\"font-size:70%;\\\"}\\n\\n```CSS\\n.box {\\n  margin-top: -40px;\\n  margin-right: 30px;\\n  margin-bottom: 40px;\\n  margin-left: 4em;\\n}\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:300px;display:flex;align-items:center;\\\"}\\n\\n```html\\n\u003cdiv class=\\\"container\\\"\u003e\\n  \u003cdiv class=\\\"box\\\"\u003eChange my margin.\u003c/div\u003e\\n\u003c/div\u003e\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:300px;display:flex;align-items:center;\\\"}\"},{\"id\":\"slide-11\",\"content\":\"### 基本样式-外边距塌陷\\n\\n如果你有两个外边距相接的元素，这些外边距将合并为一个外边距，即最大的单个外边距的大小。\\n\\n```CSS\\n.one {\\n  margin-bottom: 50px;\\n}\\n\\n.two {\\n  margin-top: 30px;\\n}\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\\\"}\\n\\n```html\\n\u003cdiv class=\\\"container\\\"\u003e\\n  \u003cp class=\\\"one\\\"\u003eI am paragraph one.\u003c/p\u003e\\n  \u003cp class=\\\"two\\\"\u003eI am paragraph two.\u003c/p\u003e\\n\u003c/div\u003e\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\\\"}\"},{\"id\":\"slide-12\",\"content\":\"### 基本样式-边框\\n\\n边框与 margin 类似，也可以对四周分别进行定义，同时，边框除了宽度以外还可以定义样式和颜色。\\n\\n```CSS\\n.container {\\n  border-top: 5px dotted green;\\n  border-right: 1px solid black;\\n  border-bottom: 20px double rgb(23,45,145);\\n}\\n\\n.box {\\n  border: 1px solid #333333;\\n  border-top-style: dotted;\\n  border-right-width: 20px;\\n  border-bottom-color: hotpink;\\n}\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\\\"}\\n\\n```html\\n\u003cdiv class=\\\"container\\\"\u003e\\n  \u003cdiv class=\\\"box\\\"\u003eChange my borders.\u003c/div\u003e\\n\u003c/div\u003e\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:420px;display:flex;align-items:center;\\\"}\"},{\"id\":\"slide-13\",\"content\":\"### 基本样式-填充\\n\\n| CSS                             | 作用                           |\\n| ------------------------------- | ------------------------------ |\\n| padding: value;                 | 四周同样大小的填充。           |\\n| padding: vertical horizontal;   | 分别定义纵向，横向的填充。     |\\n| padding: top horizontal bottom; | 定义上面，横向，下面的填充。   |\\n| padding: top right bottom left; | 分别定义上、右、下、左的填充。 |\\n\\n{:style=\\\"font-size:70%;\\\"}\\n\\n```CSS\\n.box {\\n  padding-top: 0;\\n  padding-right: 30px;\\n  padding-bottom: 40px;\\n  padding-left: 4em;\\n}\\n\\n.container {\\n  padding: 20px;\\n}\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:300px;display:flex;align-items:center;\\\"}\\n\\n```html\\n\u003cdiv class=\\\"container\\\"\u003e\\n  \u003cdiv class=\\\"box\\\"\u003eChange my padding.\u003c/div\u003e\\n\u003c/div\u003e\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:300px;display:flex;align-items:center;\\\"}\"},{\"id\":\"slide-14\",\"content\":\"### 基本样式-内联盒子\\n\\n以上样式都可以应用于块状盒子，但是对于内联盒子，`width/height` 是无效的，`margin/border/padding` 虽然有效，但不会推开其他元素。\\n\\n```CSS\\nspan {\\n  margin: 20px;\\n  padding: 20px;\\n  width: 80px;\\n  height: 50px;\\n  background-color: lightblue;\\n  border: 2px solid blue;\\n}\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:300px;display:flex;align-items:center;\\\"}\\n\\n```html\\n\u003cp\u003e\\n  I am a paragraph and this is a \u003cspan\u003espan\u003c/span\u003e inside that paragraph. A span\\n  is an inline element and so does not respect width and height.\\n\u003c/p\u003e\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:300px;display:flex;align-items:center;\\\"}\"}]},{\"id\":\"slide-15\",\"content\":\"## 盒子样式-背景边框\",\"children\":[{\"id\":\"slide-16\",\"content\":\"### 背景边框-背景颜色\\n\\n通过 `background-color` 可以改变盒子的背景颜色，值和字体的颜色值一样，可以采用多种形式。\\n\\n```CSS\\n.box {\\n  background-color: #567895;\\n}\\n\\nh2 {\\n  background-color: black;\\n  color: white;\\n}\\nspan {\\n  background-color: rgba(255,255,255,.5);\\n}\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:300px;display:flex;align-items:center;\\\"}\\n\\n```html\\n\u003cdiv class=\\\"box\\\"\u003e\\n  \u003ch2\u003eBackground Colors\u003c/h2\u003e\\n  \u003cp\u003eTry changing the background \u003cspan\u003ecolors\u003c/span\u003e.\u003c/p\u003e\\n\u003c/div\u003e\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:300px;display:flex;align-items:center;\\\"}\"},{\"id\":\"slide-17\",\"content\":\"### 背景边框-背景图片\\n\\n通过 `background-image` 可以指定背景图片，图片大小不一定与盒子大小一致。\\n\\n```CSS\\n.a {\\n  background-image: url(https://mdn.github.io/css-examples/learn/backgrounds-borders/balloons.jpg);\\n}\\n\\n.b {\\n  background-image: url(https://mdn.github.io/css-examples/learn/backgrounds-borders/star.png);\\n}\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:300px;display:flex;align-items:center;\\\"}\\n\\n```html\\n\u003cdiv class=\\\"wrapper\\\"\u003e\\n  \u003cdiv class=\\\"a\\\"\u003e\u003c/div\u003e\\n  \u003cdiv class=\\\"b\\\"\u003e\u003c/div\u003e\\n\u003c/div\u003e\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:300px;display:flex;align-items:center;\\\"}\"},{\"id\":\"slide-18\",\"content\":\"### 背景边框-图片重复\\n\\n通过 `background-repeat` 可以指定背景图片是否重复以及重复方向。\\n\\n| CSS                          | 作用                 |\\n| ---------------------------- | -------------------- |\\n| background-repeat: no-repeat | 图片不会重复         |\\n| background-repeat: repeat-x  | 图片横向重复         |\\n| background-repeat: repeat-y  | 图片纵向重复         |\\n| background-repeat: repeat    | 默认，图片纵横向重复 |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-19\",\"content\":\"### 背景边框-图片大小\\n\\n通过 `background-size` 可以指定背景图片大小。\\n\\n| CSS                            | 作用                                     |\\n| ------------------------------ | ---------------------------------------- |\\n| background-size: cover;        | 图片保持原比例并确保占满盒子内容空间。   |\\n| background-size: contain;      | 图片拉伸以适应盒子内容空间，不保证比例。 |\\n| background-size: width height; | 指定图片的 width 和 height。             |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-20\",\"content\":\"### 背景边框-图片位置\\n\\n通过 `background-position` 可以指定背景图片相对于左上角 (0,0) 的位置，以下方式可以自由组合。\\n\\n| CSS                                      | 作用                                                  |\\n| ---------------------------------------- | ----------------------------------------------------- |\\n| background-position: top;                | 指定图片贴着某一边，比如 top / bottom / left / right. |\\n| background-position: bottom 20px;        | 图片贴着底部，并离左侧 20px。                         |\\n| background-position: top 20px right 10%; | 图片离顶部 20px 离右侧 10% 宽度。                     |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-21\",\"content\":\"## 背景边框-边框\\n\\n圆角矩形 `border-radius`。\\n\\n```CSS\\n.box {\\n  border: 10px solid rebeccapurple;\\n  border-radius: 1em;\\n  border-top-right-radius: 10% 30%;\\n}\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:300px;display:flex;align-items:center;\\\"}\\n\\n```html\\n\u003cdiv class=\\\"box\\\"\u003e\\n  \u003ch2\u003eBorders\u003c/h2\u003e\\n  \u003cp\u003eTry changing the borders.\u003c/p\u003e\\n\u003c/div\u003e\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:300px;display:flex;align-items:center;\\\"}\"}]},{\"id\":\"slide-22\",\"content\":\"## 盒子样式-表格样式\\n\\n尝试美化以下表格。\\n\\n```html\\n\u003ctable\u003e\\n  \u003ccaption\u003e\\n    A summary of the UK's most famous punk bands\\n  \u003c/caption\u003e\\n  \u003cthead\u003e\\n    \u003ctr\u003e\\n      \u003cth scope=\\\"col\\\"\u003eBand\u003c/th\u003e\\n      \u003cth scope=\\\"col\\\"\u003eYear formed\u003c/th\u003e\\n      \u003cth scope=\\\"col\\\"\u003eNo. of Albums\u003c/th\u003e\\n      \u003cth scope=\\\"col\\\"\u003eMost famous song\u003c/th\u003e\\n    \u003c/tr\u003e\\n  \u003c/thead\u003e\\n  \u003ctbody\u003e\\n    \u003ctr\u003e\\n      \u003cth scope=\\\"row\\\"\u003eBuzzcocks\u003c/th\u003e\\n      \u003ctd\u003e1976\u003c/td\u003e\\n      \u003ctd\u003e9\u003c/td\u003e\\n      \u003ctd\u003eEver fallen in love (with someone you shouldn't've)\u003c/td\u003e\\n    \u003c/tr\u003e\\n    \u003ctr\u003e\\n      \u003cth scope=\\\"row\\\"\u003eThe Clash\u003c/th\u003e\\n      \u003ctd\u003e1976\u003c/td\u003e\\n      \u003ctd\u003e6\u003c/td\u003e\\n      \u003ctd\u003eLondon Calling\u003c/td\u003e\\n    \u003c/tr\u003e\\n\\n    ... some rows removed for brevity\\n\\n    \u003ctr\u003e\\n      \u003cth scope=\\\"row\\\"\u003eThe Stranglers\u003c/th\u003e\\n      \u003ctd\u003e1974\u003c/td\u003e\\n      \u003ctd\u003e17\u003c/td\u003e\\n      \u003ctd\u003eNo More Heroes\u003c/td\u003e\\n    \u003c/tr\u003e\\n  \u003c/tbody\u003e\\n  \u003ctfoot\u003e\\n    \u003ctr\u003e\\n      \u003cth scope=\\\"row\\\" colspan=\\\"2\\\"\u003eTotal albums\u003c/th\u003e\\n      \u003ctd colspan=\\\"2\\\"\u003e77\u003c/td\u003e\\n    \u003c/tr\u003e\\n  \u003c/tfoot\u003e\\n\u003c/table\u003e\\n```\",\"children\":[{\"id\":\"slide-23\",\"content\":\"## 表格样式-间距和布局\\n\\n首先添加以下间距和布局来使得内容分布更加恰当。\\n\\n```CSS\\n/* spacing */\\n\\ntable {\\n  table-layout: fixed;      /*根据标题宽度来分配列得宽度，使得内容宽度恰当*/\\n  width: 100%;              /*占满父容器*/\\n  border-collapse: collapse;/*合并表格边框*/\\n  border: 3px solid purple; /*紫色实线粗边框*/\\n}\\n\\nthead th:nth-child(1) {     /*伪元素选中thead得第一个th子元素也就是第一列*/\\n  width: 30%;\\n}\\n\\nthead th:nth-child(2) {     /*伪元素选中thead得第二个th子元素也就是第二列*/\\n  width: 20%;\\n}\\n\\nthead th:nth-child(3) {     /*伪元素选中thead得第三个th子元素也就是第三列*/\\n  width: 15%;\\n}\\n\\nthead th:nth-child(4) {     /*伪元素选中thead得第四个th子元素也就是第四列*/\\n  width: 35%;\\n}\\n\\nth, td {                    /*所有标题和单元格都填空20px空白*/\\n  padding: 20px;\\n}\\n```\"},{\"id\":\"slide-24\",\"content\":\"### 表格样式-排版\\n\\n修改对齐和文字间距来排版。\\n\\n```CSS\\nth {\\n  letter-spacing: 2px;\\n}\\n\\ntd {\\n  letter-spacing: 1px;\\n}\\n\\ntbody td {\\n  text-align: center;\\n}\\n\\ntfoot th {\\n  text-align: right;\\n}\\n```\"},{\"id\":\"slide-25\",\"content\":\"### 表格样式-图形和颜色\\n\\n添加背景图片和颜色来进一步美化。\\n\\n```CSS\\nthead, tfoot {\\n  background: url(leopardskin.jpg);\\n  color: white;\\n  text-shadow: 1px 1px 1px black;\\n}\\n\\nthead th, tfoot th, tfoot td {\\n  border: 3px solid purple;\\n}\\n\\ntbody tr:nth-child(odd) {           /*奇数行一个颜色*/\\n  background-color: #ff33cc;\\n}\\n\\ntbody tr:nth-child(even) {          /*偶数行一个颜色*/\\n  background-color: #e495e4;\\n}\\n\\ntbody tr {\\n  background-image: url(noise.png); /*透明噪点背景*/\\n}\\n\\ntable {\\n  background-color: #ff33cc;\\n}\\n```\"},{\"id\":\"slide-26\",\"content\":\"### 表格样式-标题\\n\\n美化标题。\\n\\n```CSS\\ncaption {\\n  padding: 20px;\\n  font-style: italic;\\n  caption-side: bottom;       /*特殊标题样式，在底部显示标题。*/\\n  color: #666;\\n  text-align: right;\\n  letter-spacing: 1px;\\n}\\n```\"}]},{\"id\":\"slide-27\",\"content\":\"## 盒子样式-高级样式\",\"children\":[{\"id\":\"slide-28\",\"content\":\"### 高级样式-阴影\\n\\n与文字阴影类似，添加一个盒子阴影。\\n\\n```CSS\\np {\\n  margin: 0;\\n}\\n\\narticle {\\n  max-width: 500px;\\n  padding: 10px;\\n  background-color: red;\\n  background-image: linear-gradient(to bottom, rgba(0,0,0,0), rgba(0,0,0,0.25));\\n}\\n\\n.simple {\\n  box-shadow: 5px 5px 5px rgba(0,0,0,0.7);\\n}\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:300px;display:flex;align-items:center;\\\"}\\n\\n```html\\n\u003carticle class=\\\"simple\\\"\u003e\\n  \u003cp\u003e\\n    \u003cstrong\u003eWarning\u003c/strong\u003e: The thermostat on the cosmic transcender has\\n    reached a critical level.\\n  \u003c/p\u003e\\n\u003c/article\u003e\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:300px;display:flex;align-items:center;\\\"}\"},{\"id\":\"slide-29\",\"content\":\"### 高级样式-多重阴影\\n\\n可以为同一个盒子添加不同得多个阴影，逗号分隔。\\n\\n```CSS\\np {\\n  margin: 0;\\n}\\n\\narticle {\\n  max-width: 500px;\\n  padding: 10px;\\n  background-color: red;\\n}\\n\\n.simple {\\n  box-shadow: 5px 5px 5px rgba(0,0,0,0.7);\\n}\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:300px;display:flex;align-items:center;\\\"}\\n\\n```html\\n\u003carticle class=\\\"simple\\\"\u003e\\n  \u003cp\u003e\\n    \u003cstrong\u003eWarning\u003c/strong\u003e: The thermostat on the cosmic transcender has\\n    reached a critical level.\\n  \u003c/p\u003e\\n\u003c/article\u003e\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:300px;display:flex;align-items:center;\\\"}\"},{\"id\":\"slide-30\",\"content\":\"### 高级样式-内部阴影\\n\\n与文字不同之处在于，盒子还可以添加内部阴影。\\n\\n```CSS\\nbutton {\\n  width: 150px;\\n  font-size: 1.1rem;\\n  line-height: 2;\\n  border-radius: 10px;\\n  border: none;\\n  box-shadow: 1px 1px 1px black,\\n              inset 2px 3px 5px rgba(0,0,0,0.3),\\n              inset -2px -3px 5px rgba(255,255,255,0.5);\\n}\\n\\nbutton:active {\\n  box-shadow: inset 2px 2px 1px black,\\n              inset 2px 3px 5px rgba(0,0,0,0.3),\\n              inset -2px -3px 5px rgba(255,255,255,0.5);\\n}\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:300px;display:flex;align-items:center;\\\"}\\n\\n```html\\n\u003cbutton\u003ePress me!\u003c/button\u003e\\n```\\n\\n{:style=\\\"float:left;width:48%;padding:1%;height:300px;display:flex;align-items:center;\\\"}\"}]},{\"id\":\"slide-31\",\"content\":\"# Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: justify;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":true,\"course\":\"web\",\"chapter\":\"css-box\"}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
