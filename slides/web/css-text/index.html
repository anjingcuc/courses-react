           |\\n| monospace  | 每个字符具有相同宽度的字体，通常用于代码列表。                            | \u003cspan style=\\\"font-family:'Courier New';\\\"\u003eelephant\u003c/span\u003e     |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-6\",\"content\":\"### 字体样式-字体 (2/3)\\n\\n网页安全字体，大部分系统和浏览器都能够正确显示的字体。\\n\\n| 字体名称        | 泛型       | 注意                                                                                                                          |\\n| --------------- | ---------- | ----------------------------------------------------------------------------------------------------------------------------- |\\n| Arial           | sans-serif | 通常认为最佳做法还是添加 Helvetica 作为 Arial 的替代品，Helvetica 被认为具有更好的形状，即使 Arial 使用更加广泛。             |\\n| Courier New     | monospace  | 某些操作系统有一个 Courier New 字体的替代版本叫 Courier。使用 Courier New 作为 Courier 的首选替代方案，被认为是最佳做法。     |\\n| Times New Roman | serif      | 某些操作系统有一个 Times New Roman 字体的替代版本叫 Times。使用 Times 作为 Times New Roman 的首选替代方案，被认为是最佳做法。 |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-7\",\"content\":\"### 字体样式-字体栈 (3/3)\\n\\n在 `font-family` 中写多个字体，浏览器会按照先后顺序使用。\\n\\n```CSS\\np {\\n  font-family: Helvetica, Arial, sans-serif;\\n}\\n```\"},{\"id\":\"slide-8\",\"content\":\"### 字体样式-大小\\n\\n`font-size` 改变文本大小。\\n\\n| 单位 | 示例                                                                                                          |\\n| ---- | ------------------------------------------------------------------------------------------------------------- |\\n| px   | 将像素的值赋予给你的文本。这是一个绝对单位， 它导致了在任何情况下，页面上的文本所计算出来的像素值都是一样的。 |\\n| em   | 1em 等于当前元素的父元素上设置的字体大小                                                                      |\\n| rem  | 类似 em ，但 1rem 等于根元素 html 设置的字体大小。                                                            |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-9\",\"content\":\"### 字体样式-斜体\\n\\n`font-style` 使得字体斜体。\\n\\n| 值      | 作用                               |\\n| ------- | ---------------------------------- |\\n| normal  | 将文本设置为普通字体               |\\n| italic  | 将文本设置为当前字体的斜体版本     |\\n| oblique | 如当前字体没有斜体版本，则模拟斜体 |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-10\",\"content\":\"### 字体样式-粗细\\n\\n`font-weight` 设置字体粗细。\\n\\n| 值      | 作用           |\\n| ------- | -------------- |\\n| normal  | 字体的普通粗细 |\\n| bold    | 加粗的字体     |\\n| lighter | 更细的字体     |\\n| bolder  | 更粗的字体     |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-11\",\"content\":\"### 字体样式-转换\\n\\n`text-transform` 设置文本转换。\\n\\n| 值         | 作用                     |\\n| ---------- | ------------------------ |\\n| none       | 防止任何转换             |\\n| uppercase  | 全部转换为大写           |\\n| lowercase  | 全部转换为小写           |\\n| capitalize | 首字母大写               |\\n| full-width | 转换为全角，类似等宽字体 |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-12\",\"content\":\"### 字体样式-装饰\\n\\n`text-decoration` 设置文本装饰。\\n\\n| 值           | 作用                       |\\n| ------------ | -------------------------- |\\n| none         | 取消已经存在的任何文本装饰 |\\n| underline    | 文本下划线                 |\\n| overline     | 文本上划线                 |\\n| line-through | 文本中间划线               |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-13\",\"content\":\"### 字体样式-阴影\\n\\n`text-shadow` 设置文本阴影。\\n\\n```CSS\\nh1 {\\n  text-shadow: 4px 4px 5px red;\\n}\\n```\\n\\n| 顺序 | 作用                                                         |\\n| ---- | ------------------------------------------------------------ |\\n| 1    | 必选，阴影与原始文本的水平偏移，常用 px 。                   |\\n| 2    | 必选，阴影与原始文本的垂直偏移。                             |\\n| 3    | 可选，模糊半径 - 更高的值意味着阴影分散得更广泛。默认为 0 。 |\\n| 4    | 阴影的基础颜色，如果没有指定，默认为 black.                  |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-14\",\"content\":\"### 文本布局-对齐\\n\\n`text-align` 设置文本对齐方式。\\n\\n| 值      | 作用             |\\n| ------- | ---------------- |\\n| left    | 左对齐           |\\n| right   | 右对齐           |\\n| center  | 居中对齐         |\\n| justify | 展开文本两端对齐 |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-15\",\"content\":\"### 文本对齐-行高\\n\\n`line-height` 设置行高。\\n\\n```CSS\\nline-height: 1.5\\n```\"},{\"id\":\"slide-16\",\"content\":\"### 文本对齐-字母和单词间距\\n\\n`letter-spacing` 设置字母间距，`word-spacing` 设置单词间距。\\n\\n```CSS\\np {\\n  letter-spacing: 2px;\\n  word-spacing: 4px;\\n}\\n```\"}]},{\"id\":\"slide-17\",\"content\":\"## 文本样式-列表样式\\n\\n`\u003cul\u003e` / `\u003col\u003e` 元素设置 `margin` 的顶部/底部为: `16px(1em)` / `0`; 和 `padding-left: 40px(2.5em);`（在这里注意的是浏览器默认字体大小为 16px）。\\n\u003cbr\u003e `\u003cli\u003e` 默认是没有设置间距的。\",\"children\":[{\"id\":\"slide-18\",\"content\":\"### 列表特定样式-符号样式\\n\\n`list-style-type` 属性设置项目符号点的类型。\\n\\n| 值                   | 作用                    |\\n| -------------------- | ----------------------- |\\n| decimal              | `\u003col\u003e` 默认十进制       |\\n| decimal-leading-zero | `\u003col\u003e` 十进制且前面补 0 |\\n| upper-roman          | `\u003col\u003e` 使用大写罗马数字 |\\n| lower-roman          | `\u003col\u003e` 使用小写罗马数字 |\\n| disc                 | `\u003cul\u003e` 默认实心圆点     |\\n| circle               | `\u003cul\u003e` 空心圆点         |\\n| square               | `\u003cul\u003e` 实心方块         |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-19\",\"content\":\"### 列表特定样式-符号位置\\n\\n`list-style-position` 属性设置符号是在盒外还是盒内。\\n\\n| 值      | 作用                     |\\n| ------- | ------------------------ |\\n| outside | 默认值，在内容区域之外。 |\\n| inside  | 在内容区域之内。         |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-20\",\"content\":\"### 列表特定样式-自定义符号\\n\\n`list-style-image` 使用自定义图片作为符号。\\n\\n```CSS\\nul {\\n  list-style-image: url(star.svg);\\n}\\n```\"},{\"id\":\"slide-21\",\"content\":\"### 列表特定样式-计数\\n\\n一些影响列表外观的属性，虽然不属于 CSS ，也放在这里学习。\\n\\n| 属性     | 作用                                                              |\\n| -------- | ----------------------------------------------------------------- |\\n| start    | 规定 `\u003col\u003e` 从多少开始计数，`start=\\\"4\\\"` 那么列表第一项编号为 4 。 |\\n| reversed | 倒序显示 `\u003col\u003e` 的项。                                            |\\n| value    | 这是 `\u003col\u003e` 中 `\u003cli\u003e` 的属性，直接指定项目的编号。                |\\n\\n{:style=\\\"font-size:70%;\\\"}\"}]},{\"id\":\"slide-22\",\"content\":\"## 文本样式-链接样式\",\"children\":[{\"id\":\"slide-23\",\"content\":\"### 链接样式-伪类\\n\\n修改链接样式需要用到`伪类`来实现。\\n\\n| 伪类      | 作用                        |\\n| --------- | --------------------------- |\\n| a:link    | 未访问过链接样式。          |\\n| a:visited | 访问过的链接样式。          |\\n| a:hover   | 鼠标悬停时的链接样式        |\\n| a:focus   | 键盘 `Tab` 选中时的链接样式 |\\n| a:active  | 被激活/点击时的链接样式     |\\n\\n{:style=\\\"font-size:70%;\\\"}\"},{\"id\":\"slide-24\",\"content\":\"### 链接样式-顺序\\n\\n修改链接样式按照上面列表的顺序来定义，如果顺序不对，可能显示不正确。\\n\\n```CSS\\na {\\n\\n}\\n\\n\\na:link {\\n\\n}\\n\\na:visited {\\n\\n}\\n\\na:focus {\\n\\n}\\n\\na:hover {\\n\\n}\\n\\na:active {\\n\\n}\\n```\"}]},{\"id\":\"slide-25\",\"content\":\"## 文本样式-网络字体\\n\\n使用 `font-family` 属性来控制字体时，需要提供一个或多个字体种类名称，浏览器会在列表中搜寻，直到找到它所运行的系统上可用的字体。但是，引入网络字体可以让浏览器自动下载某种本地不存在的字体。\\n\\n```CSS\\n@font-face {\\n  font-family: \\\"myFont\\\";\\n  src: url(\\\"myFont.ttf\\\");\\n}\\n\\np {\\n  font-family: \\\"myFont\\\", serif;\\n}\\n```\",\"children\":[{\"id\":\"slide-26\",\"content\":\"### 网络字体-使用在线的字体服务\\n\\n1. 选择网络字体在线服务商；\\n2. 通过 `\u003clink\u003e` 引入它生成的 CSS ;\\n3. 在自己的 CSS 中使用字体。\"}]},{\"id\":\"slide-27\",\"content\":\"# Q \u0026 A\"}],\"globalStyle\":\".reveal p {\\n    text-align: justify;\\n    font-size: 0.8em;\\n  }\\n  .reveal ul {\\n    display: block;\\n  }\\n  .reveal ol {\\n    display: block;\\n  }\",\"fullscreen\":true,\"course\":\"web\",\"chapter\":\"css-text\"}]\n"])</script><script>self.__next_f.push([1,"a:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"课程资料\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"教学课件网站 - Python、Web、网络安全等课程\"}]]\n3:null\n"])</script></body></html>
